<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAIDO 居合道</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Yuji+Boku&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="conicalfavi.png"/>
    <style>
    /* IAIDO, Sumi-e Ink Painting UI */
    :root {
        --parchment:    #f0e8d8;
        --parchment-dk: #d8ccb4;
        --ink:          #1a1209;
        --ink-mid:      #3a2f22;
        --ink-faint:    rgba(26, 18, 9, 0.35);
        --sakura:       #c89aaa;
        --seal:         #8b2020;
        --gold:         #b8944a;
    }

    *, *::before, *::after {
        box-sizing: border-box;
        margin: 0; padding: 0;
        user-select: none;
    }

    html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: var(--parchment);
        font-family: 'Noto Serif JP', 'Georgia', serif;
    }

    #gameCanvas {
        display: block;
        width: 100%; height: 100%;
    }

    /* HUD */
    #ui-layer {
        position: absolute; inset: 0;
        pointer-events: none;
        display: flex; flex-direction: column;
        justify-content: space-between;
        padding: 30px 44px;
    }

    .hud-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
    }

    .hud-wave-wrap {
        position: relative;
        padding-bottom: 9px;
    }
    .hud-wave {
        font-family: 'Yuji Boku', 'Georgia', serif;
        font-size: 1.25rem;
        color: var(--ink);
        letter-spacing: 0.28em;
        text-indent: 0.28em;
    }
    .hud-wave-wrap::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0;
        width: 80%; height: 2px;
        background: var(--ink);
        opacity: 0.35;
        transform: skewX(-6deg);
        clip-path: polygon(0 0, 100% 25%, 100% 100%, 0 75%);
    }

    .hud-right {
        display: flex; flex-direction: column;
        align-items: flex-end;
        gap: 10px;
    }

    .hud-health { display: flex; gap: 9px; align-items: center; }
    .heart {
        width: 21px; height: 21px;
        background: var(--seal);
        border-radius: 50% 50% 50% 0;
        transform: rotate(-45deg);
        box-shadow: inset 0 1px 3px rgba(0,0,0,0.25), 0 1px 2px rgba(0,0,0,0.12);
        transition: all 0.2s ease;
    }
    .heart.empty {
        background: transparent;
        border: 1.5px solid rgba(139,32,32,0.28);
        box-shadow: none;
    }

    .hud-weapon {
        font-family: 'Yuji Boku', 'Georgia', serif;
        font-size: 0.92rem;
        letter-spacing: 0.22em;
        text-indent: 0.22em;
        color: var(--ink);
        opacity: 0.72;
    }

    .hud-bottom {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
    }
    .title-watermark {
        font-family: 'Yuji Boku', 'Georgia', serif;
        font-size: 3.8rem;
        color: var(--ink);
        opacity: 0.05;
        letter-spacing: 0.28em;
        line-height: 1;
    }
    .controls-hint {
        font-size: 0.68rem;
        color: var(--ink);
        opacity: 0.26;
        letter-spacing: 0.13em;
        text-align: right;
        line-height: 1.9;
    }

    /* WAVE BANNER */
    #wave-banner {
        position: absolute;
        top: 50%; left: 0; right: 0;
        transform: translateY(-50%);
        text-align: center;
        font-family: 'Yuji Boku', 'Georgia', serif;
        font-size: 4.8rem;
        color: var(--ink);
        letter-spacing: 0.6em;
        text-indent: 0.6em;
        pointer-events: none;
        z-index: 5;
        opacity: 0;
    }
    #wave-banner.show {
        animation: waveBannerAnim 2.4s ease forwards;
    }
    @keyframes waveBannerAnim {
        0%   { opacity: 0; letter-spacing: 1em; text-indent: 1em; filter: blur(8px); }
        22%  { opacity: 0.82; letter-spacing: 0.6em; text-indent: 0.6em; filter: blur(0); }
        65%  { opacity: 0.82; }
        100% { opacity: 0; }
    }

    /* OVERLAYS */
    .overlay {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        pointer-events: auto;
        z-index: 10;
        transition: opacity 0.5s ease;
    }
    .overlay-bg {
        position: absolute; inset: 0;
        background: radial-gradient(
            ellipse 95% 90% at 50% 50%,
            rgba(240,232,216,0.95) 25%,
            rgba(215,202,178,0.98) 100%
        );
        z-index: -1;
    }
    .overlay-frame {
        position: absolute; inset: 26px;
        border: 1px solid rgba(26,18,9,0.07);
        pointer-events: none;
    }
    .overlay-frame::before, .overlay-frame::after {
        content: '';
        position: absolute;
        width: 28px; height: 28px;
        border-style: solid;
        border-color: rgba(26,18,9,0.2);
    }
    .overlay-frame::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .overlay-frame::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .hidden { opacity: 0; pointer-events: none; }

    .seal-stamp {
        position: absolute;
        font-family: 'Yuji Boku', 'Georgia', serif;
        font-size: 1.7rem;
        color: var(--seal);
        border: 2px solid var(--seal);
        width: 62px; height: 62px;
        display: flex; align-items: center; justify-content: center;
        opacity: 0.1; border-radius: 3px;
    }
    .seal-tr { top: 58px; right: 72px; transform: rotate(-9deg); }
    .seal-bl { bottom: 58px; left: 72px; transform: rotate(7deg); }

    .overlay-title {
        font-family: 'Yuji Boku', 'Georgia', serif;
        font-size: 5.8rem;
        color: var(--ink);
        letter-spacing: 0.45em;
        text-indent: 0.45em;
        line-height: 1;
        margin-bottom: 4px;
        animation: inkFadeIn 0.9s ease forwards;
    }
    .overlay-title.slain {
        color: var(--seal);
        font-size: 4.6rem;
    }
    .overlay-kanji {
        font-family: 'Yuji Boku', 'Georgia', serif;
        font-size: 1rem;
        color: var(--ink);
        opacity: 0.38;
        letter-spacing: 0.65em;
        text-indent: 0.65em;
        margin-bottom: 10px;
    }

    .ink-rule {
        position: relative;
        width: 110px; height: 1px;
        background: var(--ink);
        opacity: 0.18;
        margin: 18px 0 22px;
    }
    .ink-rule::before {
        content: '✦';
        position: absolute;
        top: -9px; left: 50%;
        transform: translateX(-50%);
        font-size: 0.65rem;
        color: var(--ink); opacity: 0.45;
    }

    .overlay-subtitle {
        font-family: 'Noto Serif JP', 'Georgia', serif;
        font-size: 0.9rem;
        color: var(--ink-mid);
        letter-spacing: 0.13em;
        text-align: center;
        max-width: 430px;
        line-height: 2.3;
        opacity: 0.72;
        margin-bottom: 36px;
    }

    .btn {
        background: none; border: none;
        cursor: pointer; outline: none; padding: 0;
        font-family: 'Yuji Boku', 'Georgia', serif;
        color: var(--parchment);
        font-size: 1.08rem;
        letter-spacing: 0.38em;
        text-indent: 0.38em;
        transition: transform 0.1s ease;
        margin: 4px 0;
        position: relative;
    }
    .btn-inner {
        display: block;
        padding: 13px 58px 17px;
        background: var(--ink);
        position: relative;
        clip-path: polygon(
            1.5% 15%, 3%  0%,   8%  6%,  15% 1%,
            50%  4%, 85%  0%,  92%  5%,  98.5% 15%,
            100% 50%, 98.5% 85%, 96% 100%, 88% 95%,
            50% 98%, 12% 100%,   4% 94%,   1.5% 85%
        );
        transition: background-color 0.2s ease, clip-path 0.25s ease;
    }
    .btn:hover .btn-inner {
        background: var(--ink-mid);
        clip-path: polygon(
            2%   18%, 4.5% 0%,   9%  7%,  14% 0%,
            50%   5%, 86%  1%,  91%  6%,  98%  18%,
            100% 50%, 97%  83%, 95% 100%, 87% 94%,
            50%  97%, 13% 100%,   5% 93%,  2%  81%
        );
    }
    .btn:active { transform: scale(0.96); }

    .btn::after {
        content: '';
        position: absolute;
        top: 50%; left: 50%;
        width: 20px; height: 20px;
        margin: -10px 0 0 -10px;
        border-radius: 50%;
        background: rgba(26, 18, 9, 0.3);
        pointer-events: none;
        opacity: 0;
    }
    .btn:active::after {
        animation: inkSplash 0.4s ease forwards;
    }
    @keyframes inkSplash {
        0%   { transform: scale(0); opacity: 0.5; }
        100% { transform: scale(4); opacity: 0; }
    }

    .controls-label {
        font-family: 'Noto Serif JP', 'Georgia', serif;
        font-size: 0.7rem;
        color: var(--ink); opacity: 0.28;
        letter-spacing: 0.15em;
        margin-top: 26px;
    }

    /* WEAPON DROP SCREEN */
    .cleared-text {
        font-family: 'Yuji Boku', 'Georgia', serif;
        font-size: 0.95rem;
        color: var(--seal);
        letter-spacing: 0.52em; text-indent: 0.52em;
        opacity: 0.85;
    }
    .drop-hint {
        font-family: 'Noto Serif JP', 'Georgia', serif;
        font-size: 0.78rem;
        color: var(--ink); opacity: 0.38;
        letter-spacing: 0.15em;
        margin: 10px 0 22px;
    }
    .weapon-name-display {
        font-family: 'Yuji Boku', 'Georgia', serif;
        font-size: 3.9rem;
        color: var(--ink);
        letter-spacing: 0.3em; text-indent: 0.3em;
        margin-bottom: 6px;
        animation: inkFadeIn 0.7s ease forwards;
    }

    /* ANIMATIONS */
    @keyframes inkFadeIn {
        from { opacity: 0; transform: translateY(14px); filter: blur(5px); }
        to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
    }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<!-- HUD Layer -->
<div id="ui-layer">
    <div class="hud-top">
        <div class="hud-wave-wrap">
            <div class="hud-wave" id="waveDisplay">WAVE  1</div>
        </div>
        <div class="hud-right">
            <div class="hud-health" id="healthDisplay"></div>
            <div class="hud-weapon" id="weaponDisplay">KATANA</div>
        </div>
    </div>
    <div class="hud-bottom">
        <div class="title-watermark">居合道</div>
        <div class="controls-hint">WASD · move<br>J · slash &nbsp; K · dash strike</div>
    </div>
</div>

<!-- Wave Announcement Banner -->
<div id="wave-banner"></div>

<!-- Main Menu/Game Over -->
<div id="mainMenu" class="overlay">
    <div class="overlay-bg"></div>
    <div class="overlay-frame"></div>
    <div class="seal-stamp seal-tr">道</div>
    <div class="seal-stamp seal-bl">剣</div>

    <div class="overlay-title" id="menuTitle">IAIDO</div>
    <div class="overlay-kanji">居 &nbsp; 合 &nbsp; 道</div>
    <div class="ink-rule"></div>
    <p class="overlay-subtitle" id="menuSubtitle">
        A blade drawn in silence.<br>
        Every strike, a brushstroke on the parchment.
    </p>
    <button class="btn" id="startBtn">
        <span class="btn-inner">BEGIN</span>
    </button>
    <div class="controls-label">WASD · Move &nbsp;|&nbsp; J · Slash &nbsp;|&nbsp; K · Dash Strike</div>
</div>

<!-- Weapon Drop Screen, superseded by Sakura Roll canvas sequence -->
<div id="dropScreen" class="overlay hidden" style="display:none!important">
    <div class="overlay-bg"></div>
    <div class="overlay-frame"></div>
    <div class="seal-stamp seal-tr">武</div>
    <div class="cleared-text">WAVE CLEARED</div>
    <div class="drop-hint">a weapon emerges from the ink</div>
    <div class="weapon-name-display" id="dropWeaponName">KANABO</div>
    <div class="ink-rule"></div>
    <button class="btn" id="continueBtn">
        <span class="btn-inner">ADVANCE</span>
    </button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// UI references
const mainMenu       = document.getElementById('mainMenu');
const menuTitle      = document.getElementById('menuTitle');
const menuSubtitle   = document.getElementById('menuSubtitle');
const startBtn       = document.getElementById('startBtn');
const dropScreen     = document.getElementById('dropScreen');
const dropWeaponName = document.getElementById('dropWeaponName');
const continueBtn    = document.getElementById('continueBtn');
const waveDisplay    = document.getElementById('waveDisplay');
const healthDisplay  = document.getElementById('healthDisplay');
const weaponDisplay  = document.getElementById('weaponDisplay');
const waveBanner     = document.getElementById('wave-banner');

// Game State
let width, height;
let gameState = 'MENU';
let hasSeenIntro = false;   // scroll only shown on the very first run

// Input J: light attack, K: dash attack
const keys = {
    w: false, a: false, s: false, d: false,
    ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false,
    j: false, k: false
};
let cameraShake = 0;
let globalWindForce = 0;   // 0=calm 1=full sakura-roll gale shared across systems

// WEAPON DEFINITIONS
const WEAPONS = {
    Katana: {
        name: "Katana",
        dashWindup: 3, dashFrames: 5, dashRecover: 12,
        range: 90,  arc: Math.PI / 1.5,
        damage: 1,  knockback: 5,
        color: "#1a1209",
        slashRGB: [26, 18, 9],
        dashWeaponAngleOffset: 0          // blade points forward
    },
    Naginata: {
        name: "Naginata",
        dashWindup: 5, dashFrames: 14, dashRecover: 20,
        range: 150, arc: Math.PI * 1.2,
        damage: 1.5, knockback: 10,
        color: "#1a1209",
        slashRGB: [26, 18, 9],
        dashWeaponAngleOffset: 0          // blade points forward
    },
    Kanabo: {
        name: "Kanabo",
        dashWindup: 8, dashFrames: 9, dashRecover: 28,
        range: 105,  arc: Math.PI / 2.5,
        damage: 3,  knockback: 30,
        color: "#1a1209",
        slashRGB: [26, 18, 9],
        dashWeaponAngleOffset: 0          // blade points forward
    },
    Odachi: {
        name: "Odachi",
        dashWindup: 14, dashFrames: 12, dashRecover: 38,
        range: 180, arc: Math.PI * 1.5,
        damage: 5,  knockback: 20,
        color: "#1a1209",
        slashRGB: [26, 18, 9],
        dashWeaponAngleOffset: Math.PI / 2 // blade held perpendicular to movement
    },
    // New weapons 
    Kama: {
        name: "Kama",
        dashWindup: 4, dashFrames: 8, dashRecover: 14,
        range: 90,  arc: Math.PI / 1.8,
        damage: 0.9, knockback: 4,
        color: "#1a1209",
        slashRGB: [26, 18, 9],
        dashWeaponAngleOffset: 0
    },
    Yumi: {
        name: "Yumi",
        dashWindup: 6, dashFrames: 10, dashRecover: 20,
        range: 210, arc: Math.PI / 20,
        damage: 2.2, knockback: 9,
        color: "#1a1209",
        slashRGB: [26, 18, 9],
        dashWeaponAngleOffset: 0
    },
    Sasumata: {
        name: "Sasumata",
        dashWindup: 5, dashFrames: 14, dashRecover: 18,
        range: 135, arc: Math.PI / 2.6,
        damage: 1.0, knockback: 28,
        color: "#1a1209",
        slashRGB: [26, 18, 9],
        dashWeaponAngleOffset: 0
    },
    Fukiya: {
        name: "Fukiya",
        dashWindup: 4, dashFrames: 14, dashRecover: 16,
        range: 190, arc: Math.PI / 22,
        damage: 1.1, knockback: 5,
        color: "#1a1209",
        slashRGB: [26, 18, 9],
        dashWeaponAngleOffset: 0
    }
};

// 
// PRE-RENDERED PARCHMENT BACKGROUND
// 
let bgCanvas = null;

function buildBackground() {
    bgCanvas = document.createElement('canvas');
    bgCanvas.width  = width;
    bgCanvas.height = height;
    const bc = bgCanvas.getContext('2d');

    bc.fillStyle = '#f0e8d8';
    bc.fillRect(0, 0, width, height);

    const imgD = bc.getImageData(0, 0, width, height);
    const d    = imgD.data;
    for (let i = 0; i < d.length; i += 4) {
        const n = (Math.random() - 0.5) * 20;
        d[i]   = Math.max(0, Math.min(255, d[i]   + n));
        d[i+1] = Math.max(0, Math.min(255, d[i+1] + n * 0.82));
        d[i+2] = Math.max(0, Math.min(255, d[i+2] + n * 0.62));
    }
    bc.putImageData(imgD, 0, 0);

    let g = bc.createRadialGradient(0, 0, 0, 0, 0, width * 0.55);
    g.addColorStop(0, 'rgba(200, 180, 140, 0.22)');
    g.addColorStop(1, 'rgba(200, 180, 140, 0)');
    bc.fillStyle = g; bc.fillRect(0, 0, width, height);

    g = bc.createRadialGradient(width, height, 0, width, height, width * 0.6);
    g.addColorStop(0, 'rgba(180, 155, 110, 0.18)');
    g.addColorStop(1, 'rgba(180, 155, 110, 0)');
    bc.fillStyle = g; bc.fillRect(0, 0, width, height);

    g = bc.createRadialGradient(
        width/2, height/2, Math.min(width, height) * 0.22,
        width/2, height/2, Math.max(width, height) * 0.88
    );
    g.addColorStop(0,   'rgba(26, 18, 9, 0)');
    g.addColorStop(0.68,'rgba(26, 18, 9, 0)');
    g.addColorStop(1,   'rgba(26, 18, 9, 0.24)');
    bc.fillStyle = g; bc.fillRect(0, 0, width, height);

    bc.strokeStyle = 'rgba(26, 18, 9, 0.038)';
    bc.lineWidth = 1;
    const gs = 64;
    for (let x = 0; x < width;  x += gs) {
        bc.beginPath(); bc.moveTo(x, 0); bc.lineTo(x, height); bc.stroke();
    }
    for (let y = 0; y < height; y += gs) {
        bc.beginPath(); bc.moveTo(0, y); bc.lineTo(width, y); bc.stroke();
    }

    drawBambooSilhouettes(bc, width, height);
    drawMountains(bc, width, height);
    drawInkSplotches(bc, width, height);
}

function drawBambooSilhouettes(c, w, h) {
    c.save();
    c.globalAlpha = 0.058;
    c.fillStyle   = '#1e1610';

    const STALKS = [
        { xr: 0.035, segs: 10, sw: 5 },
        { xr: 0.075, segs: 12, sw: 4 },
        { xr: 0.115, segs:  8, sw: 6 },
        { xr: 0.155, segs: 11, sw: 3 },
        { xr: 0.860, segs: 10, sw: 4 },
        { xr: 0.900, segs:  8, sw: 6 },
        { xr: 0.940, segs: 13, sw: 4 },
        { xr: 0.978, segs:  9, sw: 5 }
    ];

    STALKS.forEach(s => {
        const bx      = s.xr * w;
        const segH    = (h * 0.78) / s.segs;
        const sw      = s.sw;
        const startY  = h * 0.97;

        for (let i = 0; i < s.segs; i++) {
            const y = startY - i * segH;
            c.fillRect(bx - sw/2, y - segH * 0.9, sw, segH * 0.9);
            c.fillRect(bx - sw * 0.85, y - 5, sw * 1.7, 5);

            if (i > 1 && i % 2 === 0) {
                const dir = (i % 4 === 0) ? -1 : 1;
                c.save();
                c.translate(bx, y - 3);
                c.rotate(dir * 0.32);
                c.fillRect(0, -1, sw * 6.5, 2);
                c.beginPath();
                c.ellipse(sw * 7.5, 0, sw * 3.5, sw * 1.1, dir > 0 ? -0.45 : 0.45, 0, Math.PI * 2);
                c.fill();
                c.beginPath();
                c.ellipse(sw * 5.5, -sw * 2, sw * 2.8, sw * 0.9, dir > 0 ? -0.65 : 0.65, 0, Math.PI * 2);
                c.fill();
                c.restore();
            }
        }
    });

    c.restore();
}

function drawMountains(c, w, h) {
    c.save();
    c.fillStyle = '#1a1209';

    c.globalAlpha = 0.038;
    c.beginPath();
    c.moveTo(0, h * 0.82);
    c.quadraticCurveTo(w * 0.12, h * 0.52, w * 0.28, h * 0.73);
    c.quadraticCurveTo(w * 0.43, h * 0.42, w * 0.58, h * 0.68);
    c.quadraticCurveTo(w * 0.73, h * 0.48, w * 0.90, h * 0.78);
    c.lineTo(w, h * 0.85); c.lineTo(w, h); c.lineTo(0, h);
    c.closePath(); c.fill();

    c.globalAlpha = 0.022;
    c.beginPath();
    c.moveTo(0, h * 0.90);
    c.quadraticCurveTo(w * 0.22, h * 0.72, w * 0.48, h * 0.87);
    c.quadraticCurveTo(w * 0.73, h * 0.66, w, h * 0.88);
    c.lineTo(w, h); c.lineTo(0, h);
    c.closePath(); c.fill();

    c.restore();
}

function drawInkSplotches(c, w, h) {
    c.save();
    const spots = [
        { xr: 0.018, yr: 0.22, r: 28 },
        { xr: 0.985, yr: 0.58, r: 22 },
        { xr: 0.042, yr: 0.72, r: 18 },
        { xr: 0.962, yr: 0.14, r: 24 },
        { xr: 0.50,  yr: 0.96, r: 35 }
    ];
    spots.forEach(sp => {
        const cx = sp.xr * w, cy = sp.yr * h;
        const g  = c.createRadialGradient(cx, cy, 0, cx, cy, sp.r);
        g.addColorStop(0, 'rgba(26, 18, 9, 0.06)');
        g.addColorStop(1, 'rgba(26, 18, 9, 0)');
        c.fillStyle = g;
        c.beginPath();
        c.arc(cx, cy, sp.r, 0, Math.PI * 2);
        c.fill();
    });
    c.restore();
}

// SAKURA PETAL SYSTEM and
// BLOOD OATH SCROLL Cinematic intro before each game
// Phases: UNROLL → READ → AWAIT_BLOOD → BLEEDING → FADEOUT

const SCROLL_PHASE = {
    UNROLL:      0,   // 72 frames scroll unrolls from nothing
    SETTLE:      1,   // 18 frames slight elastic settle
    READ:        2,   // 55 frames text lines fade in one by one
    AWAIT_BLOOD: 3,   // indefinite pulse on the oath box
    BLEEDING:    4,   // 52 frames blood burst + smudge builds
    FADEOUT:     5,   // 44 frames everything washes to parchment
};

function initScrollScene() {
    const sw = Math.min(width  * 0.56, 530);
    const sh = Math.min(height * 0.70, 560);
    scrollScene = {
        phase:      SCROLL_PHASE.UNROLL,
        timer:      0,
        cx: width  / 2,
        cy: height / 2,
        sw, sh,                      // target scroll width / height
        curH:  0,                    // current unrolled height (animates 0→sh)
        textA: 0,                    // master text alpha
        lineA: [0,0,0,0,0,0,0],     // per-line alpha (7 content lines)
        fadeA: 0,                    // white-wash fade-out
        bloodParticles: [],          // tiny blood drops
        smudgeA: 0,                  // blood smudge opacity on the seal box
        smudgeBlobs: [],             // pre-baked random smudge blob positions
        signed: false,               // whether the oath has been sealed
        oathPulse: 0,                // sinusoidal pulse on the await box
        oathBoxY: 0,                 // computed by _drawScrollText, used by triggerBloodOath
        oathBoxH: 0,
        oathBoxW: 0,
        // Roller targets (for elastic settle)
        rollTop:  0,
        rollBot:  0,
    };

    // Pre-bake 22 smudge blob positions for the fingerprint effect
    for (let i = 0; i < 22; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.random() * 0.78;
        scrollScene.smudgeBlobs.push({
            x: Math.cos(a) * r,
            y: Math.sin(a) * r,
            s: 0.18 + Math.random() * 0.55,
            a: 0.45 + Math.random() * 0.42,
        });
    }
}

function updateScrollScene() {
    if (!scrollScene) return;
    const sc = scrollScene;
    sc.timer++;
    sc.oathPulse = Math.sin(sc.timer * 0.055) * 0.5 + 0.5;

    if (sc.phase === SCROLL_PHASE.UNROLL) {
        // Ease-out cubic unroll over 72 frames
        const t  = Math.min(sc.timer / 72, 1);
        const e  = 1 - Math.pow(1 - t, 3);
        sc.curH  = sc.sh * e;
        if (sc.timer >= 72) {
            sc.phase = SCROLL_PHASE.SETTLE;
            sc.timer = 0;
        }

    } else if (sc.phase === SCROLL_PHASE.SETTLE) {
        // Elastic overshoot settle
        const t = sc.timer / 18;
        const overshoot = Math.sin(t * Math.PI) * sc.sh * 0.025 * (1 - t);
        sc.curH = sc.sh + overshoot;
        if (sc.timer >= 18) {
            sc.curH  = sc.sh;
            sc.phase = SCROLL_PHASE.READ;
            sc.timer = 0;
        }

    } else if (sc.phase === SCROLL_PHASE.READ) {
        // Text master fade in
        sc.textA = Math.min(1, sc.timer / 22);
        // Each content line fades in sequentially, 7 frames apart
        for (let i = 0; i < sc.lineA.length; i++) {
            const start = i * 7;
            sc.lineA[i] = Math.min(1, Math.max(0, (sc.timer - start) / 10));
        }
        if (sc.timer >= 55 + sc.lineA.length * 7) {
            sc.phase = SCROLL_PHASE.AWAIT_BLOOD;
            sc.timer = 0;
        }

    } else if (sc.phase === SCROLL_PHASE.AWAIT_BLOOD) {
        sc.textA = 1;
        sc.lineA.fill(1);

    } else if (sc.phase === SCROLL_PHASE.BLEEDING) {
        sc.smudgeA = Math.min(1, sc.timer / 28);
        // Update blood particles
        sc.bloodParticles.forEach(p => {
            p.x  += p.vx;
            p.y  += p.vy;
            p.vy += 0.18;   // gravity
            p.vx *= 0.92;
            p.life--;
            p.r  = Math.max(0, p.r - 0.04);
        });
        sc.bloodParticles = sc.bloodParticles.filter(p => p.life > 0);
        if (sc.timer >= 52) {
            sc.phase = SCROLL_PHASE.FADEOUT;
            sc.timer = 0;
        }

    } else if (sc.phase === SCROLL_PHASE.FADEOUT) {
        const t   = Math.min(sc.timer / 44, 1);
        sc.fadeA  = 1 - Math.pow(1 - t, 2);
        if (sc.timer >= 44) {
            scrollScene = null;
            gameState   = 'PLAYING';
            initGame();
        }
    }
}

function triggerBloodOath(clickX, clickY) {
    if (!scrollScene) return;
    const sc = scrollScene;
    if (sc.phase !== SCROLL_PHASE.AWAIT_BLOOD) return;

    // Use geometry computed by _drawScrollText each frame
    const boxCY = sc.oathBoxY + sc.oathBoxH / 2;
    const boxH  = sc.oathBoxH;
    const boxW  = sc.oathBoxW;

    // If click coords are supplied, verify they're within the oath box
    if (clickX !== undefined) {
        const inBox = Math.abs(clickX - sc.cx) <= boxW / 2 + 22
                   && Math.abs(clickY - boxCY) <= boxH / 2 + 22;
        if (!inBox) return;
    }

    sc.signed = true;
    sc.phase  = SCROLL_PHASE.BLEEDING;
    sc.timer  = 0;

    // Spawn blood particles bursting from the seal box center
    for (let i = 0; i < 24; i++) {
        const a   = Math.random() * Math.PI * 2;
        const spd = 1.2 + Math.random() * 5.5;
        sc.bloodParticles.push({
            x:    sc.cx + (Math.random() - 0.5) * 18,
            y:    boxCY + (Math.random() - 0.5) * 10,
            vx:   Math.cos(a) * spd,
            vy:   Math.sin(a) * spd - 1.5,
            r:    1.2 + Math.random() * 3.2,
            life: 22 + Math.floor(Math.random() * 22),
        });
    }
}

function drawScrollScene() {
    if (!scrollScene) return;
    const sc  = scrollScene;
    const c   = ctx;
    const { cx, cy, sw, sh, curH } = sc;

    // Background dim 
    c.save();
    c.fillStyle = 'rgba(14, 10, 6, 0.62)';
    c.fillRect(0, 0, width, height);

    // Shadow under scroll 
    const shadowG = c.createRadialGradient(cx, cy + curH * 0.12, 0, cx, cy, sw * 0.75);
    shadowG.addColorStop(0,   'rgba(6,3,1,0.28)');
    shadowG.addColorStop(1,   'rgba(6,3,1,0)');
    c.beginPath();
    c.ellipse(cx, cy + curH * 0.12, sw * 0.68, curH * 0.22, 0, 0, Math.PI * 2);
    c.fillStyle = shadowG;
    c.fill();

    if (curH < 2) { c.restore(); return; }

    const halfW = sw / 2;
    const halfH = curH / 2;
    const rollerH = Math.min(curH * 0.09, 28);
    const innerTop    = cy - halfH + rollerH;
    const innerBottom = cy + halfH - rollerH;
    const innerHeight = innerBottom - innerTop;

    // Parchment body 
    // Slight warm edge-shadow for paper depth
    const paperG = c.createLinearGradient(cx - halfW, 0, cx + halfW, 0);
    paperG.addColorStop(0,    'rgba(210,192,162,1)');
    paperG.addColorStop(0.06, 'rgba(238,225,202,1)');
    paperG.addColorStop(0.50, 'rgba(244,235,215,1)');
    paperG.addColorStop(0.94, 'rgba(238,225,202,1)');
    paperG.addColorStop(1,    'rgba(210,192,162,1)');

    c.beginPath();
    c.rect(cx - halfW, innerTop, sw, innerHeight);
    c.fillStyle = paperG;
    c.fill();

    // Vertical crease lines (aged paper feel)
    [0.20, 0.50, 0.80].forEach(t => {
        const lx = cx - halfW + sw * t;
        c.beginPath();
        c.moveTo(lx, innerTop);
        c.lineTo(lx, innerBottom);
        c.strokeStyle = 'rgba(26,18,9,0.04)';
        c.lineWidth   = 0.8;
        c.stroke();
    });
    // Horizontal age lines
    for (let row = 0; row < 5; row++) {
        const ly = innerTop + (row / 4) * innerHeight;
        c.beginPath();
        c.moveTo(cx - halfW + 12, ly);
        c.lineTo(cx + halfW - 12, ly);
        c.strokeStyle = 'rgba(26,18,9,0.025)';
        c.lineWidth   = 0.6;
        c.stroke();
    }

    // Paper edge dark border
    c.beginPath();
    c.rect(cx - halfW, innerTop, sw, innerHeight);
    c.strokeStyle = 'rgba(26,18,9,0.12)';
    c.lineWidth   = 1.2;
    c.stroke();

    // Top roller 
    _drawScrollRoller(c, cx, cy - halfH + rollerH * 0.5, halfW, rollerH);

    // Bottom roller (only drawn if scroll is sufficiently open) 
    if (curH > sh * 0.15) {
        _drawScrollRoller(c, cx, cy + halfH - rollerH * 0.5, halfW, rollerH);
    }

    // Text content (clip to parchment) 
    if (sc.textA > 0.01 && innerHeight > 40) {
        c.save();
        c.beginPath();
        c.rect(cx - halfW + 2, innerTop + 2, sw - 4, innerHeight - 4);
        c.clip();
        _drawScrollText(c, sc, cx, innerTop, innerBottom, sw);
        c.restore();
    }

    // Blood particles 
    sc.bloodParticles.forEach(p => {
        const a = Math.min(1, p.life / 12);
        c.beginPath();
        c.arc(p.x, p.y, Math.max(0.1, p.r), 0, Math.PI * 2);
        c.fillStyle = `rgba(120, 8, 8, ${a * 0.90})`;
        c.fill();
    });

    // Fade-out white wash 
    if (sc.fadeA > 0.01) {
        c.fillStyle = `rgba(240,232,216,${sc.fadeA})`;
        c.fillRect(0, 0, width, height);
    }

    c.restore();
}

function _drawScrollRoller(c, cx, ry, halfW, rh) {
    const rw = halfW + 14;   // rollers slightly wider than parchment
    const rr = rh * 0.5;     // corner radius ≈ half height

    // Roller body gradient (cylindrical look)
    const rg = c.createLinearGradient(cx - rw, ry - rr, cx - rw, ry + rr);
    rg.addColorStop(0,    'rgba(72, 46, 22, 0.95)');
    rg.addColorStop(0.28, 'rgba(108, 70, 34, 0.95)');
    rg.addColorStop(0.55, 'rgba(88, 56, 26, 0.95)');
    rg.addColorStop(0.80, 'rgba(58, 36, 15, 0.95)');
    rg.addColorStop(1,    'rgba(40, 24, 9,  0.95)');

    c.beginPath();
    c.roundRect(cx - rw, ry - rr, rw * 2, rh, rr);
    c.fillStyle = rg;
    c.fill();

    // Roller glint (highlight along the top edge)
    c.beginPath();
    c.roundRect(cx - rw + 4, ry - rr + 2, rw * 2 - 8, rh * 0.28, rr * 0.4);
    c.fillStyle = 'rgba(180, 130, 72, 0.22)';
    c.fill();

    // Thin rope wrap marks (decorative rings at the ends)
    [-1, 1].forEach(side => {
        const rx = cx + side * (rw - 18);
        for (let ring = -1; ring <= 1; ring++) {
            c.beginPath();
            c.moveTo(rx + ring * 3.5, ry - rr);
            c.lineTo(rx + ring * 3.5, ry + rr);
            c.strokeStyle = `rgba(50, 28, 10, ${0.20 + Math.abs(ring) * 0.10})`;
            c.lineWidth   = ring === 0 ? 2.0 : 1.0;
            c.stroke();
        }
    });

    // Roller outline
    c.beginPath();
    c.roundRect(cx - rw, ry - rr, rw * 2, rh, rr);
    c.strokeStyle = 'rgba(26, 14, 5, 0.72)';
    c.lineWidth   = 1.5;
    c.stroke();
}

function _drawScrollText(c, sc, cx, top, bottom, sw) {
    const totalH  = bottom - top;

    c.textAlign = 'center';
    c.lineCap   = 'round';

    // Layout anchors 
    const titleFontSize = Math.round(sw * 0.118);
    const padTop        = totalH * 0.078;
    const titleBaseY    = top + padTop + titleFontSize;          // kanji baseline
    const rule1Y        = titleBaseY + 10;                       // rule below title
    const lineH         = totalH * 0.105;
    const linesTopY     = rule1Y + lineH * 1;                 // first tutorial line
    const rule2Y        = linesTopY + 4 * lineH + lineH * 0.18; // rule after lines
    const boxTop        = rule2Y + lineH * 0.24;                 // oath box top
    const boxH          = totalH * 0.165;
    const boxW          = sw * 0.46;

    // Store oath-box geometry so triggerBloodOath uses the same coords
    sc.oathBoxY = boxTop;
    sc.oathBoxH = boxH;
    sc.oathBoxW = boxW;

    // Title kanji 
    if (sc.textA > 0.01) {
        c.globalAlpha = sc.textA * sc.lineA[0];
        c.font      = `normal ${titleFontSize}px 'Yuji Boku', Georgia, serif`;
        c.fillStyle = 'rgba(26,18,9,0.90)';
        c.fillText('誓 約', cx, titleBaseY);

        c.globalAlpha = sc.textA * sc.lineA[0] * 0.28;
        const ruleW   = sw * 0.38;
        c.fillStyle   = 'rgba(26,18,9,1)';
        c.fillRect(cx - ruleW / 2, rule1Y, ruleW, 1);
    }

    // Tutorial lines 
    const lines = [
        { label: 'WASD',  desc: 'move'                   },
        { label: 'J',                desc: 'attack' },
        { label: 'K',                desc: 'dash attack'            },
        { label: 'survive',          desc: 'the waves'              },
    ];

    lines.forEach((ln, i) => {
        const li = i + 1;
        if (sc.lineA[li] < 0.01) return;
        c.globalAlpha = sc.textA * sc.lineA[li];
        const ly = linesTopY + i * lineH;

        c.textAlign = 'right';
        c.font      = `normal ${Math.round(sw * 0.052)}px 'Yuji Boku', Georgia, serif`;
        c.fillStyle = 'rgba(26,18,9,0.88)';
        c.fillText(ln.label, cx - sw * 0.030, ly);

        c.textAlign = 'center';
        c.font      = `300 ${Math.round(sw * 0.038)}px 'Noto Serif JP', Georgia, serif`;
        c.fillStyle = 'rgba(26,18,9,0.35)';
        c.fillText('➤', cx, ly);

        c.textAlign = 'left';
        c.font      = `300 ${Math.round(sw * 0.045)}px 'Noto Serif JP', Georgia, serif`;
        c.fillStyle = 'rgba(58,42,22,0.72)';
        c.fillText(ln.desc, cx + sw * 0.048, ly);
    });

    // Second ink rule
    if (sc.lineA[5] > 0.01) {
        c.globalAlpha = sc.textA * sc.lineA[5] * 0.22;
        const ruleW   = sw * 0.60;
        c.fillStyle   = 'rgba(26,18,9,1)';
        c.fillRect(cx - ruleW / 2, rule2Y, ruleW, 1);
    }

    // Oath box 
    if (sc.lineA[6] > 0.01) {
        const bx    = cx - boxW / 2;
        const boxCY = boxTop + boxH * 0.5;
        const pulse = sc.signed ? 1 : (0.55 + sc.oathPulse * 0.45);

        // Box background
        c.globalAlpha = sc.textA * sc.lineA[6] * 0.85;
        c.fillStyle   = 'rgba(230,215,192,0.55)';
        c.fillRect(bx, boxTop, boxW, boxH);

        // Dashed border
        c.globalAlpha = sc.textA * sc.lineA[6] * (sc.signed ? 0.35 : 1);
        c.strokeStyle = `rgba(139, 20, 20, ${pulse * 0.82})`;
        c.lineWidth   = 1.5;
        c.setLineDash([5, 4]);
        c.strokeRect(bx, boxTop, boxW, boxH);
        c.setLineDash([]);

        // Corner marks
        const cmS = 6;
        [[bx, boxTop], [bx + boxW, boxTop], [bx, boxTop + boxH], [bx + boxW, boxTop + boxH]]
            .forEach(([qx, qy], qi) => {
                const sx = qi % 2 === 0 ? 1 : -1;
                const sy = qi < 2 ? 1 : -1;
                c.globalAlpha = sc.textA * sc.lineA[6] * (sc.signed ? 0.25 : 0.55);
                c.strokeStyle = 'rgba(139,20,20,0.70)';
                c.lineWidth   = 1.4;
                c.beginPath();
                c.moveTo(qx, qy + sy * cmS); c.lineTo(qx, qy); c.lineTo(qx + sx * cmS, qy);
                c.stroke();
            });

        // Before signing: instruction text 
        if (!sc.signed) {
            c.globalAlpha = sc.textA * sc.lineA[6] * pulse;
            c.textAlign   = 'center';
            c.font        = `normal ${Math.round(sw * 0.042)}px 'Yuji Boku', Georgia, serif`;
            c.fillStyle   = 'rgba(139,20,20,0.80)';
            c.fillText('此処に血判を押せ', cx, boxCY - boxH * 0.06);

            c.font      = `300 ${Math.round(sw * 0.028)}px 'Noto Serif JP', Georgia, serif`;
            c.fillStyle = 'rgba(139,20,20,0.40)';
            c.fillText('SPACE  or  CLICK  to  seal', cx, boxCY + boxH * 0.28);
        }

        // After signing: blood smudge centered in box + '血判' caption below 
        if (sc.smudgeA > 0.01) {
            c.save();
            c.globalAlpha = sc.smudgeA * 0.90;
            c.translate(cx, boxCY);
            const smudgeR = boxH * 0.38;

            // Oval base
            c.beginPath();
            c.ellipse(0, 0, smudgeR * 1.15, smudgeR * 0.88, 0, 0, Math.PI * 2);
            c.fillStyle = 'rgba(130, 10, 10, 0.30)';
            c.fill();

            // Blob splatters
            sc.smudgeBlobs.forEach(b => {
                c.beginPath();
                c.ellipse(b.x * smudgeR, b.y * smudgeR,
                    smudgeR * b.s * 0.38, smudgeR * b.s * 0.22,
                    b.x * Math.PI, 0, Math.PI * 2);
                c.fillStyle = `rgba(110, 8, 8, ${b.a * sc.smudgeA})`;
                c.fill();
            });

            // Fingerprint whorls
            for (let w = 0; w < 4; w++) {
                const wr = smudgeR * (0.22 + w * 0.175);
                c.beginPath();
                c.ellipse(0, 0, wr * 1.12, wr * 0.78, 0, Math.PI * 0.18, Math.PI * 1.22);
                c.strokeStyle = `rgba(90, 5, 5, ${(0.35 - w * 0.06) * sc.smudgeA})`;
                c.lineWidth   = 1.1;
                c.stroke();
            }
            c.restore();

            // '血判' caption sits just below the oath box
            const captionY = boxTop + boxH + Math.round(sw * 0.048);
            c.globalAlpha  = sc.smudgeA * 0.85;
            c.textAlign    = 'center';
            c.font         = `normal ${Math.round(sw * 0.038)}px 'Yuji Boku', Georgia, serif`;
            c.fillStyle    = 'rgba(110,8,8,0.88)';
            c.fillText('血判', cx, captionY);
        }
    }

    c.globalAlpha = 1;
    c.textAlign   = 'left';
}

// SAKURA PETAL SYSTEM
class Petal {
    constructor(scattered = false) { this.init(scattered); }

    init(scattered = false) {
        this.x   = scattered ? Math.random() * (width + 80) - 40 : -30;
        this.y   = Math.random() * height;
        this.vx  = 0.55 + Math.random() * 1.15;
        this.vy  = (Math.random() - 0.5) * 0.38;
        this.sway      = Math.random() * Math.PI * 2;
        this.swaySpeed = 0.007 + Math.random() * 0.014;
        this.swayAmp   = 0.55 + Math.random() * 1.9;
        this.rot       = Math.random() * Math.PI * 2;
        this.rotSpeed  = (Math.random() - 0.5) * 0.038;
        this.size      = 4.5 + Math.random() * 4.5;
        this.alpha     = 0.22 + Math.random() * 0.32;

        const tones = [
            [198, 148, 162], [210, 158, 172],
            [184, 138, 152], [220, 162, 175]
        ];
        const t     = tones[Math.floor(Math.random() * tones.length)];
        this.r = t[0]; this.g = t[1]; this.b = t[2];
    }

    update() {
        this.sway += this.swaySpeed * (1 + globalWindForce * 2);
        // Wind massively boosts horizontal speed; sway flattens out in a gale
        const windVx = globalWindForce * 14;
        this.x    += this.vx + windVx;
        this.y    += (this.vy + Math.sin(this.sway) * this.swayAmp * 0.14) * (1 - globalWindForce * 0.75);
        this.rot  += this.rotSpeed * (1 + globalWindForce * 5);

        if (player) {
            const dx   = this.x - player.x;
            const dy   = this.y - player.y;
            const dist = Math.hypot(dx, dy);
            if (dist < 85 && dist > 0) {
                const f = (85 - dist) / 85 * 0.055;
                this.vx += (dx / dist) * f;
                this.vy += (dy / dist) * f;
            }
        }
        const baseVx = 0.55 + globalWindForce * 4;
        this.vx = baseVx + (this.vx - baseVx) * 0.985;
        this.vy *= 0.988;

        if (this.x > width + 45) this.init(false);
    }

    draw(c) {
        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.rot);
        c.globalAlpha = this.alpha;

        c.fillStyle = `rgba(${this.r}, ${this.g}, ${this.b}, 0.85)`;
        for (let i = 0; i < 5; i++) {
            c.save();
            c.rotate((i / 5) * Math.PI * 2);
            c.beginPath();
            c.ellipse(0, -this.size * 0.48, this.size * 0.27, this.size * 0.52, 0, 0, Math.PI * 2);
            c.fill();
            c.restore();
        }
        c.beginPath();
        c.arc(0, 0, this.size * 0.16, 0, Math.PI * 2);
        c.fillStyle = `rgba(${this.r - 20}, ${this.g - 15}, ${this.b - 15}, 0.7)`;
        c.fill();

        c.restore();
    }
}

let petals = [];
function initPetals() {
    petals = [];
    for (let i = 0; i < 22; i++) petals.push(new Petal(true));
}

// SAKURA ROLL, Cinematic Weapon Selection
// Horizontal strip carousel: blazing speed slows to inevitable fate.
// Weapon is pre-determined; animation is the revelation of destiny.

const SR = {
    TRANSITION: 45,   // ~0.75s smooth acceleration from rest
    STREAM:    120,   // ~2s of full-speed cruising
    SELECT:     85,
    REVEAL:    165,
    FADEOUT:    52,
};

let sakuraRoll  = null;
let scrollScene = null;   // Blood Oath scroll, shown on every BEGIN press

// Shared: proper 5-lobed sakura path with notched tips 
function srPetalPath(c, r) {
    c.beginPath();
    for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2 - Math.PI / 2;
        c.save(); c.rotate(a);
        const pw = r * 0.42, ph = r * 0.84, nd = r * 0.105;
        c.moveTo(0, 0);
        // Left edge of petal lobe
        c.bezierCurveTo(-pw * 0.38, -ph * 0.17, -pw * 0.94, -ph * 0.54, -nd, -(ph - nd));
        // Tip notch (characteristic sakura V-notch)
        c.quadraticCurveTo(0, -(ph + nd * 0.55), nd, -(ph - nd));
        // Right edge back to center
        c.bezierCurveTo(pw * 0.94, -ph * 0.54, pw * 0.38, -ph * 0.17, 0, 0);
        c.restore();
    }
}

// Ambient background petal (parallax depth layer) 
class SRAmbientPetal {
    constructor(scatter) { this._reset(scatter); }
    _reset(scatter) {
        this.x   = scatter ? Math.random() * (width + 60) - 30 : -42;
        this.y   = Math.random() * height;
        this.sz  = 3 + Math.random() * 11;
        this.vx  = 0.28 + Math.random() * 0.72;
        this.vy  = (Math.random() - 0.5) * 0.14;
        this.rot = Math.random() * Math.PI * 2;
        this.rs  = (Math.random() - 0.5) * 0.026;
        this.sw  = Math.random() * Math.PI * 2;
        this.sws = 0.014 + Math.random() * 0.022;
        this.a   = 0.05 + Math.random() * 0.15;
        // Petal tone variation
        const tones = [[205,150,163],[215,162,172],[195,140,154],[210,156,168]];
        const t = tones[Math.floor(Math.random() * tones.length)];
        this.cr = t[0]; this.cg = t[1]; this.cb = t[2];
    }
    update(wf) {
        this.sw += this.sws * (1 + wf * 1.8);
        this.x  += this.vx * (wf * 5.5 + 0.45);
        this.y  += (this.vy + Math.sin(this.sw) * 0.22) * (1 - wf * 0.72);
        this.rot += this.rs * (1 + wf * 6);
        if (this.x > width + 50) this._reset(false);
    }
    draw(c, wf = 0) {
        const s = this.sz;
        c.save();
        c.translate(this.x, this.y);
        const sx = 1 + wf * 3.5;
        c.scale(sx, Math.max(0.25, 1 / sx));
        c.rotate(this.rot);
        c.globalAlpha = this.a;
        // Soft petal fill
        const fg = c.createRadialGradient(0, -s * 0.2, 0, 0, 0, s);
        fg.addColorStop(0,   `rgba(${Math.min(this.cr+30,255)},${Math.min(this.cg+26,255)},${Math.min(this.cb+20,255)},0.92)`);
        fg.addColorStop(0.6, `rgba(${this.cr},${this.cg},${this.cb},0.78)`);
        fg.addColorStop(1,   `rgba(${this.cr-18},${this.cg-22},${this.cb-16},0.45)`);
        c.fillStyle = fg;
        srPetalPath(c, s); c.fill();
        c.restore();
    }
}

// Horizontal ink wind streak 
class SRWindLine {
    constructor() { this._reset(true); }
    _reset(scatter) {
        this.x     = scatter ? Math.random() * width : -300;
        this.y     = Math.random() * height;
        this.len   = 40 + Math.random() * 280;
        this.spd   = 5.5 + Math.random() * 9;
        this.maxA  = 0.018 + Math.random() * 0.055;
        this.a     = scatter ? this.maxA * Math.random() : 0;
        this.thick = 0.22 + Math.random() * 1.1;
        this.ang   = (Math.random() - 0.5) * 0.07;
        this.fadeIn = 0;
    }
    update(wf) {
        this.fadeIn = Math.min(1, this.fadeIn + 0.06);
        this.x += this.spd * Math.max(0.06, wf);
        // Opacity breathes with wind force
        this.a = this.maxA * wf * this.fadeIn;
        if (this.x > width + this.len + 20) this._reset(false);
    }
    draw(c) {
        if (this.a < 0.003) return;
        c.save();
        c.translate(this.x, this.y); c.rotate(this.ang); c.lineCap = 'round';
        const g = c.createLinearGradient(0, 0, this.len, 0);
        g.addColorStop(0,    `rgba(26,18,9,0)`);
        g.addColorStop(0.12, `rgba(26,18,9,${this.a})`);
        g.addColorStop(0.72, `rgba(26,18,9,${this.a * 0.65})`);
        g.addColorStop(1,    `rgba(26,18,9,0)`);
        c.beginPath(); c.moveTo(0, 0); c.lineTo(this.len, 0);
        c.lineWidth = this.thick; c.strokeStyle = g; c.stroke();
        c.restore();
    }
}

// Broad painterly wind-gust smear 
class SRWindGust {
    constructor() { this._reset(true); }
    _reset(scatter) {
        this.x    = scatter ? Math.random() * (width * 1.6) - width * 0.3 : -width * 0.5;
        this.y    = Math.random() * height;
        this.w    = width * (0.25 + Math.random() * 0.55);
        this.h    = 12 + Math.random() * 70;
        this.spd  = 7 + Math.random() * 11;
        this.maxA = 0.012 + Math.random() * 0.026;
        this.ang  = (Math.random() - 0.5) * 0.055;
    }
    update(wf) { this.x += this.spd * Math.max(0.04, wf); if (this.x > width + this.w + 40) this._reset(false); }
    draw(c, wf) {
        const a = this.maxA * wf;
        if (a < 0.002) return;
        c.save();
        c.translate(this.x, this.y); c.rotate(this.ang);
        const g = c.createLinearGradient(0, 0, this.w, 0);
        g.addColorStop(0,    `rgba(200,175,155,0)`);
        g.addColorStop(0.08, `rgba(200,175,155,${a})`);
        g.addColorStop(0.80, `rgba(200,175,155,${a * 0.45})`);
        g.addColorStop(1,    `rgba(200,175,155,0)`);
        c.fillStyle = g;
        c.fillRect(0, -this.h / 2, this.w, this.h);
        c.restore();
    }
}

// Fast wind-driven sakura petals (roll canvas only) 
class SRFastPetal {
    constructor(scatter) { this._reset(scatter); }
    _reset(scatter) {
        this.x      = scatter ? Math.random() * (width + 120) - 60 : -60;
        this.y      = Math.random() * height;
        this.sz     = 2.5 + Math.random() * 8;
        this.baseSpd= 1.2 + Math.random() * 2.8;
        this.vx     = this.baseSpd;
        this.vy     = (Math.random() - 0.5) * 0.7;
        this.rot    = Math.random() * Math.PI * 2;
        this.rs     = (Math.random() - 0.5) * 0.1;
        this.sw     = Math.random() * Math.PI * 2;
        this.sws    = 0.018 + Math.random() * 0.04;
        this.a      = 0.28 + Math.random() * 0.52;
        const tones = [[198,148,162],[212,160,174],[182,136,150],[224,168,180],[206,152,166]];
        const t = tones[Math.floor(Math.random() * tones.length)];
        this.r = t[0]; this.g = t[1]; this.b = t[2];
    }
    update(wf) {
        this.sw += this.sws * (1 + wf);
        const targetVx = this.baseSpd + wf * 42;
        this.vx += (targetVx - this.vx) * 0.1;
        this.vy += (Math.sin(this.sw) * 0.6 * (1 - wf * 0.8) - this.vy) * 0.06;
        this.x  += this.vx;
        this.y  += this.vy;
        this.rot += this.rs * (1 + wf * 4);
        if (this.x > width + 70) this._reset(false);
    }
    draw(c, wf) {
        if (this.a < 0.02) return;
        c.save();
        c.translate(this.x, this.y);
        const sx = 1 + wf * 3;
        c.scale(sx, Math.max(0.2, 1 - wf * 0.7));
        c.rotate(this.rot);
        c.globalAlpha = this.a;
        const s = this.sz;
        // Layered fill: highlight near centre, deepen to edges
        const fg = c.createRadialGradient(0, -s * 0.22, 0, 0, 0, s);
        fg.addColorStop(0,   `rgba(${Math.min(this.r+32,255)},${Math.min(this.g+28,255)},${Math.min(this.b+22,255)},0.90)`);
        fg.addColorStop(0.55,`rgba(${this.r},${this.g},${this.b},0.82)`);
        fg.addColorStop(1,   `rgba(${Math.max(this.r-22,0)},${Math.max(this.g-24,0)},${Math.max(this.b-20,0)},0.40)`);
        c.fillStyle = fg;
        srPetalPath(c, s); c.fill();
        c.restore();
    }
}

// Large weapon-bearing petal (strip item) 
class SRWeaponPetal {
    constructor(weapon, isChosen) {
        this.weapon    = weapon;
        this.isChosen  = isChosen;
        this.wobble    = Math.random() * Math.PI * 2;
        this.wobbleSpd = 0.016 + Math.random() * 0.014;
        this.selected  = false;
        this.inkDepth  = 0;
        this.bloomA    = 0;
        this.rippleR   = 0;
        this.rippleA   = 0;
        this.selScale  = 1.0;
        this.baseR     = 80;
        this.pr = 200 + Math.round(Math.random() * 14);
        this.pg = 150 + Math.round(Math.random() * 10);
        this.pb = 160 + Math.round(Math.random() * 12);
        this.inkOp = 0.60 + Math.random() * 0.28;
    }

    tickSelected() {
        if (!this.selected) return;
        this.inkDepth = Math.min(1, this.inkDepth + 0.022);
        this.selScale = Math.min(1.09, this.selScale + 0.0018);
        this.bloomA   = Math.min(1,   this.bloomA   + 0.030);
        this.rippleR += 1.9;
        this.rippleA  = Math.max(0, 0.56 - this.rippleR / 130);
    }

    _petalPath(c, r) { srPetalPath(c, r); }

    draw(c, x, y, scale, alpha, vx) {
        if (alpha < 0.04) return;
        const r   = this.baseR * scale * this.selScale;
        const rot = vx * 0.004;

        // Ghost trails, behind, in direction of travel
        if (vx > 5) {
            const steps = Math.min(6, Math.floor(vx / 5));
            for (let t = 1; t <= steps; t++) {
                const tx = x - vx * t * 0.38;   // trailing left (petals move right)
                const ta = alpha * (0.10 / t);
                const tr = r * (1 - t * 0.04);
                c.save(); c.translate(tx, y); c.rotate(rot); c.globalAlpha = ta;
                c.fillStyle = `rgba(${this.pr},${this.pg},${this.pb},0.85)`;
                srPetalPath(c, tr); c.fill();
                c.restore();
            }
        }

        c.save();
        c.translate(x, y); c.rotate(rot); c.globalAlpha = alpha;

        // Selection bloom glow
        if (this.bloomA > 0.01) {
            c.save(); c.globalAlpha = alpha * this.bloomA * 0.13;
            const bg = c.createRadialGradient(0, 0, r * 0.25, 0, 0, r * 2.4);
            bg.addColorStop(0,   'rgba(218,168,182,1)');
            bg.addColorStop(0.4, 'rgba(218,168,182,0.22)');
            bg.addColorStop(1,   'rgba(218,168,182,0)');
            c.beginPath(); c.arc(0, 0, r * 2.4, 0, Math.PI * 2);
            c.fillStyle = bg; c.fill(); c.restore();
            if (this.rippleA > 0.01) {
                c.save(); c.globalAlpha = alpha * this.rippleA;
                c.beginPath(); c.arc(0, 0, r * 0.9 + this.rippleR, 0, Math.PI * 2);
                c.strokeStyle = 'rgba(172,124,140,0.44)';
                c.lineWidth = 1.6; c.stroke(); c.restore();
            }
        }

        const id = this.inkDepth;

        // Petal fill: three-layer radial, backlit centre, warm mid, deep edge
        const pr = this.pr, pg = this.pg, pb = this.pb;
        const lightR = Math.min(pr + 38, 255), lightG = Math.min(pg + 32, 255), lightB = Math.min(pb + 25, 255);
        const deepR  = Math.max(pr - 28, 0),  deepG  = Math.max(pg - 34, 0),   deepB  = Math.max(pb - 28, 0);
        const fg = c.createRadialGradient(-r * 0.08, -r * 0.14, r * 0.02, 0, 0, r * 1.05);
        fg.addColorStop(0,    `rgba(${lightR},${lightG},${lightB},${0.90 + id * 0.08})`);
        fg.addColorStop(0.42, `rgba(${pr},${pg},${pb},${0.82 + id * 0.12})`);
        fg.addColorStop(0.78, `rgba(${deepR + 8},${deepG + 6},${deepB + 4},${0.72})`);
        fg.addColorStop(1,    `rgba(${deepR},${deepG},${deepB},0.42)`);
        c.fillStyle = fg;
        srPetalPath(c, r); c.fill();

        // Subtle inner highlight wash near centre
        c.save();
        c.globalAlpha = alpha * (0.22 - id * 0.10);
        const hg = c.createRadialGradient(0, -r * 0.08, 0, 0, 0, r * 0.55);
        hg.addColorStop(0, 'rgba(255,240,238,0.55)');
        hg.addColorStop(1, 'rgba(255,240,238,0)');
        c.beginPath(); c.arc(0, 0, r * 0.55, 0, Math.PI * 2);
        c.fillStyle = hg; c.fill();
        c.restore();

        // Ink outline removed 

        // Veins: one per petal, radiating from centre with branching
        c.save();
        c.globalAlpha = alpha * (0.09 + id * 0.16);
        c.strokeStyle = 'rgba(26,18,9,0.92)';
        c.lineWidth = 0.48; c.lineCap = 'round';
        for (let i = 0; i < 5; i++) {
            const va = (i / 5) * Math.PI * 2 - Math.PI / 2;
            c.save(); c.rotate(va);
            // Main vein
            c.beginPath(); c.moveTo(0, 0); c.quadraticCurveTo(0, -r * 0.44, 0, -r * 0.74); c.stroke();
            // Two lateral branches
            [-1, 1].forEach(s => {
                c.beginPath();
                c.moveTo(0, -r * 0.35);
                c.quadraticCurveTo(s * r * 0.14, -r * 0.52, s * r * 0.22, -r * 0.64);
                c.stroke();
            });
            c.restore();
        }
        c.restore();

        // Centre dot
        c.save();
        c.globalAlpha = alpha * (0.38 + id * 0.30);
        c.beginPath(); c.arc(0, 0, r * 0.072, 0, Math.PI * 2);
        c.fillStyle = `rgba(26,18,9,0.55)`; c.fill();
        c.restore();

        // Weapon icon
        this._icon(c, r);

        c.restore();
    }

    _icon(c, r) {
        const id = this.inkDepth;
        const a  = 0.52 + id * 0.36;
        const kanji = { Katana: '刀', Naginata: '薙刀', Kanabo: '金棒', Odachi: '大太刀', Kama: '鎌', Yumi: '弓', Sasumata: '刺股', Fukiya: '吹矢'};
        const k = kanji[this.weapon.name] || this.weapon.name;

        c.save();
        c.textAlign    = 'center';
        c.textBaseline = 'middle';

        // Kanji, large, brush-weight ink
        const kSize = Math.round(r * 0.52);
        c.font        = `${kSize}px 'Yuji Boku', 'Noto Serif JP', serif`;
        c.fillStyle   = `rgba(26,18,9,${a})`;
        c.fillText(k, 0, -r * 0.08);

        // English name, smaller, spaced beneath
        const eSize = Math.round(r * 0.155);
        c.font        = `${eSize}px 'Noto Serif JP', serif`;
        c.globalAlpha *= 0.72;
        c.letterSpacing = '0.12em';
        c.fillText(this.weapon.name.toUpperCase(), 0, r * 0.42);

        c.restore();
    }
}

// Horizontal Strip, the carousel engine
class SRStrip {
    constructor(weapons, chosenIdx, cx, cy) {
        this.weapons   = weapons;
        this.chosenIdx = chosenIdx;
        this.N         = weapons.length;
        this.spacing   = Math.max(220, Math.min(290, width * 0.22));
        this.strip     = this.N * this.spacing;
        this.cx = cx; this.cy = cy;
        this.scrollX     = 0;
        this.peakVx      = 88;
        this.vx          = 0;
        this.accelFrames = 0;
        this.targetScrollX   = null;
        this.initialVx       = 0;
        this.slowdownT       = 0;
        this.slowdownElapsed = 0;
        this.done      = false;
        this.petals    = weapons.map((w, i) => new SRWeaponPetal(w, i === chosenIdx));
    }

    _setTarget() {
        this.initialVx = this.vx;
        // Linear decel from v0->0 over T frames covers v0*T/2 pixels
        // Aim for ~3 seconds (180 frames) of deceleration
        const T_IDEAL   = 180;
        const idealDist = this.initialVx * T_IDEAL / 2;
        // For chosen petal at cx with +scrollX formula:
        // scrollX % strip ≡ -chosenIdx*spacing (mod strip)
        const base = ((- this.chosenIdx * this.spacing) % this.strip + this.strip) % this.strip;
        const ideal = this.scrollX + idealDist;
        let target  = base;
        while (target < ideal - this.strip * 0.5) target += this.strip;
        if (Math.abs(target - this.strip - ideal) < Math.abs(target - ideal)) target -= this.strip;
        this.targetScrollX   = target;
        const actualDist = target - this.scrollX;
        this.slowdownT       = Math.max(90, Math.round(2 * actualDist / this.initialVx));
        this.slowdownElapsed = 0;
    }

    update(phase) {
        if (phase === 'TRANSITION') {
            // Quadratic ease-in: 0 -> peakVx over TRANSITION frames
            this.accelFrames++;
            const t = Math.min(1, this.accelFrames / SR.TRANSITION);
            this.vx = this.peakVx * (t * t);
            this.scrollX += this.vx;

        } else if (phase === 'STREAM') {
            // Constant cruise at peak speed
            this.vx = this.peakVx;
            this.scrollX += this.vx;

        } else if (phase === 'SLOWDOWN') {
            if (!this.targetScrollX) this._setTarget();
            this.slowdownElapsed++;
            const frac = this.slowdownElapsed / this.slowdownT;
            if (frac >= 1 || Math.abs(this.targetScrollX - this.scrollX) < 0.8) {
                this.scrollX = this.targetScrollX;
                this.vx = 0;
                this.done = true;
            } else {
                // Linear time-based decel, constant deceleration, feels intentional
                this.vx = Math.max(0.5, this.initialVx * (1 - frac));
                this.scrollX += this.vx;
            }

        } else {
            // SELECT/REVEAL tiny residual drift
            this.vx = Math.max(0, this.vx * 0.80);
            this.scrollX += this.vx;
        }
        this.petals.forEach(p => p.tickSelected());
    }

    draw(c) {
        // Screen x of petal i in copy k:
        // x = cx + ( +(scrollX % strip) + i*spacing ) + k*strip  → moves RIGHT with wind
        const base   = +(this.scrollX % this.strip);
        const visible = [];

        // Render enough copies to fill screen edge-to-edge (endless illusion)
        const copies = Math.ceil(width / this.strip) + 3;
        for (let k = -copies; k <= copies; k++) {
            this.petals.forEach((p, i) => {
                const x = this.cx + base + i * this.spacing + k * this.strip;
                if (x < -200 || x > width + 200) return;
                const dist   = Math.abs(x - this.cx);
                const maxD   = width * 0.56;
                const frac   = Math.min(1, dist / maxD);
                // Petals at center: full size/opacity. Edges: smaller, dimmer.
                const scale  = Math.max(0.40, 1 - frac * 0.52);
                const alpha  = Math.max(0.08, 1 - frac * 0.88);
                visible.push({ p, x, y: this.cy, scale, alpha, dist });
            });
        }

        // Draw far-to-near (depth ordering)
        visible.sort((a, b) => b.dist - a.dist);
        visible.forEach(({ p, x, y, scale, alpha }) => {
            p.draw(c, x, y, scale, alpha, this.vx);
        });
    }
}

// SAKURA ROLL Orchestrator
function initSakuraRoll(chosenWeapon) {
    const allW = [WEAPONS.Katana, WEAPONS.Naginata, WEAPONS.Kanabo, WEAPONS.Odachi];
    // Shuffle others; place chosen at a central slot (1 or 2) for good visual landing
    const others    = allW.filter(w => w !== chosenWeapon).sort(() => Math.random() - 0.5);
    const chosenIdx = 1 + Math.floor(Math.random() * 2);
    const weapons   = [...others];
    weapons.splice(chosenIdx, 0, chosenWeapon);

    const cx = width / 2, cy = height / 2;

    const ambients = [];
    for (let i = 0; i < 55; i++) ambients.push(new SRAmbientPetal(i < 28));

    const windLines = [];
    for (let i = 0; i < 32; i++) windLines.push(new SRWindLine());

    const windGusts = [];
    for (let i = 0; i < 8; i++) windGusts.push(new SRWindGust());

    const fastPetals = [];
    for (let i = 0; i < 60; i++) fastPetals.push(new SRFastPetal(i < 30));

    sakuraRoll = {
        chosenWeapon,
        phase:    'TRANSITION',
        timer:    SR.TRANSITION,
        overlayA: 0,
        zoneGlow: 0,
        textA: 0, subA: 0, hintA: 0, fadeA: 0,
        cx, cy,
        strip: new SRStrip(weapons, chosenIdx, cx, cy),
        ambients,
        windLines,
        windGusts,
        fastPetals,
    };
}

function updateSakuraRoll() {
    const sr = sakuraRoll;
    if (!sr) return;

    // Wind-force proxy for ambient elements (0 = calm, 1 = full speed)
    const wf = Math.min(1, sr.strip.vx / sr.strip.peakVx);
    globalWindForce = wf;   // share with main-canvas petal system
    sr.ambients.forEach(p  => p.update(wf));
    sr.windLines.forEach(wl => wl.update(wf));
    sr.windGusts.forEach(g  => g.update(wf));
    sr.fastPetals.forEach(p => p.update(wf));

    sr.timer--;
    sr.strip.update(sr.phase);

    switch (sr.phase) {

        case 'TRANSITION': {
            const t = 1 - sr.timer / SR.TRANSITION;
            sr.overlayA = t;
            if (sr.timer <= 0) { sr.phase = 'STREAM'; sr.timer = SR.STREAM; }
            break;
        }

        case 'STREAM': {
            // Run at full speed, then hand off to SLOWDOWN
            if (sr.timer <= 0) { sr.phase = 'SLOWDOWN'; sr.timer = 9999; }
            break;
        }

        case 'SLOWDOWN': {
            const t = 1 - Math.min(1, sr.strip.vx / sr.strip.peakVx);
            sr.zoneGlow = Math.min(1, t * 1.5);
            if (sr.strip.done) {
                // Mark the destined petal
                sr.strip.petals[sr.strip.chosenIdx].selected = true;
                sr.phase = 'SELECT'; sr.timer = SR.SELECT;
            }
            break;
        }

        case 'SELECT': {
            sr.zoneGlow = 1;
            if (sr.timer <= 0) { sr.phase = 'REVEAL'; sr.timer = SR.REVEAL; }
            break;
        }

        case 'REVEAL': {
            const t = 1 - sr.timer / SR.REVEAL;
            if (t > 0.14) sr.textA = Math.min(1, (t - 0.14) / 0.28);
            if (t > 0.46) { sr.subA = Math.min(1, (t - 0.46) / 0.26); sr.hintA = sr.subA * 0.44; }
            if (sr.timer <= 0) { sr.phase = 'FADEOUT'; sr.timer = SR.FADEOUT; }
            break;
        }

        case 'FADEOUT': {
            sr.fadeA = 1 - sr.timer / SR.FADEOUT;
            if (sr.timer <= 0) {
                const w = sr.chosenWeapon;
                sakuraRoll = null;
                player.weapon = w;
                nextWave();
            }
            break;
        }
    }
}

function skipSakuraRoll() {
    const sr = sakuraRoll;
    if (!sr || sr.phase === 'FADEOUT') return;
    if (sr.phase === 'REVEAL') { sr.phase = 'FADEOUT'; sr.timer = SR.FADEOUT; return; }
    // Snap to final state
    const strip = sr.strip;
    strip.targetScrollX = strip.targetScrollX ||
        (strip.chosenIdx * strip.spacing + strip.strip * 3);
    strip.scrollX = strip.targetScrollX;
    strip.vx = 0; strip.done = true;
    const cp = strip.petals[strip.chosenIdx];
    if (cp) { cp.selected = true; cp.inkDepth = 1; cp.selScale = 1.09; cp.bloomA = 1; }
    sr.overlayA = 1; sr.zoneGlow = 1;
    sr.textA = 1; sr.subA = 1; sr.hintA = 0.44;
    sr.phase = 'REVEAL'; sr.timer = SR.REVEAL;
}

function drawSakuraRoll() {
    const sr = sakuraRoll;
    if (!sr) return;
    const { cx, cy } = sr;

    const wf = Math.min(1, sr.strip.vx / sr.strip.peakVx);

    // Parchment wash overlay
    ctx.save();
    ctx.globalAlpha = Math.min(sr.overlayA, 1) * 0.93;
    const pG = ctx.createRadialGradient(cx, cy, 55, cx, cy, height * 0.88);
    pG.addColorStop(0,   'rgba(240,232,216,0.97)');
    pG.addColorStop(0.58,'rgba(230,220,202,0.96)');
    pG.addColorStop(1,   'rgba(215,202,180,0.98)');
    ctx.fillStyle = pG; ctx.fillRect(0, 0, width, height);
    ctx.restore();

    // Wind gusts behind everything, broad smears
    sr.windGusts.forEach(g => g.draw(ctx, wf));

    // Ambient drifting petals (background depth)
    ctx.save(); ctx.globalAlpha = sr.overlayA * 0.95;
    sr.ambients.forEach(p => p.draw(ctx, wf));
    ctx.restore();

    // Horizontal wind lines
    sr.windLines.forEach(wl => wl.draw(ctx));

    // Fast wind-driven petals (foreground layer)
    ctx.save(); ctx.globalAlpha = sr.overlayA;
    sr.fastPetals.forEach(p => p.draw(ctx, wf));
    ctx.restore();

    // Center selection zone glow
    if (sr.zoneGlow > 0.01) {
        ctx.save();
        const gA = sr.zoneGlow * 0.095;
        const zG = ctx.createRadialGradient(cx, cy, 22, cx, cy, 145);
        zG.addColorStop(0,   `rgba(195,162,115,${gA * 1.6})`);
        zG.addColorStop(0.5, `rgba(195,162,115,${gA})`);
        zG.addColorStop(1,   'rgba(195,162,115,0)');
        ctx.beginPath(); ctx.arc(cx, cy, 145, 0, Math.PI * 2);
        ctx.fillStyle = zG; ctx.fill();
        // Subtle vertical divider lines flanking center (slot-machine feel)
        const hw = sr.strip.spacing * 0.5;
        ctx.globalAlpha = sr.zoneGlow * 0.055;
        ctx.strokeStyle = 'rgba(90,58,28,0.55)';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 8]);
        [cx - hw, cx + hw].forEach(lx => {
            ctx.beginPath(); ctx.moveTo(lx, cy - 115); ctx.lineTo(lx, cy + 115); ctx.stroke();
        });
        ctx.setLineDash([]);
        ctx.restore();
    }

    // The carousel strip
    sr.strip.draw(ctx);

    // Weapon name reveal
    if (sr.textA > 0.01) _drawSRText(sr);

    // Fade-out white wash
    if (sr.fadeA > 0.01) {
        ctx.save();
        ctx.globalAlpha = sr.fadeA;
        ctx.fillStyle = 'rgba(240,232,216,1)';
        ctx.fillRect(0, 0, width, height);
        ctx.restore();
    }
}

function _drawSRText(sr) {
    const { cx, cy, chosenWeapon: w, textA, subA, hintA } = sr;
    ctx.save(); ctx.textAlign = 'center';

    // "you obtained" sits above the petal
    if (subA > 0.01) {
        ctx.globalAlpha = subA * textA;
        ctx.font = `300 ${Math.round(width * 0.013)}px 'Noto Serif JP', Georgia, serif`;
        ctx.fillStyle = 'rgba(90,58,28,0.52)';
        ctx.letterSpacing = '0.22em';
        ctx.fillText('you  obtained', cx, cy - 118);
        // thin rule under it
        ctx.globalAlpha = subA * textA * 0.20;
        const rw = 120;
        ctx.fillStyle = 'rgba(26,18,9,1)';
        ctx.fillRect(cx - rw / 2, cy - 104, rw, 1);
        ctx.letterSpacing = '0px';
    }

    // Weapon name sits below the petal
    const nameY = cy + 108;
    const fs = Math.round(Math.min(width * 0.058, 72));
    ctx.letterSpacing = '0px';
    // Drop shadow
    ctx.globalAlpha = textA * 0.08;
    ctx.fillStyle = 'rgba(26,18,9,1)';
    ctx.font = `normal ${fs}px 'Yuji Boku', Georgia, serif`;
    ctx.fillText(w.name.toUpperCase(), cx + 2, nameY + 4);
    // Main text
    const [ri, gi, bi] = w.slashRGB;
    ctx.globalAlpha = textA;
    ctx.fillStyle = `rgba(${Math.max(ri-8,0)},${Math.max(gi-8,0)},${Math.max(bi-8,0)},0.88)`;
    ctx.fillText(w.name.toUpperCase(), cx, nameY);

    // Thin rule under weapon name
    if (subA > 0.01) {
        ctx.globalAlpha = subA * textA * 0.22;
        const nrw = Math.min(w.name.length * fs * 0.28, 220);
        ctx.fillStyle = 'rgba(26,18,9,1)';
        ctx.fillRect(cx - nrw / 2, nameY + 14, nrw, 1);
    }

    // "press space" hint, further below
    if (hintA > 0.01) {
        ctx.globalAlpha = hintA * textA;
        ctx.font = `300 ${Math.round(width * 0.009)}px 'Noto Serif JP', Georgia, serif`;
        ctx.fillStyle = 'rgba(26,18,9,0.44)';
        ctx.letterSpacing = '0.18em';
        ctx.fillText('THE INK GIFTS YOU', cx, nameY + 48);
        ctx.letterSpacing = '0px';
    }

    ctx.restore();
}



// WEAPON RENDERING HELPER
// pullback: 0-5 (windup pull), isDash: boolean (blade extends)
// drawMode: 0=normal, 1=arrow-as-blade (Yumi melee/dash mode)
function drawWeaponHeld(c, angle, weapon, pullback, isDash, scale = 1, sideFlip = 1, drawMode = 0) {
    c.save();
    c.rotate(angle);
    // Apply foreshortening along blade axis; sideFlip mirrors for Kama hook direction
    c.scale(scale, sideFlip);
    c.lineCap   = 'round';
    c.lineJoin  = 'round';

    const [ri, gi, bi] = weapon.slashRGB;
    const pb = -pullback; // pullback direction

    switch (weapon.name) {

        case 'Katana': {
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.90)`;
            c.lineWidth   = 4.2;
            c.beginPath();
            c.moveTo(pb + 7, 0);
            c.lineTo(pb + 18, 0);
            c.stroke();

            for (let k = 0; k < 3; k++) {
                const kx = pb + 9 + k * 3.5;
                c.beginPath();
                c.moveTo(kx, -2.5); c.lineTo(kx + 1.5, 2.5);
                c.strokeStyle = `rgba(${ri + 40}, ${gi + 30}, ${bi + 15}, 0.55)`;
                c.lineWidth   = 0.9;
                c.stroke();
            }

            c.beginPath();
            c.ellipse(pb + 18, 0, 3.8, 5.2, 0, 0, Math.PI * 2);
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.80)`;
            c.lineWidth   = 1.6;
            c.stroke();
            c.fillStyle = `rgba(${ri + 10}, ${gi + 8}, ${bi + 5}, 0.12)`;
            c.fill();

            const kLen = isDash ? 63 : 58;
            c.beginPath();
            c.moveTo(pb + 18, 0);
            c.quadraticCurveTo(pb + 38, -1.6, pb + kLen, -0.7);
            c.strokeStyle = `rgba(${Math.min(ri + 60, 200)}, ${Math.min(gi + 58, 185)}, ${Math.min(bi + 50, 165)}, 0.92)`;
            c.lineWidth   = 2.4;
            c.stroke();

            c.beginPath();
            c.moveTo(pb + 22, -1.0);
            c.quadraticCurveTo(pb + 40, -2.8, pb + kLen, -1.8);
            c.strokeStyle = `rgba(228, 218, 198, 0.52)`;
            c.lineWidth   = 0.7;
            c.stroke();

            c.beginPath();
            c.moveTo(pb + kLen, -0.7);
            c.lineTo(pb + kLen + 5.5, -3.8);
            c.lineTo(pb + kLen + 6.5, -0.4);
            c.strokeStyle = `rgba(${ri + 45}, ${gi + 42}, ${bi + 32}, 0.85)`;
            c.lineWidth   = 1.0;
            c.stroke();
            break;
        }

        case 'Naginata': {
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.87)`;
            c.lineWidth   = 2.6;
            c.beginPath();
            c.moveTo(pb + 5, 0);
            c.lineTo(pb + 68, 0);
            c.stroke();

            [20, 42].forEach(kx => {
                c.beginPath();
                c.ellipse(pb + kx, 0, 1.4, 4.2, 0, 0, Math.PI * 2);
                c.strokeStyle = `rgba(${ri + 22}, ${gi + 18}, ${bi + 8}, 0.62)`;
                c.lineWidth   = 1.0;
                c.stroke();
            });

            const nx = pb + 68;
            c.beginPath();
            c.moveTo(nx, 0);
            c.bezierCurveTo(nx + 7, -4.5, nx + 17, -5.5, nx + 22, -1.2);
            c.bezierCurveTo(nx + 19, 3.5,  nx + 8,  3.2,  nx, 0);
            c.fillStyle   = `rgba(${Math.min(ri + 40, 200)}, ${Math.min(gi + 40, 185)}, ${Math.min(bi + 28, 160)}, 0.90)`;
            c.fill();
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.82)`;
            c.lineWidth   = 0.9;
            c.stroke();

            c.beginPath();
            c.moveTo(nx + 5, -2.2);
            c.quadraticCurveTo(nx + 15, -4.5, nx + 21, -1.2);
            c.strokeStyle = 'rgba(222, 212, 196, 0.46)';
            c.lineWidth   = 0.65;
            c.stroke();
            break;
        }

        case 'Kanabo': {
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.90)`;
            c.lineWidth   = 4.8;
            c.lineCap     = 'round';
            c.beginPath();
            c.moveTo(pb + 5, 0);
            c.lineTo(pb + 16, 0);
            c.stroke();

            c.lineWidth   = 8;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.88)`;
            c.beginPath();
            c.moveTo(pb + 15, 0);
            c.lineTo(pb + 42, 0);
            c.stroke();

            c.lineWidth   = 11.5;
            c.strokeStyle = `rgba(${ri + 12}, ${gi + 9}, ${bi + 5}, 0.90)`;
            c.beginPath();
            c.moveTo(pb + 38, 0);
            c.lineTo(pb + 52, 0);
            c.stroke();

            const studPos = [
                [20, -1], [26, 3.2], [26, -3.5],
                [32, -0.5], [38, 3],  [38, -3],
                [44, 0.5], [50, -1.5]
            ];
            studPos.forEach(([sx, sy]) => {
                c.beginPath();
                c.arc(pb + sx, sy, 3.0, 0, Math.PI * 2);
                c.fillStyle   = `rgba(${ri + 28}, ${gi + 22}, ${bi + 12}, 0.94)`;
                c.fill();
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.6)`;
                c.lineWidth   = 0.7;
                c.stroke();
                c.beginPath();
                c.arc(pb + sx - 0.8, sy - 0.8, 0.9, 0, Math.PI * 2);
                c.fillStyle = `rgba(${ri + 60}, ${gi + 50}, ${bi + 30}, 0.35)`;
                c.fill();
            });
            break;
        }

        case 'Odachi': {
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.90)`;
            c.lineWidth   = 5.0;
            c.beginPath();
            c.moveTo(pb + 3, 0);
            c.lineTo(pb + 24, 0);
            c.stroke();

            for (let k = 0; k < 6; k++) {
                const kx = pb + 5 + k * 3.2;
                c.beginPath();
                c.moveTo(kx, -2.8); c.lineTo(kx + 1.8, 2.8);
                c.strokeStyle = `rgba(${ri + 35}, ${gi + 25}, ${bi + 10}, 0.52)`;
                c.lineWidth   = 0.9;
                c.stroke();
            }

            c.beginPath();
            c.ellipse(pb + 24, 0, 5.5, 7.5, 0, 0, Math.PI * 2);
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.80)`;
            c.lineWidth   = 2.0;
            c.stroke();
            c.fillStyle = `rgba(${ri + 8}, ${gi + 6}, ${bi + 3}, 0.10)`;
            c.fill();

            const odLen = isDash ? 90 : 84;
            c.beginPath();
            c.moveTo(pb + 24, 0);
            c.quadraticCurveTo(pb + 54, -2.2, pb + odLen, -1.2);
            c.strokeStyle = `rgba(${Math.min(ri + 55, 195)}, ${Math.min(gi + 45, 168)}, ${Math.min(bi + 35, 145)}, 0.92)`;
            c.lineWidth   = 5.0;
            c.stroke();

            c.beginPath();
            c.moveTo(pb + 24, 0.9);
            c.quadraticCurveTo(pb + 54, -1.2, pb + odLen, -0.5);
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.55)`;
            c.lineWidth   = 1.6;
            c.stroke();

            c.beginPath();
            c.moveTo(pb + 28, -1.5);
            c.quadraticCurveTo(pb + 55, -3.8, pb + odLen, -2.5);
            c.strokeStyle = 'rgba(222, 208, 188, 0.44)';
            c.lineWidth   = 0.85;
            c.stroke();

            c.beginPath();
            c.moveTo(pb + odLen, -1.2);
            c.lineTo(pb + odLen + 8, -5.5);
            c.lineTo(pb + odLen + 9, -0.5);
            c.strokeStyle = `rgba(${ri + 42}, ${gi + 36}, ${bi + 25}, 0.88)`;
            c.lineWidth   = 1.3;
            c.stroke();
            break;
        }

        case 'Kama': {
            // Short curved sickle, hook faces inward
            const kmLen = isDash ? 46 : 42;
            // Handle
            c.beginPath();
            c.moveTo(pb, 0);
            c.lineTo(pb + kmLen * 0.60, 0);
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.88)`;
            c.lineWidth   = 2.4;
            c.stroke();
            // Curved blade: quadratic arc curving upward (hook blade)
            c.beginPath();
            c.moveTo(pb + kmLen * 0.55, 0);
            c.quadraticCurveTo(pb + kmLen * 0.85, -4, pb + kmLen, -14);
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.90)`;
            c.lineWidth   = 2.0;
            c.stroke();
            // Blade back edge (thicker body)
            c.beginPath();
            c.moveTo(pb + kmLen * 0.57, 1.5);
            c.quadraticCurveTo(pb + kmLen * 0.82, -2, pb + kmLen - 1, -12.5);
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.55)`;
            c.lineWidth   = 3.8;
            c.stroke();
            // Glint on cutting edge
            c.beginPath();
            c.moveTo(pb + kmLen * 0.60, -1.2);
            c.quadraticCurveTo(pb + kmLen * 0.88, -5.5, pb + kmLen, -13.2);
            c.strokeStyle = 'rgba(220, 210, 192, 0.42)';
            c.lineWidth   = 0.7;
            c.stroke();
            // Hook tip bead
            c.beginPath();
            c.arc(pb + kmLen, -14, 2.0, 0, Math.PI * 2);
            c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, 0.80)`;
            c.fill();
            break;
        }

        case 'Yumi': {
            if (isDash || drawMode === 1) {
                // Arrow-as-blade mode: hold the arrow like a short stabbing weapon
                const arrowLen = isDash ? 52 : 44;
                // Shaft
                c.beginPath();
                c.moveTo(pb - 10, 0);
                c.lineTo(pb + arrowLen * 0.72, 0);
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.85)`;
                c.lineWidth   = 1.8;
                c.stroke();
                // Arrowhead (larger for close-combat presence)
                c.beginPath();
                c.moveTo(pb + arrowLen * 0.72, 0);
                c.lineTo(pb + arrowLen * 0.72 - 7, -4.5);
                c.lineTo(pb + arrowLen * 0.72 - 7,  4.5);
                c.closePath();
                c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, 0.88)`;
                c.fill();
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.70)`;
                c.lineWidth   = 0.8;
                c.stroke();
                // Fletching at tail
                c.beginPath();
                c.moveTo(pb - 6, 0);
                c.lineTo(pb - 14, -5);
                c.lineWidth   = 1.0;
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.48)`;
                c.stroke();
                c.beginPath();
                c.moveTo(pb - 6, 0);
                c.lineTo(pb - 14,  5);
                c.stroke();
                // Grip wrap (hand position indicator)
                c.beginPath();
                c.moveTo(pb + 4, -3.2);
                c.lineTo(pb + 10, -3.2);
                c.lineTo(pb + 10,  3.2);
                c.lineTo(pb + 4,   3.2);
                c.closePath();
                c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, 0.14)`;
                c.fill();
            } else {
                // Normal bow mode (shot/aim)
                const ymOffset = pb + 14;
                const ymH   = 56;
                const ymBot = ymH * 0.65;
                const ymTop = ymH * 0.35;
                const ymBow = 10;
                // Lower limb (longer)
                c.beginPath();
                c.moveTo(ymOffset, ymBot);
                c.quadraticCurveTo(ymOffset + ymBow, 0, ymOffset, -ymTop);
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.85)`;
                c.lineWidth   = 3.2;
                c.stroke();
                // Bowstring
                c.beginPath();
                c.moveTo(ymOffset, ymBot);
                c.lineTo(ymOffset, -ymTop);
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.50)`;
                c.lineWidth   = 0.8;
                c.stroke();
                // Arrow nocked on string
                const arrowTip = ymOffset + ymBow + 18;
                c.beginPath();
                c.moveTo(ymOffset - 8, 0);
                c.lineTo(arrowTip, 0);
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.72)`;
                c.lineWidth   = 1.2;
                c.stroke();
                // Arrowhead
                c.beginPath();
                c.moveTo(arrowTip, 0);
                c.lineTo(arrowTip - 5, -3.5);
                c.lineTo(arrowTip - 5,  3.5);
                c.closePath();
                c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, 0.80)`;
                c.fill();
                // Fletching
                c.beginPath();
                c.moveTo(ymOffset - 8, 0);
                c.lineTo(ymOffset - 14, -4);
                c.lineWidth   = 0.9;
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.45)`;
                c.stroke();
                c.beginPath();
                c.moveTo(ymOffset - 8, 0);
                c.lineTo(ymOffset - 14, 4);
                c.stroke();
            }
            break;
        }

        case 'Sasumata': {
            const ssLen  = isDash ? 95 : 84;
            const forkW  = isDash ? 17 : 14;
            const forkD  = isDash ? 20 : 16;
            const fx     = pb + ssLen;

            // Butt cap, the blunt end (this is what hits in Kachi-age)
            c.beginPath();
            c.arc(pb, 0, 3.2, 0, Math.PI * 2);
            c.fillStyle   = `rgba(${ri}, ${gi}, ${bi}, 0.72)`;
            c.fill();
            c.beginPath();
