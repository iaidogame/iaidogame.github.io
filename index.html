            c.arc(pb + 0.5, -0.5, 1.2, 0, Math.PI * 2);
            c.fillStyle = 'rgba(60, 45, 28, 0.30)';
            c.fill();

            // Heavy shaft, two-section (thin near butt, slightly heavier near fork)
            c.beginPath();
            c.moveTo(pb + 2, 0);
            c.lineTo(pb + ssLen * 0.50, 0);
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.82)`;
            c.lineWidth   = 2.8;
            c.stroke();
            c.beginPath();
            c.moveTo(pb + ssLen * 0.48, 0);
            c.lineTo(fx - forkW * 0.12, 0);
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.84)`;
            c.lineWidth   = 3.4;
            c.stroke();

            // Grip wrap, three dark bands along the shaft (gives it a real tool feel)
            [0.22, 0.42, 0.62].forEach(t => {
                const gx = pb + ssLen * t;
                c.beginPath();
                c.moveTo(gx - 2, -3.2);
                c.lineTo(gx + 2, -3.2);
                c.lineTo(gx + 2,  3.2);
                c.lineTo(gx - 2,  3.2);
                c.closePath();
                c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, 0.18)`;
                c.fill();
            });

            // Shaft glint
            c.beginPath();
            c.moveTo(pb + 4, -1.0);
            c.lineTo(fx - forkW * 0.18, -1.0);
            c.strokeStyle = 'rgba(218, 208, 190, 0.26)';
            c.lineWidth   = 0.7;
            c.stroke();

            // Upper prong, curves inward (the catching hook shape)
            c.beginPath();
            c.moveTo(fx - forkW * 0.15, -forkW);
            c.quadraticCurveTo(fx + forkD * 0.52, -forkW, fx + forkD, -forkW * 0.28);
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.92)`;
            c.lineWidth   = 2.4;
            c.stroke();

            // Lower prong, mirrors upper
            c.beginPath();
            c.moveTo(fx - forkW * 0.15,  forkW);
            c.quadraticCurveTo(fx + forkD * 0.52,  forkW, fx + forkD,  forkW * 0.28);
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.92)`;
            c.lineWidth   = 2.4;
            c.stroke();

            // Cross-bar connecting prong roots
            c.beginPath();
            c.moveTo(fx - forkW * 0.15, -forkW);
            c.lineTo(fx - forkW * 0.15,  forkW);
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.88)`;
            c.lineWidth   = 2.8;
            c.stroke();

            // Inner channel shadow, the trap zone where a neck/arm gets caught
            c.beginPath();
            c.moveTo(fx, -forkW * 0.52);
            c.quadraticCurveTo(fx + forkD * 0.78, 0, fx, forkW * 0.52);
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.10)`;
            c.lineWidth   = forkW * 0.85;
            c.lineJoin    = 'round';
            c.stroke();

            // Small rivets where prongs meet the crossbar
            [-forkW, forkW].forEach(py => {
                c.beginPath();
                c.arc(fx - forkW * 0.15, py, 2.2, 0, Math.PI * 2);
                c.fillStyle   = `rgba(${ri + 20}, ${gi + 16}, ${bi + 10}, 0.60)`;
                c.fill();
            });

            // Inward-curving tip spikes (the actual catching points)
            [[fx + forkD, -forkW * 0.28], [fx + forkD, forkW * 0.28]].forEach(([tx, ty]) => {
                c.beginPath();
                c.arc(tx, ty, 2.2, 0, Math.PI * 2);
                c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, 0.85)`;
                c.fill();
                // Tiny glint on the tip
                c.beginPath();
                c.arc(tx - 0.6, ty - 0.6, 0.8, 0, Math.PI * 2);
                c.fillStyle = 'rgba(215, 205, 188, 0.50)';
                c.fill();
            });
            break;
        }

        case 'Fukiya': {
            // Blowpipe, mouthpiece rests near face, tube points straight at target
            const fkLen = isDash ? 68 : 60;
            // Main tube
            c.beginPath();
            c.moveTo(pb + 2, 0);
            c.lineTo(pb + fkLen, 0);
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.82)`;
            c.lineWidth   = 2.8;
            c.stroke();
            // Bore hollow (centre line, tube is hollow)
            c.beginPath();
            c.moveTo(pb + 6, 0);
            c.lineTo(pb + fkLen - 4, 0);
            c.strokeStyle = 'rgba(8, 4, 2, 0.38)';
            c.lineWidth   = 0.8;
            c.stroke();
            // Mouthpiece, small flared ring at the near end
            c.beginPath();
            c.arc(pb + 2, 0, 3.5, 0, Math.PI * 2);
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.70)`;
            c.lineWidth   = 1.4;
            c.stroke();
            // Tip opening, tiny circle at the business end
            c.beginPath();
            c.arc(pb + fkLen, 0, 1.6, 0, Math.PI * 2);
            c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, 0.82)`;
            c.fill();
            // Subtle glint
            c.beginPath();
            c.moveTo(pb + 8, -1.0);
            c.lineTo(pb + fkLen - 5, -1.0);
            c.strokeStyle = 'rgba(215, 205, 188, 0.26)';
            c.lineWidth   = 0.6;
            c.stroke();
            break;
        }
    }

    c.restore();
}

// PLAYER, Ronin with Auto-Lock
class Player {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.radius    = 12;
        this.baseSpeed = 4.5;
        this.maxHp = 5; this.hp = this.maxHp;
        this.weapon    = WEAPONS.Katana;

        // Auto-lock facing
        this.facingAngle = 0;

        // Weapon side: 1 = right of facing, -1 = left. Flips each light attack.
        this.weaponSide  = 1;
        // Records which side the current slash started from
        this.slashStartSide = 1;

        // State machine
        this.state        = 'IDLE';
        this.stateTimer   = 0;
        this.stateMaxTimer = 0;

        // Dash specifics
        this.dashAngle  = 0;
        this.dashOrigin = { x: 0, y: 0 };
        this.dashSpd    = 0;

        // Invincibility frames
        this.iFrames = 0;

        // Attack cooldowns
        this.lightCooldown = 0;
        this.dashCooldown  = 0;

        // One-shot press tracking (prevent hold-to-spam)
        this.jDown = false;
        this.kDown = false;

        // Light attack combo
        this.comboCount  = 0;  // 0=first, 1=second, 2=finisher
        this.comboWindow = 0;  // frames remaining to chain next hit

        // Weapon hold state, snapshotted at every state boundary so windups
        // always start from wherever the weapon actually is (no teleporting).
        this.holdAngle = 0;
        this.holdOffX  = 0;
        this.holdOffY  = 0;
        this.holdScl   = 1;

        // Player-local hold state, angle stored relative to facingAngle,
        // offset stored as (fwd, lat) scalars along the facing axes.
        // Used by LIGHT_WAIT and LIGHT_RETURN so the weapon tracks rotation.
        this.holdAngleLocal = 0;
        this.holdOffFwd     = 0;
        this.holdOffLat     = 0;

        // Return animation, start angle/offset when lerping back to guard
        this.returnAngle     = 0;
        this.returnOffX      = 0;
        this.returnOffY      = 0;
        this.returnAngleLocal = 0;
        this.returnOffFwd    = 0;
        this.returnOffLat    = 0;
    }

    // Auto-lock: smoothly rotate toward nearest enemy 
    updateFacing() {
        let nearest = null, nearestDist = Infinity;
        for (const e of enemies) {
            const d = Math.hypot(e.x - this.x, e.y - this.y);
            if (d < nearestDist) { nearestDist = d; nearest = e; }
        }
        if (nearest) {
            const target = Math.atan2(nearest.y - this.y, nearest.x - this.x);
            let diff = target - this.facingAngle;
            while (diff >  Math.PI) diff -= Math.PI * 2;
            while (diff < -Math.PI) diff += Math.PI * 2;
            this.facingAngle += diff * 0.20; // smooth lerp, no jitter
        }
    }

    update() {
        if (this.iFrames     > 0) this.iFrames--;
        if (this.lightCooldown > 0) this.lightCooldown--;
        if (this.dashCooldown  > 0) this.dashCooldown--;

        this.updateFacing();

        // K mid-combo: cancel any light-attack state into a dash 
        if (keys.k && !this.kDown && this.dashCooldown <= 0 &&
            (this.state === 'LIGHT_WINDUP' || this.state === 'LIGHT_SLASH' ||
             this.state === 'LIGHT_RECOVER' || this.state === 'LIGHT_WAIT' ||
             this.state === 'LIGHT_RETURN')) {
            this.kDown     = true;
            this.comboCount  = 0;
            this.comboWindow = 0;
            this.weaponSide  = 1;
            this.lightCooldown = 0;
            this.dashAngle  = this.facingAngle;
            this.dashOrigin = { x: this.x, y: this.y };
            const wu = this.weapon.dashWindup;
            this.state         = 'DASH_WINDUP';
            this.stateTimer    = wu;
            this.stateMaxTimer = wu;
        }

        // IDLE 
        if (this.state === 'IDLE') {
            // Keep hold state in sync with the live guard pose each frame.
            // This means the very first windup of any new combo starts exactly
            // where the weapon already is, no snap on J press.
            this.holdAngle = this.getGuardAngle();
            this.holdOffX  = 0;
            this.holdOffY  = 0;
            this.holdScl   = 1;

            // Movement
            let dx = 0, dy = 0;
            if (keys.w || keys.ArrowUp)    dy -= 1;
            if (keys.s || keys.ArrowDown)  dy += 1;
            if (keys.a || keys.ArrowLeft)  dx -= 1;
            if (keys.d || keys.ArrowRight) dx += 1;
            if (dx || dy) {
                const len = Math.hypot(dx, dy);
                this.x += (dx / len) * this.baseSpeed;
                this.y += (dy / len) * this.baseSpeed;
                createTrail(this.x, this.y, 3.5, false, 0);
            }

            // J → Light Attack: start combo or continue chain
            if (keys.j && !this.jDown && this.lightCooldown <= 0) {
                this.jDown = true;
                this.comboCount = 0;
                this.slashStartSide = this.weaponSide;
                this.state = 'LIGHT_WINDUP';
                this.stateTimer    = this.getLightWindup();
                this.stateMaxTimer = this.stateTimer;
            }
            if (!keys.j) this.jDown = false;

            // K → Dash Attack (one-shot press)
            if (keys.k && !this.kDown && this.dashCooldown <= 0) {
                this.kDown = true;
                this.dashAngle  = this.facingAngle;
                this.dashOrigin = { x: this.x, y: this.y };
                const wu = this.weapon.dashWindup;
                this.state = 'DASH_WINDUP';
                this.stateTimer    = wu;
                this.stateMaxTimer = wu;
            }
            if (!keys.k) this.kDown = false;
        }

        // LIGHT WINDUP 
        else if (this.state === 'LIGHT_WINDUP') {
            this.stateTimer--;
            if (this.stateTimer <= 0) {
                // Snapshot end-of-windup weapon state, the slash reads getLightWeaponAngle()
                // at progress=0 on its own, so we just need hold values for any subsequent chain.
                this.holdAngle = this.getLightWeaponAngle();
                const _off = this.getLightWeaponHandOffset();
                this.holdOffX = _off.x; this.holdOffY = _off.y;
                this.holdScl  = this.getLightWeaponScale();
                this.executeLight();
                this.state = 'LIGHT_SLASH';
                this.stateTimer    = this.getLightSlashFrames();
                this.stateMaxTimer = this.stateTimer;
            }
        }

        // LIGHT SLASH ANIMATION 
        else if (this.state === 'LIGHT_SLASH') {
            this.stateTimer--;
            if (this.stateTimer <= 0) {
                this.weaponSide *= -1;
                this.state = 'LIGHT_RECOVER';
                this.stateTimer    = this.getLightRecover();
                this.stateMaxTimer = this.stateTimer;
            }
        }

        // LIGHT RECOVER 
        else if (this.state === 'LIGHT_RECOVER') {
            this.stateTimer--;

            // Chain into next combo hit during recovery window
            if (keys.j && !this.jDown && this.comboCount < 2) {
                this.jDown = true;
                // Snapshot current weapon state so the next windup starts from here
                this.holdAngle = this.getLightWeaponAngle();
                const _off = this.getLightWeaponHandOffset();
                this.holdOffX = _off.x; this.holdOffY = _off.y;
                this.holdScl  = this.getLightWeaponScale();
                this.comboCount++;
                this.slashStartSide = this.weaponSide;
                this.state         = 'LIGHT_WINDUP';
                this.stateTimer    = this.getLightWindup();
                this.stateMaxTimer = this.stateTimer;
            }
            if (!keys.j) this.jDown = false;

            if (this.stateTimer <= 0) {
                // Snapshot end-of-recover weapon state for the hold/wait/return phases
                this.holdAngle = this.getLightWeaponAngle();
                const _off = this.getLightWeaponHandOffset();
                this.holdOffX = _off.x; this.holdOffY = _off.y;
                this.holdScl  = this.getLightWeaponScale();
                // Snapshot in player-local space so the weapon tracks facing rotation
                const fa0 = this.facingAngle;
                this.holdAngleLocal = this.holdAngle - fa0;
                this.holdOffFwd =  _off.x * Math.cos(fa0) + _off.y * Math.sin(fa0);
                this.holdOffLat = -_off.x * Math.sin(fa0) + _off.y * Math.cos(fa0);
                // 30-frame (0.5 s) chain window
                this.state         = 'LIGHT_WAIT';
                this.stateTimer    = 30;
                this.stateMaxTimer = 30;
            }
        }

        // LIGHT WAIT, hold post-slash position, accept chain for 90 frames
        else if (this.state === 'LIGHT_WAIT') {
            // Full movement allowed while holding
            let dx = 0, dy = 0;
            if (keys.w || keys.ArrowUp)    dy -= 1;
            if (keys.s || keys.ArrowDown)  dy += 1;
            if (keys.a || keys.ArrowLeft)  dx -= 1;
            if (keys.d || keys.ArrowRight) dx += 1;
            if (dx || dy) {
                const len = Math.hypot(dx, dy);
                this.x += (dx / len) * this.baseSpeed;
                this.y += (dy / len) * this.baseSpeed;
                createTrail(this.x, this.y, 3.5, false, 0);
            }

            this.stateTimer--;

            if (keys.j && !this.jDown && this.comboCount < 2) {
                this.jDown = true;
                // Reconstruct absolute holdAngle/Off from local so lerpFrom
                // starts from the weapon's actual current (rotated) position
                const fa_w = this.facingAngle;
                this.holdAngle = fa_w + this.holdAngleLocal;
                this.holdOffX  = this.holdOffFwd * Math.cos(fa_w) - this.holdOffLat * Math.sin(fa_w);
                this.holdOffY  = this.holdOffFwd * Math.sin(fa_w) + this.holdOffLat * Math.cos(fa_w);
                this.comboCount++;
                this.slashStartSide = this.weaponSide;
                this.state         = 'LIGHT_WINDUP';
                this.stateTimer    = this.getLightWindup();
                this.stateMaxTimer = this.stateTimer;
            }
            if (!keys.j) this.jDown = false;

            if (this.stateTimer <= 0) {
                // Window expired, save return start in both world and local space
                this.returnAngle     = this.holdAngle;
                this.returnOffX      = this.holdOffX;
                this.returnOffY      = this.holdOffY;
                this.returnAngleLocal = this.holdAngleLocal;
                this.returnOffFwd    = this.holdOffFwd;
                this.returnOffLat    = this.holdOffLat;
                this.state         = 'LIGHT_RETURN';
                this.stateTimer    = 20;
                this.stateMaxTimer = 20;
            }
        }

        // LIGHT RETURN, smooth lerp back to guard pose 
        else if (this.state === 'LIGHT_RETURN') {
            let dx = 0, dy = 0;
            if (keys.w || keys.ArrowUp)    dy -= 1;
            if (keys.s || keys.ArrowDown)  dy += 1;
            if (keys.a || keys.ArrowLeft)  dx -= 1;
            if (keys.d || keys.ArrowRight) dx += 1;
            if (dx || dy) {
                const len = Math.hypot(dx, dy);
                this.x += (dx / len) * this.baseSpeed;
                this.y += (dy / len) * this.baseSpeed;
                createTrail(this.x, this.y, 3.5, false, 0);
            }

            this.stateTimer--;

            // Keep holdAngle tracking the live interpolated angle so that if J
            // is pressed during the return, c=0 windup starts from the right place
            {
                const t = 1 - this.stateTimer / this.stateMaxTimer;
                // Lerp in local space so the weapon tracks facing rotation
                const guardLocal = this.getGuardAngle() - this.facingAngle;
                this.holdAngleLocal = this.returnAngleLocal + t * (guardLocal - this.returnAngleLocal);
                this.holdOffFwd = this.returnOffFwd * (1 - t);
                this.holdOffLat = this.returnOffLat * (1 - t);
                // Reconstruct absolute for lerpFrom (J press) and draw fallback
                const fa_r = this.facingAngle;
                this.holdAngle = fa_r + this.holdAngleLocal;
                this.holdOffX  = this.holdOffFwd * Math.cos(fa_r) - this.holdOffLat * Math.sin(fa_r);
                this.holdOffY  = this.holdOffFwd * Math.sin(fa_r) + this.holdOffLat * Math.cos(fa_r);
                this.holdScl   = 1;
            }

            // Allow restarting combo from c=0 even mid-return
            if (keys.j && !this.jDown && this.lightCooldown <= 0) {
                this.jDown      = true;
                this.comboCount = 0;
                this.slashStartSide = this.weaponSide;
                this.state         = 'LIGHT_WINDUP';
                this.stateTimer    = this.getLightWindup();
                this.stateMaxTimer = this.stateTimer;
            }
            if (!keys.j) this.jDown = false;

            if (this.stateTimer <= 0) {
                this.comboCount    = 0;
                this.comboWindow   = 0;
                this.weaponSide    = 1; // reset to fixed guard side
                this.state         = 'IDLE';
                this.lightCooldown = 4;
            }
        }

        // DASH WINDUP 
        else if (this.state === 'DASH_WINDUP') {
            this.stateTimer--;
            if (this.stateTimer <= 0) this.executeDash();
        }

        // DASH (weapon-specific movement) 
        else if (this.state === 'DASH') {
            this.runDash();
        }

        // DASH RECOVER 
        else if (this.state === 'DASH_RECOVER') {
            this.stateTimer--;
            if (this.stateTimer <= 0) {
                this.state = 'IDLE';
                this.dashCooldown = 22;
            }
        }

        // Clamp to screen
        this.x = Math.max(this.radius, Math.min(width  - this.radius, this.x));
        this.y = Math.max(this.radius, Math.min(height - this.radius, this.y));
    }

    // Per-weapon light attack timing (varies by combo step) 
    getLightWindup() {
        const c = this.comboCount;
        return {
            Katana:   [4, 3, 8][c]  ?? 4,   // 1: draw, 2: quick snap, 3: overhead charge
            Naginata: [7, 5, 11][c] ?? 7,   // 1: pull back, 2: chamber sweep, 3: big raise
            Odachi:   [10, 7, 14][c] ?? 10, // 1: raise, 2: fast return, 3: full overhead
            Kanabo:   [11, 7, 16][c] ?? 11, // 1: side raise, 2: quick reverse, 3: overhead
            Kama:     [5, 4, 9][c]  ?? 5,   // 1: hook chamber, 2: reverse set, 3: spin windup
            Yumi:     [7, 6, 10][c] ?? 7,   // 1: draw-aim, 2: arrow-windup, 3: double-draw
            Sasumata: [5, 7, 11][c] ?? 5,   // 1: pin thrust chamber, 2: hook-yank reach, 3: shaft-blow raise
            Fukiya:   [5, 3, 10][c]  ?? 5,  // 1: bonk raise, 2: breath+blow, 3: deep-breath charge
        }[this.weapon.name] ?? 4;
    }
    getLightSlashFrames() {
        const c = this.comboCount;
        return {
            Katana:   [10, 7, 14][c]  ?? 10,
            Naginata: [7,  10, 12][c] ?? 7,
            Odachi:   [13, 10, 18][c] ?? 13,
            Kanabo:   [12, 9,  17][c] ?? 12,
            Kama:     [8,  8,  14][c] ?? 8,
            Yumi:     [5,  9,  5][c]  ?? 5,
            Sasumata: [7,  13, 15][c] ?? 7,
            Fukiya:   [9,  5,  5][c]  ?? 5,
        }[this.weapon.name] ?? 10;
    }
    getLightRecover() {
        const c = this.comboCount;
        const base = {
            Katana:   [5, 4, 9][c]  ?? 5,
            Naginata: [7, 6, 12][c] ?? 7,
            Odachi:   [10, 8, 13][c] ?? 10,
            Kanabo:   [12, 9, 16][c] ?? 12,
            Kama:     [6,  5, 10][c] ?? 6,
            Yumi:     [8,  6, 12][c] ?? 8,
            Sasumata: [6,  9, 12][c] ?? 6,
            Fukiya:   [7,  5,  9][c] ?? 5,
        }[this.weapon.name] ?? 5;
        return base;
    }

    // Guard (rest/ready) angle, fixed starting position, always the same side 
    // Guard is ALWAYS right-of-facing (side=+1) regardless of weaponSide.
    // weaponSide flips for combo alternation but must never affect the guard pose.
    getGuardAngle() {
        const fa = this.facingAngle;
        switch (this.weapon.name) {
            case 'Naginata': return fa + 0.15;
            case 'Odachi':   return fa + (Math.PI / 3.5);
            case 'Kanabo':   return fa + (Math.PI / 3.2);
            case 'Sasumata': return fa + 0.12;           // held level, fork pointing forward
            case 'Yumi':     return fa - Math.PI / 10;   // slight upward aim, arrow nocked
            case 'Fukiya':   return fa;                  // dead-level, tube at mouth
            case 'Kama':     return fa + (Math.PI / 3.8);
            default:         return fa + (Math.PI / 4.2); // Katana
        }
    }

    // Per-weapon, per-combo-step weapon angle
    getLightWeaponAngle() {
        const progress = this.stateMaxTimer > 0 ? 1 - (this.stateTimer / this.stateMaxTimer) : 1;
        const c    = this.comboCount;
        const side = this.slashStartSide;
        const fa   = this.facingAngle;
        // Smooth lerp helper, used by all windups so the first frame of every
        // windup starts exactly at holdAngle (wherever the weapon actually was).
        const lerpFrom = (target) => this.holdAngle + progress * (target - this.holdAngle);

        switch (this.weapon.name) {

            case 'Katana': {
                if (c === 0) {
                    // Kesa-giri: from guard → hip-chamber, then diagonal sweep across
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa + side * (Math.PI / 2.8));
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.2);
                        return fa + side * (Math.PI / 2.8) - e * side * 2.45;
                    }
                    return fa - side * 0.95; // recover end
                } else if (c === 1) {
                    // Tsuki-komi: from hold → blade dead-straight, then small thrust-swing
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa + side * 0.22);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 3.2);
                        return fa + side * 0.22 * (1 - progress * 0.5) - e * side * 0.32;
                    }
                    return fa - side * 0.10;
                } else {
                    // Kirioroshi: from hold → blade overhead, then crash straight down
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa - Math.PI * 0.85);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = Math.pow(progress, 0.7);
                        return fa - Math.PI * 0.85 + e * (Math.PI * 0.85 + side * (Math.PI / 5.5));
                    }
                    return fa + side * (Math.PI / 5.5);
                }
            }

            case 'Naginata': {
                if (c === 0) {
                    // Tsuki thrust: shaft pulls back (offset), blade angle barely changes
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa + side * 0.15);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 3.5);
                        return fa + side * 0.15 * (1 - e);
                    }
                    return fa;
                } else if (c === 1) {
                    // Nagi: from hold → blade nearly perpendicular, then wide horizontal mow
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa + side * (Math.PI / 1.5));
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.2);
                        return fa + side * (Math.PI / 1.5) + e * (-side * (Math.PI / 1.5) - side * (Math.PI / 4.5));
                    }
                    return fa - side * (Math.PI / 4.5) * 0.5;
                } else {
                    // Overhead crash: from hold → blade overhead, then slam forward-down
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa - Math.PI * 0.62);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 3.5);
                        return fa - Math.PI * 0.62 + e * (Math.PI * 0.72);
                    }
                    return fa + Math.PI * 0.10;
                }
            }

            case 'Odachi': {
                if (c === 0) {
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa + side * (Math.PI / 1.8));
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.2);
                        return fa + side * (Math.PI / 1.8) - e * side * (Math.PI / 1.4);
                    }
                    return fa - side * (Math.PI / 3.0);
                } else if (c === 1) {
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa + side * (Math.PI / 2.5));
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 3.0);
                        return fa + side * (Math.PI / 2.5) - e * side * (Math.PI / 1.1);
                    }
                    return fa - side * (Math.PI / 2.8);
                } else {
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa - Math.PI * 0.9);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = Math.pow(progress, 0.6);
                        return fa - Math.PI * 0.9 + e * (Math.PI * 0.9 + side * (Math.PI / 4.0));
                    }
                    return fa + side * (Math.PI / 4.0);
                }
            }

            case 'Kanabo': {
                if (c === 0) {
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa + side * (Math.PI / 1.4));
                    if (this.state === 'LIGHT_SLASH') {
                        const e = Math.pow(progress, 1.7);
                        return fa + side * (Math.PI / 1.4) - e * side * (Math.PI / 1.1);
                    }
                    return fa - side * (Math.PI / 3.8);
                } else if (c === 1) {
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa + side * (Math.PI / 2.2));
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.5);
                        return fa + side * (Math.PI / 2.2) - e * side * (Math.PI / 1.05);
                    }
                    return fa - side * (Math.PI / 3.5);
                } else {
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa - Math.PI * 0.8);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = Math.pow(progress, 1.4);
                        return fa - Math.PI * 0.8 + e * (Math.PI * 0.8 + side * (Math.PI / 5.5));
                    }
                    return fa + side * (Math.PI / 5.5);
                }
            }

            case 'Kama': {
                if (c === 0) {
                    // Kuri-komi: chamber from outside, whip the hook inward
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa + side * (Math.PI / 1.9));
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.8);
                        return fa + side * (Math.PI / 1.9) - e * side * 2.20;
                    }
                    return fa - side * 0.70;
                } else if (c === 1) {
                    // Gyaku-kama: reverse hook from opposite side
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa - side * (Math.PI / 1.7));
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.8);
                        return fa - side * (Math.PI / 1.7) + e * side * 2.10;
                    }
                    return fa + side * 0.60;
                } else {
                    // Engetsu-barai: overhead spin chamber, crash down
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa - Math.PI * 0.78);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = Math.pow(progress, 0.65);
                        return fa - Math.PI * 0.78 + e * (Math.PI * 0.88 + side * (Math.PI / 6));
                    }
                    return fa + side * (Math.PI / 6);
                }
            }

            case 'Yumi': {
                if (c === 0) {
                    // Hit 1: Standing shot — bow stays level, slight aim-up
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa - 0.16);
                    if (this.state === 'LIGHT_SLASH')  return fa - 0.16 + progress * 0.16;
                    return fa;
                } else if (c === 1) {
                    // Hit 2: Arrow melee slash — hold arrow like a blade, full swing arc
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa + side * (Math.PI / 2.0));
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.6);
                        return fa + side * (Math.PI / 2.0) - e * side * (Math.PI / 1.35);
                    }
                    return fa - side * (Math.PI / 4.5);
                } else {
                    // Hit 3: Double shot — slight pull back, release both arrows
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa - 0.20);
                    if (this.state === 'LIGHT_SLASH')  return fa - 0.20 + progress * 0.20;
                    return fa;
                }
            }

            case 'Sasumata': {
                if (c === 0) {
                    // Tsuki-oshi: straight pin thrust, fork barely rotates, pure driven push
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa + side * 0.08);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 4.0);
                        return fa + side * 0.08 * (1 - e * 0.7);
                    }
                    return fa;
                } else if (c === 1) {
                    // Hiki-taoshi: reach forward-side with the fork, then YANK it backward
                    // sweeps all the way past perpendicular, ending BEHIND the player.
                    // No other weapon does this; it's the defining sasumata technique.
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa + side * (Math.PI / 3.0));
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.0);
                        // Full sweep: from +60° (reach) through 0° and past -100° (behind)
                        return fa + side * (Math.PI / 3.0) - e * side * (Math.PI / 1.05);
                    }
                    return fa - side * (Math.PI / 2.0); // fork rests pointed rearward
                } else {
                    // Kachi-age: butt-end of shaft swings up from below-rear to above-forward.
                    // Weapon is effectively reversed, the tail becomes the striker.
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa + Math.PI * 0.88);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.6);
                        return fa + Math.PI * 0.88 - e * (Math.PI * 1.32);
                    }
                    return fa - side * (Math.PI / 6.5);
                }
            }

            case 'Fukiya': {
                if (c === 0) {
                    // Hit 1: Tube bonk — overhead swipe down onto the enemy
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa - side * (Math.PI / 1.6));
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.4);
                        return fa - side * (Math.PI / 1.6) + e * side * (Math.PI / 1.1);
                    }
                    return fa + side * (Math.PI / 5.5);
                } else if (c === 1) {
                    // Hit 2: Normal blowdart — steady aim, barely moves
                    const steadiness = 0.04;
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa);
                    if (this.state === 'LIGHT_SLASH')  return fa + Math.sin(progress * Math.PI) * steadiness;
                    return fa;
                } else {
                    // Hit 3: Deep breath charge — pull back dramatically, then firm lunge forward
                    if (this.state === 'LIGHT_WINDUP') return lerpFrom(fa - 0.30);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 3.5);
                        return fa - 0.30 + e * 0.32;
                    }
                    return fa + 0.02;
                }
            }

            default:
                return fa + this.weaponSide * (Math.PI / 3.5);
        }
    }

    // Dynamic hand/weapon pivot offset during light attacks 
    getLightWeaponHandOffset() {
        const progress = this.stateMaxTimer > 0 ? 1 - (this.stateTimer / this.stateMaxTimer) : 1;
        const fa   = this.facingAngle;
        const side = this.slashStartSide;
        const c    = this.comboCount;

        const toXY = (fwd, lat) => ({
            x: Math.cos(fa) * fwd + Math.cos(fa + Math.PI / 2) * lat,
            y: Math.sin(fa) * fwd + Math.sin(fa + Math.PI / 2) * lat,
        });

        // Lerp from the snapshotted hold offset, used by every windup so the
        // first frame is exactly where the weapon was, with no position snap.
        const lerpOff = (fwdTarget, latTarget) => {
            const tgt = toXY(fwdTarget, latTarget);
            return {
                x: this.holdOffX + progress * (tgt.x - this.holdOffX),
                y: this.holdOffY + progress * (tgt.y - this.holdOffY),
            };
        };

        switch (this.weapon.name) {

            case 'Katana': {
                if (c === 0) {
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-6, side * 7);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.2);
                        return toXY(-6 + e * 15, side * 7 - e * side * 15);
                    }
                    return toXY(9, -side * 8);
                } else if (c === 1) {
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-12, side * 1.5);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.8);
                        return toXY(-12 + e * 24, side * 1.5 - e * side * 2.5);
                    }
                    return toXY(10, -side * 1);
                } else {
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-9, 0);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = Math.pow(progress, 0.65);
                        return toXY(-9 + e * 20, side * 3 * (1 - e));
                    }
                    return toXY(9, side * 2);
                }
            }

            case 'Naginata': {
                if (c === 0) {
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-10, 0);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 3.5);
                        return toXY(-10 + e * 18, 0);
                    }
                    return toXY(7, 0);
                } else if (c === 1) {
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-3, side * 13);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2);
                        return toXY(-3 + e * 12, side * 13 - e * side * 19);
                    }
                    return toXY(7, -side * 4);
                } else {
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-13, 0);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 3.8);
                        return toXY(-13 + e * 26, 0);
                    }
                    return toXY(11, 0);
                }
            }

            case 'Odachi': {
                if (c === 0) {
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-8, side * 13);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.5);
                        return toXY(-8 + e * 18, side * 13 - e * side * 22);
                    }
                    return toXY(9, -side * 9);
                } else if (c === 1) {
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(2, side * 7);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 3);
                        return toXY(2 + e * 10, side * 7 - e * side * 17);
                    }
                    return toXY(9, -side * 8);
                } else {
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-11, 0);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = Math.pow(progress, 0.6);
                        return toXY(-11 + e * 24, side * 2 * (1 - e));
                    }
                    return toXY(11, side * 1);
                }
            }

            case 'Kanabo': {
                if (c === 0) {
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-7, side * 17);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = Math.pow(progress, 1.7);
                        return toXY(-7 + e * 18, side * 17 - e * side * 24);
                    }
                    return toXY(9, -side * 6);
                } else if (c === 1) {
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(3, side * 6);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.8);
                        return toXY(3 + e * 8, side * 6 - e * side * 13);
                    }
                    return toXY(9, -side * 5);
                } else {
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-12, 0);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = Math.pow(progress, 1.3);
                        return toXY(-12 + e * 25, side * 1 * (1 - e));
                    }
                    return toXY(10, side * 1);
                }
            }

            case 'Kama': {
                if (c === 0) {
                    // Inward hook: chamber from the outside, whip inward
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-5, side * 14);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 3.0);
                        return toXY(-5 + e * 14, side * 14 - e * side * 20);
                    }
                    return toXY(7, -side * 5);
                } else if (c === 1) {
                    // Reverse hook: flip, hook outward
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-4, -side * 5);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.8);
                        return toXY(-4 + e * 12, -side * 5 + e * side * 14);
                    }
                    return toXY(7, side * 7);
                } else {
                    // Spin set: bring weapon to centre low
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-3, 0);
                    if (this.state === 'LIGHT_SLASH') {
                        return toXY(-3 + progress * 8, 0);
                    }
                    return toXY(5, 0);
                }
            }

            case 'Yumi': {
                if (c === 0) {
                    // Standing shot: arm steady, slight pull back at windup
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-6, side * 2);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 1.5);
                        return toXY(-6 + e * 4, side * 2 - e * side * 1);
                    }
                    return toXY(-3, side * 1);
                } else if (c === 1) {
                    // Arrow melee slash: full arm-swing motion
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-5, side * 13);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.5);
                        return toXY(-5 + e * 14, side * 13 - e * side * 21);
                    }
                    return toXY(8, -side * 7);
                } else {
                    // Double shot: very similar to single shot but marginally wider stance
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-8, side * 2);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 1.5);
                        return toXY(-8 + e * 5, side * 2 - e * side * 1);
                    }
                    return toXY(-4, side * 1);
                }
            }

            case 'Sasumata': {
                if (c === 0) {
                    // Tsuki-oshi: drive both hands straight forward, pure spear thrust
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-11, 0);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 3.5);
                        return toXY(-11 + e * 22, 0);
                    }
                    return toXY(9, 0);
                } else if (c === 1) {
                    // Hiki-taoshi: reach hands out forward-side (extending the fork toward target),
                    // then YANK backward across the body, opposite of every other weapon.
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(12, -side * 9);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 1.9);
                        return toXY(12 - e * 24, -side * 9 + e * side * 20);
                    }
                    return toXY(-13, side * 10); // hands pulled far to the opposite side
                } else {
                    // Kachi-age: chamber hands low-back (butt strike setup), drive upward-forward
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-15, side * 5);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.8);
                        return toXY(-15 + e * 26, side * 5 - e * side * 8);
                    }
                    return toXY(9, -side * 3);
                }
            }

            case 'Fukiya': {
                if (c === 0) {
                    // Bonk: arm lifts up-and-side, then swings across
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-8, side * 12);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.4);
                        return toXY(-8 + e * 17, side * 12 - e * side * 19);
                    }
                    return toXY(7, -side * 5);
                } else if (c === 1) {
                    // Normal dart: steady blowgun aim, tiny lunge
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-2, 0);
                    if (this.state === 'LIGHT_SLASH') return toXY(-2 + progress * 5, 0);
                    return toXY(3, 0);
                } else {
                    // Deep breath: pull back more dramatically, firm planted lunge
                    if (this.state === 'LIGHT_WINDUP') return lerpOff(-10, 0);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 3.0);
                        return toXY(-10 + e * 14, 0);
                    }
                    return toXY(4, 0);
                }
            }

            default:
                return { x: 0, y: 0 };
        }
    }

    // Foreshortening scale per combo step 
    getLightWeaponScale() {
        const progress = this.stateMaxTimer > 0 ? 1 - (this.stateTimer / this.stateMaxTimer) : 1;
        const c = this.comboCount;
        const lerpScl = (target) => this.holdScl + progress * (target - this.holdScl);

        switch (this.weapon.name) {

            case 'Katana': {
                if (c === 0) {
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.90);
                    if (this.state === 'LIGHT_SLASH') return 0.90 + Math.sin(progress * Math.PI) * 0.13;
                    return 0.88;
                } else if (c === 1) {
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.52);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.8);
                        return 0.52 + e * 0.50;
                    }
                    return 1.0;
                } else {
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.65);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = Math.pow(progress, 0.8);
                        return 0.65 + e * 0.38;
                    }
                    return 1.0;
                }
            }

            case 'Naginata': {
                if (c === 0) {
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.55);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.5);
                        return 0.55 + e * 0.48;
                    }
                    return 1.0;
                } else if (c === 1) {
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.97);
                    if (this.state === 'LIGHT_SLASH') return 1.0 - Math.sin(progress * Math.PI) * 0.1;
                    return 0.95;
                } else {
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.72);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.8);
                        return 0.72 + e * 0.32;
                    }
                    return 1.0;
                }
            }

            case 'Odachi': {
                if (c === 0) {
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.97);
                    if (this.state === 'LIGHT_SLASH') return 1.0 - Math.sin(progress * Math.PI) * 0.16;
                    return 0.90;
                } else if (c === 1) {
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.90);
                    if (this.state === 'LIGHT_SLASH') return 0.93 + Math.sin(progress * Math.PI) * 0.10;
                    return 0.90;
                } else {
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.60);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = Math.pow(progress, 0.7);
                        return 0.60 + e * 0.43;
                    }
                    return 1.0;
                }
            }

            case 'Kanabo': {
                if (c === 0) {
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.94);
                    if (this.state === 'LIGHT_SLASH') return 0.95 + Math.sin(progress * Math.PI) * 0.08;
                    return 0.95;
                } else if (c === 1) {
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.88);
                    if (this.state === 'LIGHT_SLASH') return 0.92 + Math.sin(progress * Math.PI) * 0.10;
                    return 0.92;
                } else {
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.58);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = Math.pow(progress, 1.2);
                        return 0.58 + e * 0.45;
                    }
                    return 1.03;
                }
            }

            case 'Kama': {
                if (c === 0) {
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.92);
                    if (this.state === 'LIGHT_SLASH') return 0.92 + Math.sin(progress * Math.PI) * 0.10;
                    return 0.90;
                } else if (c === 1) {
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.88);
                    if (this.state === 'LIGHT_SLASH') return 0.90 + Math.sin(progress * Math.PI) * 0.12;
                    return 0.90;
                } else {
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.80);
                    if (this.state === 'LIGHT_SLASH') return 0.80 + progress * 0.22;
                    return 1.0;
                }
            }

            case 'Yumi': {
                if (c === 0) {
                    // Standing shot: slight foreshorten at draw
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.78);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.0);
                        return 0.78 + e * 0.22;
                    }
                    return 0.96;
                } else if (c === 1) {
                    // Arrow slash: stays at normal scale (it's a side swing, not foreshortened)
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.96);
                    if (this.state === 'LIGHT_SLASH') return 0.97 + Math.sin(progress * Math.PI) * 0.08;
                    return 0.94;
                } else {
                    // Double shot: slight foreshorten
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.75);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.0);
                        return 0.75 + e * 0.25;
                    }
                    return 0.96;
                }
            }

            case 'Sasumata': {
                if (c === 0) {
                    // Tsuki-oshi: foreshortens then extends as shaft drives forward
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.52);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.5);
                        return 0.52 + e * 0.50;
                    }
                    return 1.0;
                } else if (c === 1) {
                    // Hiki-taoshi: shaft swings full profile, stays at full scale throughout
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.97);
                    if (this.state === 'LIGHT_SLASH') return 1.0 - Math.sin(progress * Math.PI) * 0.07;
                    return 0.98;
                } else {
                    // Kachi-age: butt-end, shaft forshortens heavily (we're looking along it),
                    // then flares out to full profile as it swings across
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.38);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.2);
                        return 0.38 + e * 0.68;
                    }
                    return 1.0;
                }
            }

            case 'Fukiya': {
                if (c === 0) {
                    // Bonk: full scale for the arm swing
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.96);
                    if (this.state === 'LIGHT_SLASH') return 0.97 + Math.sin(progress * Math.PI) * 0.06;
                    return 0.94;
                } else if (c === 1) {
                    // Normal dart: tiny foreshorten (tube points slightly at camera)
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.66);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 2.0);
                        return 0.66 + e * 0.32;
                    }
                    return 0.92;
                } else {
                    // Deep breath: extreme foreshorten during windup (tube aimed at screen),
                    // then snaps back to full as dart fires forward
                    if (this.state === 'LIGHT_WINDUP') return lerpScl(0.38);
                    if (this.state === 'LIGHT_SLASH') {
                        const e = 1 - Math.pow(1 - progress, 3.5);
                        return 0.38 + e * 0.64;
                    }
                    return 0.96;
                }
            }

            default:
                return 1.0;
        }
    }

    // J: Light Attack, 3-hit combo, each hit is a distinct move
    executeLight() {
        const c = this.comboCount;

        switch (this.weapon.name) {

            case 'Katana': {
                if (c === 0) {
                    // Hit 1: Kesa-giri, diagonal draw-cut, fast, medium range
                    slashes.push(new LightSlash(this.x, this.y, this.facingAngle, this.weapon, this.slashStartSide));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.60, Math.PI / 2.2,
                        this.weapon.damage * 0.55, this.weapon.knockback * 0.35);
                } else if (c === 1) {
                    // Hit 2: Tsuki-komi, forward lunge thrust, tight arc, big arm extension
                    slashes.push(new LightSlash(this.x, this.y, this.facingAngle, this.weapon, this.slashStartSide));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.68, Math.PI / 2.6,
                        this.weapon.damage * 0.60, this.weapon.knockback * 0.40);
                } else {
                    // Hit 3: Kirioroshi, vertical overhead crash, wide arc, big damage + shake
                    slashes.push(new LightSlash(this.x, this.y, this.facingAngle, this.weapon, this.slashStartSide));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.78, Math.PI / 1.5,
                        this.weapon.damage * 1.35, this.weapon.knockback * 0.85);
                    cameraShake = Math.max(cameraShake, 4);
                }
                break;
            }

            case 'Naginata': {
                if (c === 0) {
                    // Hit 1: Tsuki, straight narrow thrust, long range, very thin arc
                    slashes.push(new NaginataStab(this.x, this.y, this.facingAngle, false));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.72, Math.PI / 12,
                        this.weapon.damage * 0.50, this.weapon.knockback * 0.55);
                } else if (c === 1) {
                    // Hit 2: Nagi, wide horizontal sweep, short-medium range, huge arc
                    slashes.push(new LightSlash(this.x, this.y, this.facingAngle, this.weapon, this.slashStartSide));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.62, Math.PI * 0.85,
                        this.weapon.damage * 0.55, this.weapon.knockback * 0.70);
                } else {
                    // Hit 3: Overhead power thrust, maximum range, medium arc, high damage
                    slashes.push(new NaginataStab(this.x, this.y, this.facingAngle, true));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.90, Math.PI / 8,
                        this.weapon.damage * 1.30, this.weapon.knockback * 0.85);
                    cameraShake = Math.max(cameraShake, 3);
                }
                break;
            }

            case 'Odachi': {
                if (c === 0) {
                    // Hit 1: Diagonal slash, large standard arc
                    slashes.push(new OdachiLightSwing(this.x, this.y, this.facingAngle, this.weapon, this.slashStartSide, false));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.68, Math.PI * 0.78,
                        this.weapon.damage * 0.50, this.weapon.knockback * 0.60);
                } else if (c === 1) {
                    // Hit 2: Counter-diagonal, same arc, slightly shorter range, faster
                    slashes.push(new OdachiLightSwing(this.x, this.y, this.facingAngle, this.weapon, this.slashStartSide, false));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.65, Math.PI * 0.82,
                        this.weapon.damage * 0.55, this.weapon.knockback * 0.65);
                } else {
                    // Hit 3: Vertical overhead slam, maximum arc, full damage, big shake
                    slashes.push(new OdachiLightSwing(this.x, this.y, this.facingAngle, this.weapon, this.slashStartSide, true));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.80, Math.PI * 1.15,
                        this.weapon.damage * 1.40, this.weapon.knockback * 0.90);
                    cameraShake = Math.max(cameraShake, 6);
                }
                break;
            }

            case 'Kanabo': {
                if (c === 0) {
                    // Hit 1: Side swing, medium arc, medium damage
                    slashes.push(new KanaboSmash(this.x, this.y, this.facingAngle, this.weapon, this.slashStartSide, false));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.58, Math.PI / 3.0,
                        this.weapon.damage * 0.65, this.weapon.knockback * 0.80);
                } else if (c === 1) {
                    // Hit 2: Reverse backswing, slightly tighter arc, same range
                    slashes.push(new KanaboSmash(this.x, this.y, this.facingAngle, this.weapon, this.slashStartSide, false));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.60, Math.PI / 3.2,
                        this.weapon.damage * 0.70, this.weapon.knockback * 0.85);
                } else {
                    // Hit 3: Ground slam, narrow cone but MASSIVE damage + maximum shake
                    slashes.push(new KanaboSmash(this.x, this.y, this.facingAngle, this.weapon, this.slashStartSide, true));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.70, Math.PI / 2.0,
                        this.weapon.damage * 1.80, this.weapon.knockback * 1.50);
                    cameraShake = Math.max(cameraShake, 11);
                }
                break;
            }

            case 'Kama': {
                if (c === 0) {
                    // Hit 1: Kuri-komi, inward hooking slash, quick
                    slashes.push(new LightSlash(this.x, this.y, this.facingAngle, this.weapon, this.slashStartSide));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.85, Math.PI / 2.0,
                        this.weapon.damage * 0.55, this.weapon.knockback * 0.40);
                } else if (c === 1) {
                    // Hit 2: Gyaku-kama, reverse outward hook from opposite side
                    slashes.push(new LightSlash(this.x, this.y, this.facingAngle, this.weapon, this.slashStartSide));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.80, Math.PI / 1.9,
                        this.weapon.damage * 0.60, this.weapon.knockback * 0.45);
                } else {
                    // Hit 3: Engetsu-barai, spinning 360° sickle sweep
                    slashes.push(new KamaSpinSlash(this.x, this.y));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 1.05, Math.PI * 2,
                        this.weapon.damage * 1.50, this.weapon.knockback * 0.70);
                    cameraShake = Math.max(cameraShake, 4);
                }
                break;
            }

            case 'Yumi': {
                if (c === 0) {
                    // Hit 1: Standing shot — single precision arrow
                    slashes.push(new YumiArrowFlight(this.x, this.y, this.facingAngle,
                        this.weapon.damage * 1.2, this.weapon.knockback));
                } else if (c === 1) {
                    // Hit 2: Arrow melee slash — hold arrow like a blade, close-range sweep
                    slashes.push(new YumiArrowSlash(this.x, this.y, this.facingAngle, this.slashStartSide));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.42, Math.PI / 1.9,
                        this.weapon.damage * 0.95, this.weapon.knockback * 0.75);
                } else {
                    // Hit 3: Standing shot — two arrows in a tight spread
                    const spread = 0.10;
                    slashes.push(new YumiArrowFlight(this.x, this.y, this.facingAngle - spread,
                        this.weapon.damage * 0.95, this.weapon.knockback * 0.85));
                    slashes.push(new YumiArrowFlight(this.x, this.y, this.facingAngle + spread,
                        this.weapon.damage * 0.95, this.weapon.knockback * 0.85));
                    cameraShake = Math.max(cameraShake, 2);
                }
                break;
            }

            case 'Sasumata': {
                if (c === 0) {
                    // Hit 1: Tsuki-oshi, straight fork pin thrust, long narrow corridor
                    // The fork catches and pins, minimal damage, BIG knockback (throw)
                    slashes.push(new SasumataForkThrust(this.x, this.y, this.facingAngle, false));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.80, Math.PI / 10,
                        this.weapon.damage * 0.45, this.weapon.knockback * 0.75);
                } else if (c === 1) {
                    // Hit 2: Hiki-taoshi, hook-yank: the arc is BEHIND the player.
                    // The fork reaches forward-side, catches, then yanks the enemy past.
                    // Damage triggers on the pull angle, enemies get dragged toward/past the player.
                    slashes.push(new SasumataHookYank(this.x, this.y, this.facingAngle, this.slashStartSide));
                    // Hit arc is angled BACKWARD: attackAngle is behind the player
                    const yankAngle = this.facingAngle + this.slashStartSide * (Math.PI / 1.8);
                    applyDamageCustom(this.x, this.y, yankAngle,
                        this.weapon.range * 0.95, Math.PI * 0.95,
                        this.weapon.damage * 0.70, this.weapon.knockback * 1.10
                    );
                } else {
                    // Hit 3: Kachi-age, butt-end shaft uppercut. Ignores the fork entirely.
                    // Massive close-range shockwave, staggers everything around the player.
                    slashes.push(new SasumataShaftBlow(this.x, this.y, this.facingAngle, this.slashStartSide));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.62, Math.PI * 1.10,
                        this.weapon.damage * 1.55, this.weapon.knockback * 0.85);
                    cameraShake = Math.max(cameraShake, 5);
                }
                break;
            }

            case 'Fukiya': {
                if (c === 0) {
                    // Hit 1: Tube bonk — smack enemy with the blowgun, close-range melee
                    slashes.push(new FukiyaBonk(this.x, this.y, this.facingAngle, this.slashStartSide));
                    applyDamageCustom(this.x, this.y, this.facingAngle,
                        this.weapon.range * 0.35, Math.PI / 2.0,
                        this.weapon.damage * 0.75, this.weapon.knockback * 0.60);
                } else if (c === 1) {
                    // Hit 2: Normal blowdart — steady aim, single dart
                    slashes.push(new FukiyaDart(this.x, this.y, this.facingAngle,
                        this.weapon.damage * 0.95, this.weapon.knockback));
                } else {
                    // Hit 3: Deep-breath supercharged dart — massive damage, much faster
                    slashes.push(new FukiyaChargedDart(this.x, this.y, this.facingAngle,
                        this.weapon.damage * 2.8, this.weapon.knockback * 1.8));
                    cameraShake = Math.max(cameraShake, 3);
                }
                break;
            }
        }
    }

    // K: Begin weapon-specific dash
    executeDash() {
        this.state = 'DASH';
        switch (this.weapon.name) {

            // KATANA, "Phantom Cut": Instant teleport, brief pause, then delayed slashes carve the path
            case 'Katana': {
                const dist = Math.min(210, Math.max(width, height) * 0.26);
                const tx   = this.x + Math.cos(this.dashAngle) * dist;
                const ty   = this.y + Math.sin(this.dashAngle) * dist;
                // Spawn phantom slashes along travel path, each one applies its own damage when it appears
                this.spawnPhantomCuts(this.x, this.y, tx, ty);
                // Teleport immediately
                this.x = Math.max(this.radius, Math.min(width  - this.radius, tx));
                this.y = Math.max(this.radius, Math.min(height - this.radius, ty));
                this.stateTimer    = 8;
                this.stateMaxTimer = 8;
                cameraShake = 3;
                break;
            }

            // NAGINATA, "Piercing Thrust": Extreme speed linear thrust, no end explosion
            case 'Naginata': {
                this.dashSpd       = 32;
                this.stateTimer    = this.weapon.dashFrames;
                this.stateMaxTimer = this.weapon.dashFrames;
                // Air-break burst at the moment of launch
                slashes.push(new NaginataThrust(this.x, this.y, this.dashAngle));
                break;
            }

            // ODACHI, "Cleaving Path": Dash forward with blade held perpendicular, slicing anything in reach
            case 'Odachi': {
                this.dashSpd       = 18;
                this.stateTimer    = this.weapon.dashFrames;
                this.stateMaxTimer = this.weapon.dashFrames;
                this.slicedEnemies = new Set(); // each enemy can only be hit once per dash
                break;
            }

            // KANABO, "Bull Rush": Fast dash that bonks any enemy directly in the path
            case 'Kanabo': {
                this.dashSpd       = 26;
                this.stateTimer    = this.weapon.dashFrames;
                this.stateMaxTimer = this.weapon.dashFrames;
                this.bonkedEnemies = new Set(); // each enemy bonked at most once per dash
                break;
            }

            // KAMA, "Engetsu-giri": Sprint forward, land with a tight 360° sickle spin
            case 'Kama': {
                this.dashSpd       = 22;
                this.stateTimer    = this.weapon.dashFrames;
                this.stateMaxTimer = this.weapon.dashFrames;
                break;
            }

            // YUMI, "Hashiri-ya": Arrow-tip iaido sprint, loose a heavy arrow on exit
            case 'Yumi': {
                this.dashSpd       = 20;
                this.stateTimer    = this.weapon.dashFrames;
                this.stateMaxTimer = this.weapon.dashFrames;
                this.dashedEnemies = new Set();
                break;
            }

            // SASUMATA, "Oshi-taoshi": Plant feet, drive the fork in a broad horizontal fan.
            // The player DOESN'T MOVE they brace and sweep, scattering enemies in a wide arc.
            case 'Sasumata': {
                // No movement, this is a planted technique
                this.dashSpd       = 15;
                this.stateTimer    = this.weapon.dashFrames;
                this.stateMaxTimer = this.weapon.dashFrames;
                this.pushedEnemies = new Set();
                this.oshiAngle     = 0; // sweeps from -PI/1.8 to +PI/1.8 over dashFrames
                break;
            }

            // FUKIYA, "Kage-ashi": Ghost-dash through enemies, 180° turn, fire dart back
            case 'Fukiya': {
                this.dashSpd       = 30;
                this.stateTimer    = this.weapon.dashFrames;
                this.stateMaxTimer = this.weapon.dashFrames;
                break;
            }
        }
    }

    // Per-frame dash logic (weapon-specific) 
    runDash() {
        switch (this.weapon.name) {

            case 'Katana': {
                // Teleport already happened, just hold the pause
                this.stateTimer--;
                if (this.stateTimer <= 0) {
                    this.state = 'DASH_RECOVER';
                    this.stateTimer = this.weapon.dashRecover;
                }
                break;
            }

            case 'Naginata': {
                // Fast forward thrust, narrow pierce damage each frame, nothing at the end
                this.x += Math.cos(this.dashAngle) * this.dashSpd;
                this.y += Math.sin(this.dashAngle) * this.dashSpd;
                createTrail(this.x, this.y, this.radius * 0.55, true, this.dashAngle);
                applyDamageCustom(this.x, this.y, this.dashAngle,
                    this.weapon.range * 0.45, Math.PI / 6,
                    this.weapon.damage * 0.22, this.weapon.knockback * 0.5);
                this.stateTimer--;
                if (this.stateTimer <= 0) {
                    cameraShake = 3;
                    this.state = 'DASH_RECOVER';
                    this.stateTimer = this.weapon.dashRecover;
                }
                break;
            }

            case 'Odachi': {
                // Dash forward with blade extended perpendicular, slice anyone within the blade's sweep corridor
                this.x += Math.cos(this.dashAngle) * this.dashSpd;
                this.y += Math.sin(this.dashAngle) * this.dashSpd;
                createTrail(this.x, this.y, this.radius * 1.5, true, this.dashAngle);

                const bladeLen  = this.weapon.range * 0.88;
                const bladePerp = this.dashAngle + Math.PI / 2; // blade is perpendicular to movement

                for (let i = enemies.length - 1; i >= 0; i--) {
                    const e = enemies[i];
                    if (this.slicedEnemies.has(e)) continue;

                    const dx = e.x - this.x;
                    const dy = e.y - this.y;

                    // Project enemy onto blade axis (perpendicular) and forward axis
                    const alongBlade   = dx * Math.cos(bladePerp) + dy * Math.sin(bladePerp);
                    const alongForward = dx * Math.cos(this.dashAngle) + dy * Math.sin(this.dashAngle);

                    // Hit if enemy is within blade length and within a thin forward corridor
                    if (Math.abs(alongBlade) <= bladeLen * 0.5 && Math.abs(alongForward) <= 28) {
                        this.slicedEnemies.add(e);
                        e.hit(this.weapon.damage, this.dashAngle, this.weapon.knockback);
                        spawnParticles(e.x, e.y, 'ink-red', 10);
                        cameraShake = Math.max(cameraShake, this.weapon.damage * 2);
                        if (e.hp <= 0) {
                            spawnParticles(e.x, e.y, 'ink-red', 18);
                            enemies.splice(i, 1);
                            rebalanceRoles();
                        }
                    }
                }
                if (enemies.length === 0) setTimeout(triggerWeaponDrop, 1000);

                // Spawn sweep-cut trail every 3 frames
                if (this.stateTimer % 3 === 0) {
                    slashes.push(new OdachiSweepCut(this.x, this.y, this.dashAngle));
                }

                this.stateTimer--;
                if (this.stateTimer <= 0) {
                    this.state = 'DASH_RECOVER';
                    this.stateTimer = this.weapon.dashRecover;
                }
                break;
            }

            case 'Kanabo': {
                // Bull rush, bonk any enemy directly in the path
                this.x += Math.cos(this.dashAngle) * this.dashSpd;
                this.y += Math.sin(this.dashAngle) * this.dashSpd;
                createTrail(this.x, this.y, this.radius * 1.4, true, this.dashAngle);

                for (let i = enemies.length - 1; i >= 0; i--) {
                    const e = enemies[i];
                    if (this.bonkedEnemies.has(e)) continue;
                    const dx   = e.x - this.x;
                    const dy   = e.y - this.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist <= this.weapon.range * 0.65) {
                        const angleToEnemy = Math.atan2(dy, dx);
                        let diff = angleToEnemy - this.dashAngle;
                        while (diff >  Math.PI) diff -= Math.PI * 2;
                        while (diff < -Math.PI) diff += Math.PI * 2;
                        if (Math.abs(diff) <= Math.PI / 4.5) {
                            // BONK
                            this.bonkedEnemies.add(e);
                            e.hit(this.weapon.damage, this.dashAngle, this.weapon.knockback * 1.6);
                            spawnParticles(e.x, e.y, 'ink-red', 18);
                            slashes.push(new Slash(e.x, e.y, this.dashAngle, this.weapon));
                            cameraShake = Math.max(cameraShake, this.weapon.damage * 7);
                            if (e.hp <= 0) {
                                spawnParticles(e.x, e.y, 'ink-red', 22);
                                enemies.splice(i, 1);
                                rebalanceRoles();
                            }
                        }
                    }
                }
                if (enemies.length === 0) setTimeout(triggerWeaponDrop, 1000);

                this.stateTimer--;
                if (this.stateTimer <= 0) {
                    this.state = 'DASH_RECOVER';
                    this.stateTimer = this.weapon.dashRecover;
                }
                break;
            }

            case 'Kama': {
                // Engetsu-giri, sprint forward, finish with a tight 360° sickle spin
                this.x += Math.cos(this.dashAngle) * this.dashSpd;
                this.y += Math.sin(this.dashAngle) * this.dashSpd;
                createTrail(this.x, this.y, this.radius * 0.65, true, this.dashAngle);

                this.stateTimer--;
                if (this.stateTimer <= 0) {
                    // Landing spin, full circle burst
                    applyDamageCustom(this.x, this.y, 0, 72, Math.PI * 2,
                        this.weapon.damage * 2.0, this.weapon.knockback * 1.2);
                    slashes.push(new KamaSpinSlash(this.x, this.y));
                    cameraShake = Math.max(cameraShake, 5);
                    this.state      = 'DASH_RECOVER';
                    this.stateTimer = this.weapon.dashRecover;
                }
                break;
            }

            case 'Yumi': {
                // Yaburi-tsuki: sprint with arrow gripped as a blade, slash enemies on exit
                this.x += Math.cos(this.dashAngle) * this.dashSpd;
                this.y += Math.sin(this.dashAngle) * this.dashSpd;
                createTrail(this.x, this.y, this.radius * 0.55, true, this.dashAngle);

                // Arrow-blade stab: pierce any enemy in a thin forward corridor
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const e = enemies[i];
                    if (this.dashedEnemies.has(e)) continue;
                    const dx        = e.x - this.x;
                    const dy        = e.y - this.y;
                    const alongFwd  = dx * Math.cos(this.dashAngle) + dy * Math.sin(this.dashAngle);
                    const alongPerp = Math.abs(-dx * Math.sin(this.dashAngle) + dy * Math.cos(this.dashAngle));
                    if (alongFwd >= -8 && alongFwd <= 28 && alongPerp <= 20) {
                        this.dashedEnemies.add(e);
                        e.hit(this.weapon.damage * 1.1, this.dashAngle, this.weapon.knockback * 0.9);
                        spawnParticles(e.x, e.y, 'ink-red', 7);
                        if (e.hp <= 0) {
                            spawnParticles(e.x, e.y, 'ink-red', 14);
                            enemies.splice(i, 1);
                            rebalanceRoles();
                        }
                    }
                }
                if (enemies.length === 0) setTimeout(triggerWeaponDrop, 1000);

                this.stateTimer--;
                if (this.stateTimer <= 0) {
                    // Skid to a stop — close-range slash with arrow, no projectile
                    slashes.push(new YumiArrowSlash(this.x, this.y, this.dashAngle, 1));
                    applyDamageCustom(this.x, this.y, this.dashAngle,
                        this.weapon.range * 0.38, Math.PI / 1.8,
                        this.weapon.damage * 1.6, this.weapon.knockback * 1.2);
                    cameraShake = Math.max(cameraShake, 3);
                    this.state      = 'DASH_RECOVER';
                    this.stateTimer = this.weapon.dashRecover;
                }
                break;
            }

            case 'Sasumata': {
                // Oshi-taoshi, planted wide fan sweep.
                // Fork swings from one flank to the other in a broad horizontal arc.
                // Every enemy caught in the sweep cone gets pushed hard sideways (not forward).
