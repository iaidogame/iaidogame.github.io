                const progress = 1 - this.stateTimer / this.stateMaxTimer;
                const sweepHalf = Math.PI / 1.75;
                // Current sweep head angle, rotates from -sweepHalf to +sweepHalf
                this.x += Math.cos(this.dashAngle) * this.dashSpd;
                this.y += Math.sin(this.dashAngle) * this.dashSpd;
                this.oshiAngle = this.dashAngle - sweepHalf + progress * sweepHalf * 2;
                if (this.stateTimer % 2 === 0) {
                    slashes.push(new SasumataOshiTrail(this.x, this.y, this.oshiAngle, progress));
                }

                // Hit check: is any enemy in a narrow cone around the current sweep head?
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const e = enemies[i];
                    if (this.pushedEnemies.has(e)) continue;
                    const dx = e.x - this.x;
                    const dy = e.y - this.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist > this.weapon.range * 0.88) continue;

                    const angleToEnemy = Math.atan2(dy, dx);
                    let diff = angleToEnemy - this.oshiAngle;
                    while (diff >  Math.PI) diff -= Math.PI * 2;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    if (Math.abs(diff) <= 0.28) { // tight per-frame hit window
                        this.pushedEnemies.add(e);
                        // Knockback perpendicular to the sweep direction (push them away from center)
                        const perpAngle = this.oshiAngle + Math.PI / 2;
                        const sideSign  = progress < 0.5 ? 1 : -1; // direction of sweep
                        e.hit(this.weapon.damage * 0.90, this.oshiAngle, this.weapon.knockback * 1.8);
                        spawnParticles(e.x, e.y, 'ink-red', 8);
                        cameraShake = Math.max(cameraShake, 4);
                        if (e.hp <= 0) {
                            spawnParticles(e.x, e.y, 'ink-red', 18);
                            enemies.splice(i, 1);
                            rebalanceRoles();
                        }
                    }
                }
                if (enemies.length === 0) setTimeout(triggerWeaponDrop, 1000);

                this.stateTimer--;
                if (this.stateTimer <= 0) {
                    // Final slam at end of sweep
                    slashes.push(new SasumataOshiFinish(this.x, this.y, this.dashAngle));
                    cameraShake = Math.max(cameraShake, 6);
                    this.state      = 'DASH_RECOVER';
                    this.stateTimer = this.weapon.dashRecover;
                }
                break;
            }

            case 'Fukiya': {
                // Kage-ashi, ghost-dash through enemies (no melee contact),
                // end up on the other side, flip 180°, fire dart back
                this.x += Math.cos(this.dashAngle) * this.dashSpd;
                this.y += Math.sin(this.dashAngle) * this.dashSpd;
                // Very faint ghost trail nearly invisible
                createTrail(this.x, this.y, this.radius * 0.30, true, this.dashAngle);

                this.stateTimer--;
                if (this.stateTimer <= 0) {
                    // 180° snap-turn, fire a heavy dart backward through wherever enemies stood
                    const backAngle = this.dashAngle + Math.PI;
                    slashes.push(new FukiyaDart(this.x, this.y, backAngle,
                        this.weapon.damage * 2.8, this.weapon.knockback * 2.0));
                    cameraShake = Math.max(cameraShake, 2);
                    this.state      = 'DASH_RECOVER';
                    this.stateTimer = this.weapon.dashRecover;
                }
                break;
            }
        }
    }

    // Katana: spawn all phantom slashes at once along the teleport path, apply damage once 
    spawnPhantomCuts(ox, oy, tx, ty) {
        const count = 7;
        const w     = this.weapon;
        const a     = this.dashAngle;
        setTimeout(() => {
            if (gameState !== 'PLAYING') return;
            for (let i = 0; i < count; i++) {
                const t  = i / (count - 1);
                const sx = ox + (tx - ox) * t;
                const sy = oy + (ty - oy) * t;
                slashes.push(new PhantomCut(sx, sy, a));
            }
            // Corridor hit: check distance from each enemy to the travel segment
            const segLen = Math.hypot(tx - ox, ty - oy);
            const hitRadius = w.range * 0.55; // how wide the blade corridor is
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e  = enemies[i];
                let dist;
                if (segLen < 1) {
                    dist = Math.hypot(e.x - ox, e.y - oy);
                } else {
                    // Project enemy onto segment, clamp to [0,1], measure perpendicular distance
                    const t = Math.max(0, Math.min(1,
                        ((e.x - ox) * (tx - ox) + (e.y - oy) * (ty - oy)) / (segLen * segLen)
                    ));
                    const closestX = ox + t * (tx - ox);
                    const closestY = oy + t * (ty - oy);
                    dist = Math.hypot(e.x - closestX, e.y - closestY);
                }
                if (dist <= hitRadius) {
                    e.hit(w.damage * 2.2, a, w.knockback * 0.8);
                    if (e.hp <= 0) {
                        spawnParticles(e.x, e.y, 'ink-red', 15);
                        enemies.splice(i, 1);
                        rebalanceRoles();
                    }
                }
            }
            if (enemies.length === 0) setTimeout(triggerWeaponDrop, 1000);
        }, 120);
    }

    draw(c) {
        c.save();
        c.translate(this.x, this.y);

        const t = Date.now() * 0.0018;

        // Compute weapon angle based on state + side system
        let weaponAngle;
        if (this.state === 'LIGHT_WINDUP' || this.state === 'LIGHT_SLASH' || this.state === 'LIGHT_RECOVER') {
            weaponAngle = this.getLightWeaponAngle();
        } else if (this.state === 'LIGHT_WAIT') {
            // Weapon tracks player rotation, use facing-relative angle
            weaponAngle = this.facingAngle + this.holdAngleLocal;
        } else if (this.state === 'LIGHT_RETURN') {
            // Updated live in update() in local space; reconstruct absolute for draw
            weaponAngle = this.facingAngle + this.holdAngleLocal;
        } else if (this.state === 'IDLE') {
            // Relaxed guard, fixed right-side pose with gentle breathing.
            // Always +1 side so returning to guard is never on the wrong side.
            const breath = Math.sin(Date.now() * 0.0014) * 0.06;
            if (this.weapon.name === 'Naginata' || this.weapon.name === 'Sasumata') {
                weaponAngle = this.facingAngle + 0.18 + breath * 0.5;
            } else if (this.weapon.name === 'Yumi') {
                // Bow held level, slightly upward, arrow pointed at target
                weaponAngle = this.facingAngle - Math.PI / 10 + breath * 0.20;
            } else if (this.weapon.name === 'Fukiya') {
                // Dead level at mouth, no breathing wobble
                weaponAngle = this.facingAngle;
            } else {
                weaponAngle = this.facingAngle + (Math.PI / 4.2) + breath;
            }
        } else {
            // During dash states: apply weapon's own angle offset
            // Sasumata Oshi-taoshi: weapon tracks the live sweep angle
            if (this.weapon.name === 'Sasumata' && (this.state === 'DASH' || this.state === 'DASH_RECOVER')) {
                weaponAngle = (this.oshiAngle !== undefined) ? this.oshiAngle : this.dashAngle;
            } else {
                weaponAngle = this.dashAngle + (this.weapon.dashWeaponAngleOffset || 0);
            }
        }

        // Compute pullback and isDash for weapon rendering 
        let pullback = 0;
        let isDashBlade = false;
        if (this.state === 'LIGHT_WINDUP') {
            const prog = 1 - this.stateTimer / this.stateMaxTimer;
            pullback = prog * (this.weapon.name === 'Naginata' ? 6 : 3);
        } else if (this.state === 'DASH_WINDUP') {
            pullback = (1 - this.stateTimer / this.stateMaxTimer) * 5;
        } else if (this.state === 'DASH' || this.state === 'DASH_RECOVER') {
            isDashBlade = true;
        }

        // Compute dynamic weapon pivot offset (light attacks + hold/return) 
        let weaponOffsetX = 0, weaponOffsetY = 0;
        let weaponScale   = 1;
        if (this.state === 'LIGHT_WINDUP' || this.state === 'LIGHT_SLASH' || this.state === 'LIGHT_RECOVER') {
            const off = this.getLightWeaponHandOffset();
            weaponOffsetX = off.x;
            weaponOffsetY = off.y;
            weaponScale   = this.getLightWeaponScale();
        } else if (this.state === 'LIGHT_WAIT') {
            const fa_d = this.facingAngle;
            weaponOffsetX = this.holdOffFwd * Math.cos(fa_d) - this.holdOffLat * Math.sin(fa_d);
            weaponOffsetY = this.holdOffFwd * Math.sin(fa_d) + this.holdOffLat * Math.cos(fa_d);
            weaponScale   = this.holdScl;
        } else if (this.state === 'LIGHT_RETURN') {
            const fa_d = this.facingAngle;
            weaponOffsetX = this.holdOffFwd * Math.cos(fa_d) - this.holdOffLat * Math.sin(fa_d);
            weaponOffsetY = this.holdOffFwd * Math.sin(fa_d) + this.holdOffLat * Math.cos(fa_d);
            weaponScale   = this.holdScl;
        }

        // Invincibility flicker
        if (this.iFrames > 0 && Math.floor(Date.now() / 80) % 2 === 0) {
            c.globalAlpha = 0.28;
        }

        // Layer 1: Weapon (at dynamic hand offset position) 
        c.save();
        c.translate(weaponOffsetX, weaponOffsetY);
        // Kama: flip the hook direction to match whichever side the attack comes from
        const weaponSideFlip = (this.weapon.name === 'Kama')
            ? ((['LIGHT_WINDUP','LIGHT_SLASH','LIGHT_RECOVER','LIGHT_WAIT','LIGHT_RETURN'].includes(this.state))
                ? this.slashStartSide : this.weaponSide)
            : 1;
        // Yumi c=1 (arrow melee slash): draw just the arrow, not the bow
        const weaponDrawMode = (this.weapon.name === 'Yumi' && this.comboCount === 1 &&
            ['LIGHT_WINDUP','LIGHT_SLASH','LIGHT_RECOVER','LIGHT_WAIT','LIGHT_RETURN'].includes(this.state))
            ? 1 : 0;
        drawWeaponHeld(c, weaponAngle, this.weapon, pullback, isDashBlade, weaponScale, weaponSideFlip, weaponDrawMode);
        c.restore();

        // Layer 2: Ground shadow 
        c.beginPath();
        c.ellipse(3, 4, 22, 12, 0, 0, Math.PI * 2);
        c.fillStyle = 'rgba(6, 3, 1, 0.12)';
        c.fill();

        // Layer 3: Robe / body (rotates with facingAngle) 
        c.save();
        c.rotate(this.facingAngle - Math.PI / 2);

        c.beginPath();
        c.moveTo(-16, -6);
        c.bezierCurveTo(-18, -2, -17, 4, -14, 8);
        c.bezierCurveTo(-8, 11, 8, 11, 14, 8);
        c.bezierCurveTo(17, 4, 18, -2, 16, -6);
        c.bezierCurveTo(10, -10, -10, -10, -16, -6);
        c.closePath();
        c.fillStyle = 'rgba(22, 14, 8, 0.96)';
        c.fill();
        c.strokeStyle = 'rgba(8, 4, 2, 0.55)';
        c.lineWidth = 1.0;
        c.stroke();

        c.beginPath();
        c.moveTo(-4, -9.5);
        c.lineTo(0, -4.5);
        c.lineTo(4, -9.5);
        c.strokeStyle = 'rgba(55, 38, 22, 0.55)';
        c.lineWidth = 1.2;
        c.stroke();

        c.beginPath();
        c.moveTo(0, -9);
        c.quadraticCurveTo(1.5, 0, 0.5, 9.5);
        c.strokeStyle = 'rgba(38, 24, 12, 0.28)';
        c.lineWidth = 0.7;
        c.stroke();

        c.beginPath();
        c.moveTo(-16, -4);
        c.quadraticCurveTo(-13, 1, -14, 7);
        c.moveTo(16, -4);
        c.quadraticCurveTo(13, 1, 14, 7);
        c.strokeStyle = 'rgba(32, 20, 10, 0.22)';
        c.lineWidth = 0.8;
        c.stroke();

        c.restore();

        // Layer 4: Hands gripping weapon (follows dynamic offset) 
        const perpW = weaponAngle + Math.PI * 0.5;
        [[9, 3.5], [15, -3.5]].forEach(([fd, pd]) => {
            const hx = weaponOffsetX + Math.cos(weaponAngle) * fd + Math.cos(perpW) * pd;
            const hy = weaponOffsetY + Math.sin(weaponAngle) * fd + Math.sin(perpW) * pd;
            c.beginPath();
            c.ellipse(hx, hy, 3.6, 2.8, weaponAngle, 0, Math.PI * 2);
            c.fillStyle = 'rgba(24, 15, 9, 0.95)';
            c.fill();
            c.beginPath();
            c.ellipse(hx - Math.cos(weaponAngle) * 0.5, hy - Math.sin(weaponAngle) * 0.5, 1.8, 1.2, weaponAngle, 0, Math.PI * 2);
            c.fillStyle = 'rgba(42, 28, 16, 0.35)';
            c.fill();
        });

        // Layer 5: Kasa hat (rotates with facing) 
        c.save();
        c.rotate(this.facingAngle - Math.PI / 2);

        const hatR  = 15;
        const hatRy = 11;

        c.beginPath();
        c.ellipse(1.5, 2, hatR + 2.5, hatRy + 2, 0, 0, Math.PI * 2);
        c.fillStyle = 'rgba(6, 3, 1, 0.22)';
        c.fill();

        const hatG = c.createRadialGradient(-3, -3, 0, 0, 0, hatR);
        if (this.state === 'DASH_WINDUP') {
            const pct = 1 - this.stateTimer / this.stateMaxTimer;
            hatG.addColorStop(0,    `rgba(230, ${Math.floor(195 - pct * 60)}, 90, 0.97)`);
            hatG.addColorStop(0.55, `rgba(190, 148, 62, 0.97)`);
            hatG.addColorStop(1,    `rgba(130, 95,  38, 0.95)`);
        } else if (this.state === 'LIGHT_WINDUP') {
            hatG.addColorStop(0,    'rgba(230, 210, 120, 0.97)');
            hatG.addColorStop(0.55, 'rgba(205, 168, 72, 0.97)');
            hatG.addColorStop(1,    'rgba(130, 95,  38, 0.95)');
        } else {
            hatG.addColorStop(0,    'rgba(230, 200, 110, 0.97)');
            hatG.addColorStop(0.35, 'rgba(210, 175,  82, 0.97)');
            hatG.addColorStop(0.72, 'rgba(175, 135,  55, 0.97)');
            hatG.addColorStop(1,    'rgba(130,  95,  38, 0.95)');
        }
        c.beginPath();
        c.ellipse(0, 0, hatR, hatRy, 0, 0, Math.PI * 2);
        c.fillStyle = hatG;
        c.fill();

        for (let ring = 1; ring <= 5; ring++) {
            const rr  = (ring / 6.0) * hatR;
            const ry2 = (ring / 6.0) * hatRy;
            c.beginPath();
            c.ellipse(0, 0, rr, ry2, 0, 0, Math.PI * 2);
            c.strokeStyle = `rgba(100, 68, 28, ${0.12 + ring * 0.038})`;
            c.lineWidth   = ring === 2 || ring === 4 ? 1.1 : 0.65;
            c.stroke();
        }

        for (let fi = 0; fi < 16; fi++) {
            const fa  = (fi / 16) * Math.PI * 2;
            const fx2 = Math.cos(fa) * hatR * 0.90;
            const fy2 = Math.sin(fa) * hatRy * 0.90;
            c.beginPath();
            c.moveTo(Math.cos(fa) * 1.2, Math.sin(fa) * 0.9);
            c.lineTo(fx2, fy2);
            c.strokeStyle = `rgba(95, 62, 22, ${0.09 + (fi % 3) * 0.03})`;
            c.lineWidth = fi % 4 === 0 ? 0.9 : 0.5;
            c.stroke();
        }

        c.beginPath();
        c.ellipse(0, 0, hatR, hatRy, 0, 0, Math.PI * 2);
        c.strokeStyle = 'rgba(55, 32, 10, 0.88)';
        c.lineWidth   = 2.0;
        c.stroke();

        c.beginPath();
        c.ellipse(0, 0, hatR * 0.80, hatRy * 0.80, 0, 0, Math.PI * 2);
        c.strokeStyle = 'rgba(80, 48, 16, 0.38)';
        c.lineWidth   = 1.2;
        c.stroke();

        const apexG = c.createRadialGradient(-0.8, -0.8, 0, 0, 0, 3.5);
        apexG.addColorStop(0, 'rgba(240, 215, 130, 0.98)');
        apexG.addColorStop(1, 'rgba(145, 105,  42, 0.95)');
        c.beginPath();
        c.arc(0, 0, 3.0, 0, Math.PI * 2);
        c.fillStyle = apexG;
        c.fill();
        c.beginPath();
        c.arc(0, 0, 3.0, 0, Math.PI * 2);
        c.strokeStyle = 'rgba(70, 42, 14, 0.80)';
        c.lineWidth   = 0.9;
        c.stroke();

        c.restore(); // end hat rotation

        // Dash windup: seal-red charging ring + orbiting motes 
        if (this.state === 'DASH_WINDUP') {
            const pct = 1 - this.stateTimer / this.stateMaxTimer;

            c.beginPath();
            c.arc(0, 0, hatR + 10, -Math.PI / 2, -Math.PI / 2 + pct * Math.PI * 2);
            const [ri, gi, bi] = this.weapon.slashRGB;
            c.strokeStyle = `rgba(${ri + 30}, ${gi + 12}, ${bi + 5}, ${pct * 0.90})`;
            c.lineWidth   = 2.8;
            c.stroke();

            for (let m = 0; m < 5; m++) {
                const ma = t * 3.8 + (m / 5) * Math.PI * 2;
                const mr = hatR + 8 + Math.sin(t * 5.2 + m * 1.4) * 2.5;
                const mx = Math.cos(ma) * mr;
                const my = Math.sin(ma) * mr * 0.72;
                c.beginPath();
                c.arc(mx, my, 1.8 + Math.sin(t * 6.5 + m) * 0.5, 0, Math.PI * 2);
                c.fillStyle = `rgba(${ri + 20}, ${gi + 10}, ${bi}, ${pct * 0.80})`;
                c.fill();
            }
        }

        // Light windup: subtle warm flash 
        if (this.state === 'LIGHT_WINDUP') {
            const pct = 1 - this.stateTimer / this.stateMaxTimer;
            c.beginPath();
            c.arc(0, 0, hatR + 6, -Math.PI / 2, -Math.PI / 2 + pct * Math.PI * 2);
            c.strokeStyle = `rgba(100, 75, 28, ${pct * 0.55})`;
            c.lineWidth   = 1.6;
            c.stroke();
        }

        c.globalAlpha = 1.0;
        c.restore();
    }

    takeDamage() {
        if (this.iFrames > 0 || this.state === 'DASH') return;
        this.hp--;
        this.iFrames = 60;
        updateHUD();
        cameraShake = 15;
        spawnParticles(this.x, this.y, 'scatter', 10);
        if (this.hp <= 0) gameOver();
    }
}

// ENEMY Ink Amalgamation Creatures, Standoff AI

// How many enemies actively press the player at once (scales with wave)
function getMaxAttackers() {
    return Math.min(3 + Math.floor(currentWave / 3), 6);
}

// Called after any enemy death, wave start, or every 2s
// re-selects the closest N enemies as attackers, demoting the rest to standoff.
function rebalanceRoles() {
    if (!player || enemies.length === 0) return;
    const max = getMaxAttackers();

    // Sort all living enemies by distance to player
    const sorted = [...enemies].sort((a, b) => {
        const da = Math.hypot(a.x - player.x, a.y - player.y);
        const db = Math.hypot(b.x - player.x, b.y - player.y);
        return da - db;
    });

    sorted.forEach((e, i) => {
        const dist = Math.hypot(e.x - player.x, e.y - player.y);
        const shouldAttack = i < max || dist < 90; // close enough = always attacker
        const currentlyAttacking = e.role === 'ATTACKER';
        if (shouldAttack && !currentlyAttacking) e.assignRole('ATTACKER');
        else if (!shouldAttack && currentlyAttacking) e.assignRole('STANDOFF');
    });
}

// Periodic rebalance timer (ticks in update(), fires every 2 s = 120 frames)
let roleRebalanceTick = 0;

class Enemy {
    constructor(x, y, wave) {
        this.x = x; this.y = y;
        this.radius    = 14;
        this.maxHp     = 1 + Math.floor((wave - 1) / 2);
        if (wave > 5 && Math.random() < 0.2) this.maxHp += 2;
        this.hp        = this.maxHp;
        this.speed     = 2.0 + Math.min(wave * 0.15, 2.5);
        this.vx = 0; this.vy = 0;
        this.knockbackTimer = 0;
        this.stunTimer      = 0;
        this.seed           = Math.random() * 120;

        // Tactical AI 
        this.role            = 'STANDOFF';   // 'ATTACKER' | 'STANDOFF'
        this.aiState         = 'ORBIT';      // ATTACKER: 'APPROACH'|'STRAFE'|'DODGE'|'PRESS'  STANDOFF: 'ORBIT'
        this.strafeDir       = Math.random() < 0.5 ? 1 : -1;
        this.strafeTimer     = 50 + Math.random() * 80;
        this.pressTimer      = 0;
        this.dodgeTimer      = 0;
        this.dodgeDelayTimer = 0;
        this.isDodging       = false;
        this.seenAttack      = false;   // edge-detect: only react once per player windup
        // Orbit settings for standoff role
        this.orbitAngle  = Math.random() * Math.PI * 2;
        this.orbitRadius = 170 + Math.random() * 70;
        this.orbitSpeed  = (0.006 + Math.random() * 0.006) * (Math.random() < 0.5 ? 1 : -1);
        // Lunge attack timer (attacker only)
        this.lungeTimer  = 60 + Math.random() * 80;
    }

    assignRole(role) {
        this.role = role;
        if (role === 'ATTACKER') {
            this.aiState    = 'APPROACH';
            this.pressTimer = 20 + Math.random() * 25;
            this.lungeTimer = 40 + Math.random() * 60;
        } else {
            this.aiState    = 'ORBIT';
            this.orbitAngle = Math.atan2(this.y - player.y, this.x - player.x);
        }
    }

    update() {
        if (this.knockbackTimer > 0) {
            this.x += this.vx;
            this.y += this.vy;
            this.vx *= 0.85;
            this.vy *= 0.85;
            this.knockbackTimer--;
        } else if (this.stunTimer > 0) {
            this.stunTimer--;
            // Demote to standoff if stunned so another can take the slot
            if (this.role === 'ATTACKER') {
                this.assignRole('STANDOFF');
                rebalanceRoles();
            }
        } else {
            this.updateAI();
        }

        const pDist = Math.hypot(player.x - this.x, player.y - this.y);
        if (pDist < this.radius + player.radius) player.takeDamage();
    }

    updateAI() {
        const dx   = player.x - this.x;
        const dy   = player.y - this.y;
        const dist = Math.hypot(dx, dy) || 0.001;

        // Player attack detection, edge trigger
        const playerWindingUp = player.state === 'LIGHT_WINDUP' || player.state === 'DASH_WINDUP';

        // Proximity override: if standoff but too close, become attacker immediately 
        if (this.role === 'STANDOFF' && dist < 120) {
            this.assignRole('ATTACKER');
        }

        if (this.role === 'STANDOFF') {
            this.updateStandoff(dx, dy, dist);
        } else {
            this.updateAttacker(dx, dy, dist, playerWindingUp);
        }

        // Soft world boundary
        this.x = Math.max(22, Math.min(width  - 22, this.x));
        this.y = Math.max(22, Math.min(height - 22, this.y));
    }

    // STANDOFF: dynamically orbit the player at a comfortable radius 
    updateStandoff(dx, dy, dist) {
        // Advance orbit angle so they circle continuously
        this.orbitAngle += this.orbitSpeed;

        // Occasionally nudge direction or radius for organic feel
        this.strafeTimer--;
        if (this.strafeTimer <= 0) {
            if (Math.random() < 0.25) this.orbitSpeed *= -1;
            this.orbitRadius = 150 + Math.random() * 90;
            this.strafeTimer = 90 + Math.random() * 90;
        }

        // Target position: player + orbitAngle at orbitRadius
        const targetX = player.x + Math.cos(this.orbitAngle) * this.orbitRadius;
        const targetY = player.y + Math.sin(this.orbitAngle) * this.orbitRadius;

        const tdx   = targetX - this.x;
        const tdy   = targetY - this.y;
        const tdist = Math.hypot(tdx, tdy) || 0.001;

        // Chase the orbit target (slower speed so they don't snap)
        const spd = Math.min(this.speed * 0.65, tdist * 0.10);
        if (tdist > 4) {
            this.x += (tdx / tdist) * spd;
            this.y += (tdy / tdist) * spd;
        }

        this.applyEnemySeparation(1.0);
    }

    // ATTACKER: strafe, press in, dodge on player windup 
    updateAttacker(dx, dy, dist, playerWindingUp) {
        // Dodge detection: react once per windup start 
        if (playerWindingUp && !this.seenAttack && dist < 220) {
            this.seenAttack = true;
            const roll = Math.random();
            if (roll < 0.45) {
                // Didn't see it/ignores, no dodge
                this.isDodging = false;
            } else if (roll < 0.68) {
                // Reacts in time, short delay then dodge back
                this.dodgeDelayTimer = Math.floor(Math.random() * 8);
                this.isDodging = true;
            } else {
                // Sees it late, longer delay, might get clipped anyway
                this.dodgeDelayTimer = 9 + Math.floor(Math.random() * 14);
                this.isDodging = true;
            }
        }
        if (!playerWindingUp) this.seenAttack = false;

        // Count down dodge reaction delay
        if (this.isDodging && this.dodgeDelayTimer > 0) {
            this.dodgeDelayTimer--;
            if (this.dodgeDelayTimer <= 0) {
                this.aiState   = 'DODGE';
                this.dodgeTimer = 24 + Math.floor(Math.random() * 8); // ~0.4–0.55 s
            }
        }

        // State: DODGE, slow controlled backstep 
        if (this.aiState === 'DODGE') {
            // Retreat directly away from player, deliberately slow so it feels like a measured step
            this.x -= (dx / dist) * this.speed * 0.75;
            this.y -= (dy / dist) * this.speed * 0.75;

            this.dodgeTimer--;
            if (this.dodgeTimer <= 0) {
                this.isDodging = false;
                this.aiState   = 'STRAFE';
                this.strafeTimer = 40 + Math.random() * 55;
            }
            this.applyEnemySeparation(0.6);
            return;
        }

        // State: APPROACH, close the gap aggressively
        if (this.aiState === 'APPROACH') {
            if (dist > 0) {
                this.x += (dx / dist) * this.speed * 1.85;
                this.y += (dy / dist) * this.speed * 1.85;
            }
            this.pressTimer--;
            // Only switch to strafe when very close (contact range + small buffer)
            if (dist <= 38 || this.pressTimer <= 0) {
                this.aiState     = 'STRAFE';
                this.strafeTimer = 30 + Math.random() * 50;
                this.strafeDir   = Math.random() < 0.5 ? 1 : -1;
            }
            this.applyEnemySeparation(0.7);
            return;
        }

        // State: STRAFE, circle tight around the player, staying in contact range
        if (this.aiState === 'STRAFE') {
            // Perpendicular direction (tangent to player)
            const perpX = -dy / dist;
            const perpY =  dx / dist;

            // Tight engagement: orbit just outside contact so they graze the player
            const desiredDist = 5;
            let radial = 0;
            if (dist > desiredDist + 12)       radial =  0.70; // step in hard
            else if (dist < desiredDist - 10)  radial = -0.50; // step back slightly

            this.x += perpX * this.strafeDir * this.speed * 0.75 + (dx / dist) * radial * this.speed;
            this.y += perpY * this.strafeDir * this.speed * 0.75 + (dy / dist) * radial * this.speed;

            // Lunge timer: every so often burst straight at the player for contact damage
            this.lungeTimer--;
            if (this.lungeTimer <= 0) {
                this.aiState    = 'APPROACH';
                this.pressTimer = 18 + Math.random() * 20;
                this.lungeTimer = 50 + Math.random() * 70;
            }

            this.strafeTimer--;
            if (this.strafeTimer <= 0) {
                const roll = Math.random();
                if (roll < 0.30) {
                    // Flip strafe direction
                    this.strafeDir  *= -1;
                    this.strafeTimer = 25 + Math.random() * 40;
                } else {
                    // Press in again
                    this.aiState    = 'APPROACH';
                    this.pressTimer = 15 + Math.random() * 20;
                }
            }
            this.applyEnemySeparation(0.7);
        }
    }

    // Soft push away from nearby enemies so they don't stack
    applyEnemySeparation(strength) {
        for (const other of enemies) {
            if (other === this) continue;
            const ex = this.x - other.x;
            const ey = this.y - other.y;
            const ed = Math.hypot(ex, ey) || 0.001;
            const minDist = (this.radius + other.radius) * 2.8;
            if (ed < minDist) {
                const force = ((minDist - ed) / minDist) * strength;
                this.x += (ex / ed) * force * 3.0;
                this.y += (ey / ed) * force * 3.0;
            }
        }
    }

    draw(c) {
        c.save();
        c.translate(this.x, this.y);

        const t       = Date.now() * 0.0016 + this.seed;
        const r       = this.radius;
        const hpRatio = this.hp / this.maxHp;
        const density = this.stunTimer > 0
            ? 0.20
            : (0.55 + hpRatio * 0.45);

        const haloG = c.createRadialGradient(0, 0, r * 0.3, 0, 0, r * 2.1);
        haloG.addColorStop(0, `rgba(16, 10, 5, ${density * 0.30})`);
        haloG.addColorStop(1, 'rgba(16, 10, 5, 0)');
        c.beginPath();
        c.arc(0, 0, r * 2.1, 0, Math.PI * 2);
        c.fillStyle = haloG;
        c.fill();

        if (this.stunTimer <= 0) {
            const tCount = Math.min(Math.ceil(this.maxHp * 1.5) + 2, 8);
            for (let ti = 0; ti < tCount; ti++) {
                const ta     = (ti / tCount) * Math.PI * 2 + t * 0.32 + this.seed;
                const tLen   = r * (0.7 + Math.sin(t * 1.5 + ti * 2.2) * 0.42 + hpRatio * 0.28);
                const wobble = Math.sin(t * 2.4 + ti * 1.9) * 0.50;
                const cpx = Math.cos(ta + wobble * 0.5) * tLen * 0.60;
                const cpy = Math.sin(ta + wobble * 0.5) * tLen * 0.60;
                const ex  = Math.cos(ta + wobble) * tLen * 1.35;
                const ey  = Math.sin(ta + wobble) * tLen * 1.35;
                const tAlpha = density * (0.48 + Math.sin(t * 1.2 + ti) * 0.24);

                c.beginPath();
                c.moveTo(Math.cos(ta) * r * 0.72, Math.sin(ta) * r * 0.72);
                c.quadraticCurveTo(cpx, cpy, ex, ey);
                c.lineWidth   = 2.8 + Math.sin(t * 0.95 + ti) * 1.1;
                c.strokeStyle = `rgba(16, 10, 5, ${tAlpha})`;
                c.lineCap     = 'round';
                c.stroke();

                c.beginPath();
                c.arc(ex, ey, 2.0 + Math.sin(t * 1.7 + ti) * 0.65, 0, Math.PI * 2);
                c.fillStyle = `rgba(16, 10, 5, ${tAlpha * 0.82})`;
                c.fill();
            }
        }

        const pts = 10 + Math.floor(this.maxHp / 2) * 2;
        c.beginPath();
        for (let i = 0; i <= pts; i++) {
            const a = (i / pts) * Math.PI * 2;
            const noise = 1
                + Math.sin(i * 1.85 + t)          * 0.20
                + Math.sin(i * 3.30 + t * 1.28)   * 0.11
                + Math.sin(i * 0.75 + t * 0.62)   * 0.07;
            const px = Math.cos(a) * r * noise;
            const py = Math.sin(a) * r * noise;
            i === 0 ? c.moveTo(px, py) : c.lineTo(px, py);
        }
        c.closePath();

        if (this.stunTimer > 0) {
            c.fillStyle   = 'rgba(232, 218, 198, 0.76)';
            c.strokeStyle = 'rgba(26, 18, 9, 0.36)';
        } else {
            const bodyG = c.createRadialGradient(r * 0.18, -r * 0.18, 0, 0, 0, r * 1.18);
            bodyG.addColorStop(0,    `rgba(52, 36, 18, ${density})`);
            bodyG.addColorStop(0.42, `rgba(26, 18, 9,  ${density})`);
            bodyG.addColorStop(1,    `rgba(12, 8,  4,  ${density * 0.80})`);
            c.fillStyle   = bodyG;
            c.strokeStyle = `rgba(6, 3, 1, ${density * 0.88})`;
        }
        c.fill();
        c.lineWidth = 1.5;
        c.stroke();

        if (this.stunTimer <= 0) {
            const ipts = 6;
            c.beginPath();
            for (let i = 0; i <= ipts; i++) {
                const a = (i / ipts) * Math.PI * 2 + t * 0.26;
                const n = 1 + Math.sin(i * 2.4 + t * 1.1) * 0.23;
                const px = Math.cos(a) * r * 0.50 * n;
                const py = Math.sin(a) * r * 0.50 * n;
                i === 0 ? c.moveTo(px, py) : c.lineTo(px, py);
            }
            c.closePath();
            c.fillStyle = `rgba(10, 6, 2, ${density * 0.40})`;
            c.fill();

            const glossG = c.createRadialGradient(r * 0.28, -r * 0.32, 0, r * 0.28, -r * 0.32, r * 0.30);
            glossG.addColorStop(0, `rgba(50, 36, 18, ${density * 0.28})`);
            glossG.addColorStop(1, 'rgba(50, 36, 18, 0)');
            c.beginPath();
            c.arc(r * 0.28, -r * 0.32, r * 0.30, 0, Math.PI * 2);
            c.fillStyle = glossG;
            c.fill();
        }

        if (this.stunTimer <= 0) {
            const blinkOpen = Math.sin(t * 4.5 + this.seed * 2.3) > 0.05;
            if (blinkOpen) {
                const ex1 = r * 0.20 + Math.sin(t * 0.42) * 1.9;
                const ey1 = -r * 0.16 + Math.cos(t * 0.60) * 1.3;
                const ewW = r * (0.23 + Math.sin(t * 1.9) * 0.04);
                const ewH = r * (0.15 + Math.sin(t * 3.1) * 0.03);

                c.save();
                c.shadowBlur  = 5;
                c.shadowColor = 'rgba(240, 225, 205, 0.55)';
                c.beginPath();
                c.ellipse(ex1, ey1, ewW, ewH, Math.sin(t * 0.28) * 0.22, 0, Math.PI * 2);
                c.fillStyle = 'rgba(245, 232, 215, 0.94)';
                c.fill();
                c.restore();

                c.beginPath();
                c.ellipse(
                    ex1 + Math.sin(t * 0.65) * 1.4,
                    ey1 + Math.cos(t * 0.48) * 0.7,
                    ewW * 0.36, ewH * 0.72, 0, 0, Math.PI * 2
                );
                c.fillStyle = 'rgba(108, 14, 14, 0.90)';
                c.fill();

                if (this.maxHp > 1) {
                    const ex2 = -r * 0.18 + Math.cos(t * 0.36) * 1.6;
                    const ey2 =  r * 0.14 + Math.sin(t * 0.53) * 1.1;
                    c.beginPath();
                    c.ellipse(ex2, ey2, r * 0.145, r * 0.09, Math.sin(t * 0.78) * 0.38, 0, Math.PI * 2);
                    c.fillStyle = 'rgba(232, 215, 192, 0.80)';
                    c.fill();
                    c.beginPath();
                    c.arc(ex2, ey2, r * 0.052, 0, Math.PI * 2);
                    c.fillStyle = 'rgba(92, 12, 12, 0.84)';
                    c.fill();
                }

                if (this.maxHp >= 5) {
                    const ex3 = r * 0.04 + Math.sin(t * 0.55) * 1.1;
                    const ey3 = r * 0.28 + Math.cos(t * 0.38) * 0.9;
                    c.beginPath();
                    c.ellipse(ex3, ey3, r * 0.12, r * 0.072, 0.18, 0, Math.PI * 2);
                    c.fillStyle = 'rgba(235, 215, 192, 0.68)';
                    c.fill();
                    c.beginPath();
                    c.arc(ex3, ey3, r * 0.042, 0, Math.PI * 2);
                    c.fillStyle = 'rgba(82, 10, 10, 0.80)';
                    c.fill();
                }

            } else {
                const ex1 = r * 0.20 + Math.sin(t * 0.42) * 1.9;
                const ey1 = -r * 0.16;
                c.beginPath();
                c.ellipse(ex1, ey1, r * 0.20, r * 0.030, 0, 0, Math.PI * 2);
                c.fillStyle = 'rgba(238, 222, 202, 0.52)';
                c.fill();
            }
        } else {
            const ex = r * 0.20, ey = -r * 0.12;
            c.strokeStyle = 'rgba(115, 88, 65, 0.52)';
            c.lineWidth   = 1.9;
            c.lineCap     = 'round';
            [[-1, 1], [1, -1]].forEach(([sx, sy]) => {
                c.beginPath();
                c.moveTo(ex + sx * 3.8, ey + sy * 3.8);
                c.lineTo(ex - sx * 3.8, ey - sy * 3.8);
                c.stroke();
            });
            c.strokeStyle = 'rgba(95, 72, 52, 0.22)';
            c.lineWidth   = 1.0;
            for (let arm = 0; arm < 2; arm++) {
                c.beginPath();
                for (let st = 0; st <= 22; st++) {
                    const sa = arm * Math.PI + (st / 22) * Math.PI * 1.6;
                    const sr = (st / 22) * r * 0.38;
                    const sx = ex + Math.cos(sa) * sr;
                    const sy2 = ey + Math.sin(sa) * sr;
                    st === 0 ? c.moveTo(sx, sy2) : c.lineTo(sx, sy2);
                }
                c.stroke();
            }
        }

        c.restore();
    }

    hit(damage, angle, weaponKnockback) {
        this.hp -= damage;
        spawnParticles(this.x, this.y, 'ink-red', 8);
        if (this.hp > 0) {
            this.vx             = Math.cos(angle) * weaponKnockback;
            this.vy             = Math.sin(angle) * weaponKnockback;
            this.knockbackTimer = 10;
            this.stunTimer      = 20;
        }
    }
}

// SLASH, Dash Attack Brushstroke Arc (original visual system)
class Slash {
    constructor(x, y, angle, weapon) {
        this.x       = x; this.y = y;
        this.angle   = angle;
        this.weapon  = weapon;
        this.life    = weapon.dashFrames + 8;
        this.maxLife = this.life;
    }

    update() { this.life--; }

    draw(c) {
        if (this.life <= 0) return;

        const alpha = this.life / this.maxLife;
        const [ri, gi, bi] = this.weapon.slashRGB;
        const range  = this.weapon.range;
        const arc    = this.weapon.arc;

        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.angle);

        const bloomG = c.createRadialGradient(0, 0, range * 0.25, 0, 0, range * 1.25);
        bloomG.addColorStop(0, `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.10})`);
        bloomG.addColorStop(1, `rgba(${ri}, ${gi}, ${bi}, 0)`);
        c.beginPath();
        c.arc(0, 0, range * 1.25, -arc / 2, arc / 2);
        c.lineTo(0, 0);
        c.fillStyle = bloomG;
        c.fill();

        c.beginPath();
        c.arc(0, 0, range * 0.70, -arc / 2, arc / 2);
        c.lineTo(0, 0);
        c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.045})`;
        c.fill();

        const segs  = 18;
        const baseW = range * (
            this.weapon.name === 'Kanabo'    ? 0.135 :
            this.weapon.name === 'Odachi'    ? 0.130 :
            this.weapon.name === 'Naginata'  ? 0.092 :
            this.weapon.name === 'Sasumata'  ? 0.108 :
            this.weapon.name === 'Kama'      ? 0.075 :
            this.weapon.name === 'Yumi'      ? 0.048 :
            this.weapon.name === 'Fukiya'    ? 0.040 :
            0.082
        );
        c.lineCap = 'round';

        for (let i = 0; i < segs; i++) {
            const t0  = i / segs;
            const t1  = (i + 1) / segs;
            const a0  = -arc / 2 + t0 * arc;
            const a1  = -arc / 2 + t1 * arc;
            const mid    = Math.sin(((t0 + t1) / 2) * Math.PI);
            const jitter = 1 + Math.sin(i * 7.4 + this.maxLife * 0.3) * 0.13;
            const sw     = Math.max(baseW * mid * alpha * jitter, 0.5);

            c.beginPath();
            c.arc(0, 0, range, a0, a1);
            c.lineWidth   = sw;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.92})`;
            c.stroke();
        }

        c.beginPath();
        c.arc(0, 0, range * 0.94, -arc / 2, arc / 2);
        c.lineWidth   = 1.6 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha})`;
        c.stroke();

        switch (this.weapon.name) {
            case 'Katana': {
                c.beginPath();
                c.arc(0, 0, range * 0.87, -arc / 2 + arc * 0.08, arc / 2 - arc * 0.08);
                c.lineWidth   = 0.85 * alpha;
                c.strokeStyle = `rgba(225, 215, 198, ${alpha * 0.52})`;
                c.stroke();
                break;
            }
            case 'Naginata': {
                c.beginPath();
                c.arc(0, 0, range * 1.06, -arc / 2 + arc * 0.18, arc / 2 - arc * 0.18);
                c.lineWidth   = 1.3 * alpha;
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.55})`;
                c.stroke();
                c.beginPath();
                c.arc(0, 0, range * 0.72, -arc / 2, arc / 2);
                c.lineWidth   = 3.5 * alpha;
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.18})`;
                c.stroke();
                break;
            }
            case 'Kanabo': {
                for (let cr = 0; cr < 6; cr++) {
                    const ca    = -arc / 2 + (cr / 5) * arc;
                    const crLen = range * (0.14 + (cr % 2) * 0.07) * alpha;
                    c.beginPath();
                    c.moveTo(Math.cos(ca) * range * 0.90, Math.sin(ca) * range * 0.90);
                    c.lineTo(Math.cos(ca) * (range * 0.90 + crLen), Math.sin(ca) * (range * 0.90 + crLen));
                    c.lineWidth   = (2.0 - cr * 0.12) * alpha;
                    c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.60})`;
                    c.stroke();
                }
                c.beginPath();
                c.arc(0, 0, range * (0.50 + (1 - alpha) * 0.55), 0, Math.PI * 2);
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.15})`;
                c.lineWidth   = 4 * alpha;
                c.stroke();
                break;
            }
            case 'Odachi': {
                c.beginPath();
                c.arc(0, 0, range * 0.80, -arc / 2, arc / 2);
                c.lineWidth   = baseW * 0.38 * alpha;
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.58})`;
                c.stroke();
                c.beginPath();
                c.arc(0, 0, range * 1.10, -arc / 2 + arc * 0.12, arc / 2 - arc * 0.12);
                c.lineWidth   = 2.0 * alpha;
                c.strokeStyle = `rgba(${ri + 18}, ${gi + 12}, ${bi + 8}, ${alpha * 0.36})`;
                c.stroke();
                break;
            }
            case 'Kama': {
                // Hook crescent, tight inner arc ghost
                c.beginPath();
                c.arc(0, 0, range * 0.68, -arc / 2, arc / 2);
                c.lineWidth   = 3.5 * alpha;
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.22})`;
                c.stroke();
                c.beginPath();
                c.arc(0, 0, range * 1.04, -arc / 2 + arc * 0.10, arc / 2 - arc * 0.10);
                c.lineWidth   = 1.5 * alpha;
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.60})`;
                c.stroke();
                break;
            }
            case 'Yumi': {
                // Arrow shot dash, very tight needle streak instead of arc
                c.beginPath();
                c.moveTo(-range * 0.2, 0);
                c.lineTo( range * 0.92, 0);
                c.lineWidth   = 2.4 * alpha;
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.80})`;
                c.stroke();
                c.beginPath();
                c.moveTo(-range * 0.4, -2.5);
                c.lineTo( range * 0.70, -2.5);
                c.lineWidth   = 0.7 * alpha;
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.32})`;
                c.stroke();
                break;
            }
            case 'Sasumata': {
                // Oshi fan, wide open semi-circle sweep visible in the arc
                c.beginPath();
                c.arc(0, 0, range * 0.76, -arc / 2, arc / 2);
                c.lineWidth   = baseW * 0.46 * alpha;
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.45})`;
                c.stroke();
                // Outer sharp edge
                c.beginPath();
                c.arc(0, 0, range * 1.05, -arc / 2 + arc * 0.06, arc / 2 - arc * 0.06);
                c.lineWidth   = 2.2 * alpha;
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.75})`;
                c.stroke();
                // Fork shape etched at the leading tip
                c.beginPath();
                c.arc(0, 0, range * 0.60, -0.22, 0.22);
                c.lineWidth   = 6 * alpha;
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.12})`;
                c.stroke();
                break;
            }
            case 'Fukiya': {
                // Dart burst, ultra-narrow needle
                c.beginPath();
                c.moveTo(-range * 0.10, 0);
                c.lineTo( range * 0.96, 0);
                c.lineWidth   = 1.5 * alpha;
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.75})`;
                c.stroke();
                break;
            }
        }

        [-1, 1].forEach(side => {
            const ta = side * arc / 2;
            const tx = Math.cos(ta) * range;
            const ty = Math.sin(ta) * range;
            c.beginPath();
            c.arc(tx, ty, 3.2 * alpha, 0, Math.PI * 2);
            c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.72})`;
            c.fill();
            c.beginPath();
            c.arc(tx + side * 5 * alpha, ty + Math.sin(ta) * 3 * alpha, 1.6 * alpha, 0, Math.PI * 2);
            c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.38})`;
            c.fill();
        });

        if (alpha > 0.82) {
            const flashA = (alpha - 0.82) / 0.18;
            c.beginPath();
            c.arc(0, 0, range * 0.32, 0, Math.PI * 2);
            c.fillStyle = `rgba(${Math.min(ri + 50, 210)}, ${Math.min(gi + 45, 180)}, ${Math.min(bi + 35, 155)}, ${flashA * 0.55})`;
            c.fill();
        }

        c.restore();
    }
}

// LIGHT SLASH, J-key: fast horizontal ink stroke
// Sweeps from weaponSide to the opposite side
class LightSlash {
    constructor(x, y, angle, weapon, fromSide) {
        this.x        = x; this.y = y;
        this.angle    = angle;
        this.fromSide = fromSide; // 1 = swept from right, -1 = swept from left
        this.weapon   = weapon;
        this.life     = 15;
        this.maxLife  = 15;
    }

    update() { this.life--; }

    draw(c) {
        if (this.life <= 0) return;
        const alpha = this.life / this.maxLife;
        const [ri, gi, bi] = this.weapon.slashRGB;
        const range = this.weapon.range * 0.65;

        // Arc always spans the same region in front of the player.
        // fromSide only controls where the flash burst appears (where the sweep begins).
        const halfArc    = Math.PI / 2.8;
        const startA     = -halfArc;                         // always left-to-right on canvas
        const endA       =  halfArc;
        const flashStartA = -this.fromSide * halfArc;        // which edge the stroke started from

        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.angle);

        // Soft bloom wedge
        const bloomG = c.createRadialGradient(0, 0, range * 0.1, 0, 0, range * 0.95);
        bloomG.addColorStop(0, `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.09})`);
        bloomG.addColorStop(1, `rgba(${ri}, ${gi}, ${bi}, 0)`);
        c.beginPath();
        c.moveTo(0, 0);
        c.arc(0, 0, range * 0.95, startA, endA);
        c.closePath();
        c.fillStyle = bloomG;
        c.fill();

        // Calligraphic brush stroke, pressure-varied arc
        const segs = 14;
        c.lineCap = 'round';
        for (let i = 0; i < segs; i++) {
            const t0 = i / segs;
            const t1 = (i + 1) / segs;
            const a0 = startA + t0 * (endA - startA);
            const a1 = startA + t1 * (endA - startA);
            const mid = Math.sin(((t0 + t1) / 2) * Math.PI);
            // Imperfect bristle jitter, handmade feel
            const jitter = 1 + Math.sin(i * 7.3 + this.maxLife * 0.5) * 0.11;
            const sw = Math.max(range * 0.11 * mid * alpha * jitter, 0.4);

            c.beginPath();
            c.arc(0, 0, range, a0, a1);
            c.lineWidth   = sw;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.90})`;
            c.stroke();
        }

        // Sharp cutting edge line
        c.beginPath();
        c.arc(0, 0, range * 0.93,
            startA + (endA - startA) * 0.05,
            endA   - (endA - startA) * 0.05);
        c.lineWidth   = 1.3 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha})`;
        c.stroke();

        // Katana glint shimmer
        if (this.weapon.name === 'Katana') {
            c.beginPath();
            c.arc(0, 0, range * 0.87,
                startA + 0.09,
                endA   - 0.09);
            c.lineWidth   = 0.75 * alpha;
            c.strokeStyle = `rgba(225, 215, 200, ${alpha * 0.44})`;
            c.stroke();
        }

        // Ink drops at tip and tail (brush lift-off)
        [startA, endA].forEach(ta => {
            const tx = Math.cos(ta) * range;
            const ty = Math.sin(ta) * range;
            c.beginPath();
            c.arc(tx, ty, 2.2 * alpha, 0, Math.PI * 2);
            c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.62})`;
            c.fill();
            // Secondary micro-bead
            const bx = tx + Math.cos(ta + Math.PI / 2) * 3 * alpha;
            const by = ty + Math.sin(ta + Math.PI / 2) * 3 * alpha;
            c.beginPath();
            c.arc(bx, by, 1.1 * alpha, 0, Math.PI * 2);
            c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.30})`;
            c.fill();
        });

        // Flash burst at beginning of stroke (appears on the side the sweep started from)
        if (alpha > 0.80) {
            const flash = (alpha - 0.80) / 0.20;
            const cx2 = Math.cos(flashStartA) * range * 0.5;
            const cy2 = Math.sin(flashStartA) * range * 0.5;
            c.beginPath();
            c.arc(cx2, cy2, range * 0.14, 0, Math.PI * 2);
            c.fillStyle = `rgba(${Math.min(ri + 55, 215)}, ${Math.min(gi + 48, 185)}, ${Math.min(bi + 38, 160)}, ${flash * 0.45})`;
            c.fill();
        }

        c.restore();
    }
}

// NAGINATA STAB, forward piercing thrust visual
class NaginataStab {
    constructor(x, y, angle, isFinisher) {
        this.x          = x; this.y = y;
        this.angle      = angle;
        this.isFinisher = isFinisher;
        this.life       = isFinisher ? 22 : 16;
        this.maxLife    = this.life;
        const [ri, gi, bi] = WEAPONS.Naginata.slashRGB;
        this.r = ri; this.g = gi; this.b = bi;
    }

    update() { this.life--; }

    draw(c) {
        if (this.life <= 0) return;
        const alpha  = this.life / this.maxLife;
        const len    = WEAPONS.Naginata.range * (this.isFinisher ? 0.82 : 0.64);
        const width  = this.isFinisher ? 9 : 6;

        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.angle);
        c.lineCap = 'round';

        // Soft energy cone behind the tip
        const coneG = c.createLinearGradient(0, 0, len * 1.05, 0);
        coneG.addColorStop(0,   `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha * 0.22})`);
        coneG.addColorStop(0.5, `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha * 0.10})`);
        coneG.addColorStop(1,   `rgba(${this.r}, ${this.g}, ${this.b}, 0)`);
        c.beginPath();
        c.moveTo(0, -width * 1.4 * alpha);
        c.lineTo(len * 1.05, 0);
        c.lineTo(0,  width * 1.4 * alpha);
        c.closePath();
        c.fillStyle = coneG;
        c.fill();

        // Main thrust stroke, tapers to a point
        c.beginPath();
        c.moveTo(-4, 0);
        c.lineTo(len * 0.35, -width * 0.5 * alpha);
        c.lineTo(len,         0);
        c.lineTo(len * 0.35,  width * 0.5 * alpha);
        c.closePath();
        c.fillStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha * 0.75})`;
        c.fill();

        // Cutting edge lines along top and bottom
        [-1, 1].forEach(side => {
            c.beginPath();
            c.moveTo(0, side * width * 0.48 * alpha);
            c.lineTo(len, 0);
            c.lineWidth   = 1.2 * alpha;
            c.strokeStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha * 0.92})`;
            c.stroke();
        });

        // Glint on leading edge
        c.beginPath();
        c.moveTo(len * 0.60, -width * 0.20 * alpha);
        c.lineTo(len,          0);
        c.lineWidth   = 0.8 * alpha;
        c.strokeStyle = `rgba(195, 215, 235, ${alpha * 0.55})`;
        c.stroke();

        // Tip flash on first few frames
        if (alpha > 0.72) {
            const f = (alpha - 0.72) / 0.28;
            c.beginPath();
            c.arc(len, 0, 4.5 * f, 0, Math.PI * 2);
            c.fillStyle = `rgba(${Math.min(this.r + 60, 200)}, ${Math.min(this.g + 80, 210)}, ${Math.min(this.b + 100, 240)}, ${f * 0.55})`;
            c.fill();
        }

        // Finisher: add trailing ripple rings
        if (this.isFinisher && alpha < 0.65) {
            const ripple = 1 - alpha / 0.65;
            c.beginPath();
            c.ellipse(len * 0.5, 0, len * 0.25 * ripple, width * 1.8 * ripple, 0, 0, Math.PI * 2);
            c.strokeStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha * 0.28})`;
            c.lineWidth   = 1.5 * alpha;
            c.stroke();
        }

        c.restore();
    }
}

// ODACHI LIGHT SWING, wide heavy arc slash
class OdachiLightSwing {
    constructor(x, y, angle, weapon, fromSide, isFinisher) {
        this.x          = x; this.y = y;
        this.angle      = angle;
        this.fromSide   = fromSide;
        this.isFinisher = isFinisher;
        this.life       = isFinisher ? 28 : 22;
        this.maxLife    = this.life;
        const [ri, gi, bi] = weapon.slashRGB;
        this.r = ri; this.g = gi; this.b = bi;
        this.range = weapon.range * (isFinisher ? 0.82 : 0.68);
    }

    update() { this.life--; }

    draw(c) {
        if (this.life <= 0) return;
        const alpha   = this.life / this.maxLife;
        const halfArc = this.isFinisher ? Math.PI / 1.95 : Math.PI / 2.5;

        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.angle);
        c.lineCap = 'round';

        // Bloom wedge
        const bloomG = c.createRadialGradient(0, 0, this.range * 0.15, 0, 0, this.range * 1.2);
        bloomG.addColorStop(0, `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha * 0.10})`);
        bloomG.addColorStop(1, `rgba(${this.r}, ${this.g}, ${this.b}, 0)`);
        c.beginPath();
        c.moveTo(0, 0);
        c.arc(0, 0, this.range * 1.2, -halfArc, halfArc);
        c.closePath();
        c.fillStyle = bloomG;
        c.fill();

        // Heavy brushstroke, thicker than katana, slower fade
        const segs   = 16;
        const baseW  = this.range * 0.135;
        for (let i = 0; i < segs; i++) {
            const t0  = i / segs;
            const t1  = (i + 1) / segs;
            const a0  = -halfArc + t0 * halfArc * 2;
            const a1  = -halfArc + t1 * halfArc * 2;
            const mid = Math.sin(((t0 + t1) / 2) * Math.PI);
            const jitter = 1 + Math.sin(i * 5.8 + this.maxLife * 0.22) * 0.10;
            c.beginPath();
            c.arc(0, 0, this.range, a0, a1);
            c.lineWidth   = Math.max(baseW * mid * alpha * jitter, 0.5);
            c.strokeStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha * 0.88})`;
            c.stroke();
        }

        // Sharp cutting edge
        c.beginPath();
        c.arc(0, 0, this.range * 0.93, -halfArc + 0.04, halfArc - 0.04);
        c.lineWidth   = 1.8 * alpha;
        c.strokeStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha})`;
        c.stroke();

        // Metal glint
        c.beginPath();
        c.arc(0, 0, this.range * 0.86, -halfArc + 0.10, halfArc - 0.10);
        c.lineWidth   = 0.8 * alpha;
        c.strokeStyle = `rgba(215, 195, 175, ${alpha * 0.40})`;
        c.stroke();

        // Ink tip drops
        [-halfArc, halfArc].forEach(ta => {
            const tx = Math.cos(ta) * this.range;
            const ty = Math.sin(ta) * this.range;
            c.beginPath();
            c.arc(tx, ty, 3.0 * alpha, 0, Math.PI * 2);
            c.fillStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha * 0.65})`;
            c.fill();
        });

        // Finisher: secondary inner arc for weight
        if (this.isFinisher) {
            c.beginPath();
            c.arc(0, 0, this.range * 0.70, -halfArc * 0.85, halfArc * 0.85);
            c.lineWidth   = baseW * 0.35 * alpha;
            c.strokeStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha * 0.45})`;
            c.stroke();
        }

        c.restore();
    }
}

// KANABO SMASH, heavy downward impact
class KanaboSmash {
    constructor(x, y, angle, weapon, fromSide, isFinisher) {
        this.x          = x; this.y = y;
        this.angle      = angle;
        this.fromSide   = fromSide;
        this.isFinisher = isFinisher;
        this.life       = isFinisher ? 30 : 22;
        this.maxLife    = this.life;
        const [ri, gi, bi] = weapon.slashRGB;
        this.r = ri; this.g = gi; this.b = bi;
        this.range = weapon.range * (isFinisher ? 0.72 : 0.58);
    }

    update() { this.life--; }

    draw(c) {
        if (this.life <= 0) return;
        const alpha   = this.life / this.maxLife;
        // Smash arc is biased toward the strike-down angle (slightly off-center)
        const arcHalf = this.isFinisher ? Math.PI / 2.0 : Math.PI / 3.2;
        const bias    = this.fromSide * 0.18; // slight offset from center

        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.angle);
        c.lineCap = 'round';

        // Shockwave ring (expands outward)
        const ringSz = this.range * (0.35 + (1 - alpha) * 0.75);
        c.beginPath();
        c.arc(0, 0, ringSz, -arcHalf + bias, arcHalf + bias);
        c.lineWidth   = 5.5 * alpha * alpha;
        c.strokeStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha * 0.28})`;
        c.stroke();

        // Heavy bloom
        const bloomG = c.createRadialGradient(0, 0, this.range * 0.1, 0, 0, this.range * 1.15);
        bloomG.addColorStop(0, `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha * 0.14})`);
        bloomG.addColorStop(1, `rgba(${this.r}, ${this.g}, ${this.b}, 0)`);
        c.beginPath();
        c.moveTo(0, 0);
        c.arc(0, 0, this.range * 1.15, -arcHalf + bias, arcHalf + bias);
        c.closePath();
        c.fillStyle = bloomG;
        c.fill();

        // Main thick smash arc, very heavy
        const segs  = 14;
        const baseW = this.range * 0.155;
        for (let i = 0; i < segs; i++) {
            const t0  = i / segs;
            const t1  = (i + 1) / segs;
            const a0  = -arcHalf + bias + t0 * arcHalf * 2;
            const a1  = -arcHalf + bias + t1 * arcHalf * 2;
            const mid = Math.sin(((t0 + t1) / 2) * Math.PI);
            // Weight bias, heavier (thicker) toward the impact side
            const weightBias = 0.7 + 0.6 * (1 - Math.abs(t0 + t1 - 1));
            c.beginPath();
            c.arc(0, 0, this.range, a0, a1);
            c.lineWidth   = Math.max(baseW * mid * alpha * weightBias, 0.5);
            c.strokeStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha * 0.90})`;
            c.stroke();
        }

        // Hard edge
        c.beginPath();
        c.arc(0, 0, this.range * 0.92, -arcHalf + bias + 0.05, arcHalf + bias - 0.05);
        c.lineWidth   = 2.0 * alpha;
        c.strokeStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha})`;
        c.stroke();

        // Impact spike lines radiating from the hit zone
        const spikeCount = this.isFinisher ? 5 : 3;
        for (let s = 0; s < spikeCount; s++) {
            const sa     = bias + (s / (spikeCount - 1) - 0.5) * arcHalf * 1.4;
            const sStart = this.range * 0.90;
            const sLen   = this.range * (0.14 + (s % 2) * 0.08) * alpha;
            c.beginPath();
            c.moveTo(Math.cos(sa) * sStart, Math.sin(sa) * sStart);
            c.lineTo(Math.cos(sa) * (sStart + sLen), Math.sin(sa) * (sStart + sLen));
            c.lineWidth   = (2.2 - s * 0.15) * alpha;
            c.strokeStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${alpha * 0.62})`;
            c.stroke();
        }

        // Finisher: ground crack ripple
        if (this.isFinisher && alpha > 0.55) {
            const f = (alpha - 0.55) / 0.45;
            c.beginPath();
            c.arc(0, 0, this.range * (0.42 + (1 - f) * 0.30), 0, Math.PI * 2);
            c.strokeStyle = `rgba(${this.r}, ${this.g}, ${this.b}, ${f * 0.32})`;
            c.lineWidth   = 3.5 * f;
            c.stroke();
        }

        c.restore();
    }
}


class PhantomCut {
    constructor(x, y, angle) {
        this.x       = x;
        this.y       = y;
        this.life    = 28;
        this.maxLife = 28;
        // Generate 2-3 straight lines per cut point, random directions
        this.lines = [];
        const count = 2 + Math.floor(Math.random() * 2);
        for (let i = 0; i < count; i++) {
            const dir    = angle + (Math.random() - 0.5) * Math.PI * 0.9;
            const len    = 28 + Math.random() * 36;
            const offset = (Math.random() - 0.5) * 14; // perpendicular offset
            const perp   = dir + Math.PI / 2;
            this.lines.push({
                ox: Math.cos(perp) * offset,
                oy: Math.sin(perp) * offset,
                dx: Math.cos(dir),
                dy: Math.sin(dir),
                len,
                w: 1.2 + Math.random() * 1.6,
                bias: -0.3 + Math.random() * 0.6  // how far off-centre the stroke starts
            });
        }
    }

    update() { this.life--; }

    draw(c) {
        if (this.life <= 0) return;
        const alpha = this.life / this.maxLife;
        const [ri, gi, bi] = WEAPONS.Katana.slashRGB;

        c.save();
        c.translate(this.x, this.y);
        c.lineCap = 'round';

        this.lines.forEach(ln => {
            const sx = ln.ox + ln.dx * ln.len * (-0.5 + ln.bias);
            const sy = ln.oy + ln.dy * ln.len * (-0.5 + ln.bias);
            const ex = ln.ox + ln.dx * ln.len *  (0.5 + ln.bias);
            const ey = ln.oy + ln.dy * ln.len *  (0.5 + ln.bias);

            // Main ink stroke
            c.beginPath();
            c.moveTo(sx, sy);
            c.lineTo(ex, ey);
            c.lineWidth   = ln.w * alpha;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.88})`;
            c.stroke();

            // Glint line
            c.beginPath();
            c.moveTo(sx + ln.dy * 0.8, sy - ln.dx * 0.8);
            c.lineTo(ex + ln.dy * 0.8, ey - ln.dx * 0.8);
            c.lineWidth   = 0.5 * alpha;
            c.strokeStyle = `rgba(220, 210, 195, ${alpha * 0.40})`;
            c.stroke();

            // Ink bead at tip
            c.beginPath();
            c.arc(ex, ey, 1.4 * alpha, 0, Math.PI * 2);
            c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.60})`;
            c.fill();
        });

        c.restore();
    }
}

// NAGINATA THRUST, air-breaking shockwave burst

    }

    update() { this.life--; }

    draw(c) {
        if (this.life <= 0) return;
        const alpha    = this.life / this.maxLife;
        const progress = 1 - alpha;
        const [ri, gi, bi] = WEAPONS.Naginata.slashRGB;

        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.angle);
        c.lineCap = 'round';

        // Sharp thrust streak
        const len = 85;
        c.beginPath();
        c.moveTo(-len * 0.15, 0);
        c.lineTo( len * 0.85, 0);
        c.lineWidth   = 3.8 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.88})`;
        c.stroke();

        // Blade edge glint
        c.beginPath();
        c.moveTo(0, 0);
        c.lineTo(len * 0.88, 0);
        c.lineWidth   = 0.9 * alpha;
        c.strokeStyle = `rgba(210, 225, 238, ${alpha * 0.52})`;
        c.stroke();

        // Expanding forward shockwave arc
        const shockR = 18 + progress * 56;
        c.beginPath();
        c.arc(0, 0, shockR, -0.75, 0.75);
        c.lineWidth   = Math.max((3.2 - progress * 2.8) * alpha, 0.2);
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.42})`;
        c.stroke();

        // Speed lines, air displacement effect
        for (let i = 0; i < 5; i++) {
            const yOff   = (i - 2) * 7;
            const xStart = len * (0.18 + i * 0.04);
            c.beginPath();
            c.moveTo(xStart,           yOff * 0.35);
            c.lineTo(xStart + len * 0.38, yOff * 0.58);
            c.lineWidth   = 0.65 * alpha;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.28})`;
            c.stroke();
        }

        // Tip ink drop
        c.beginPath();
        c.arc(len * 0.85, 0, 2.5 * alpha, 0, Math.PI * 2);
        c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.70})`;
        c.fill();

        c.restore();
    }
}
