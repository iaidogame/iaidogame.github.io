// KAMA SPIN SLASH, Engetsu-barai: full 360° sickle sweep
class KamaSpinSlash {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.life    = 22;
        this.maxLife = 22;
        this.rot     = 0;
    }
    update() {
        this.life--;
        this.rot += 0.30; // spinning arc trails
    }
    draw(c) {
        if (this.life <= 0) return;
        const alpha    = this.life / this.maxLife;
        const progress = 1 - alpha;
        const [ri, gi, bi] = WEAPONS.Kama.slashRGB;
        const r = 62 + progress * 8;

        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.rot);
        c.lineCap = 'round';

        // Two opposing crescent arcs, hook silhouette
        for (let side = 0; side < 2; side++) {
            const base = side * Math.PI;
            // Outer rim sweep
            c.beginPath();
            c.arc(0, 0, r, base, base + Math.PI * 0.82);
            c.lineWidth   = 6 * alpha;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.55})`;
            c.stroke();
            // Sharp inner cutting edge
            c.beginPath();
            c.arc(0, 0, r * 0.82, base + 0.08, base + Math.PI * 0.78);
            c.lineWidth   = 1.8 * alpha;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.92})`;
            c.stroke();
            // Glint
            c.beginPath();
            c.arc(0, 0, r * 0.80, base + 0.10, base + Math.PI * 0.72);
            c.lineWidth   = 0.7 * alpha;
            c.strokeStyle = `rgba(218, 208, 190, ${alpha * 0.45})`;
            c.stroke();
            // Hook tip ink bead
            const hookA = base + Math.PI * 0.82;
            c.beginPath();
            c.arc(Math.cos(hookA) * r, Math.sin(hookA) * r, 2.8 * alpha, 0, Math.PI * 2);
            c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.75})`;
            c.fill();
        }

        // Central spin vortex, small tight circle
        if (alpha > 0.55) {
            const vA = (alpha - 0.55) / 0.45;
            c.beginPath();
            c.arc(0, 0, r * 0.22, 0, Math.PI * 2);
            c.lineWidth   = 1.2 * vA * alpha;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${vA * alpha * 0.35})`;
            c.stroke();
        }

        c.restore();
    }
}

// YUMI ARROW FLIGHT, Arrow projectile that travels and hits
class YumiArrowFlight {
    constructor(x, y, angle, damage, knockback) {
        this.x        = x; this.y = y;
        this.angle    = angle;
        this.damage   = damage;
        this.knockback = knockback;
        this.speed    = 18;
        this.life     = 52;
        this.maxLife  = 52;
        this.hit      = false;
        this.hitX     = 0; this.hitY = 0;
        this.hitLife  = 0;
    }
    update() {
        this.life--;
        if (this.hit) { this.hitLife--; return; }
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        // Check enemy collision on travel
        for (let i = enemies.length - 1; i >= 0; i--) {
            const e    = enemies[i];
            const dist = Math.hypot(e.x - this.x, e.y - this.y);
            if (dist <= e.radius + 10) {
                // Impact
                this.hit   = true;
                this.hitX  = this.x; this.hitY = this.y;
                this.hitLife = 14;
                e.hit(this.damage, this.angle, this.knockback);
                spawnParticles(e.x, e.y, 'ink-red', 8);
                if (e.hp <= 0) {
                    spawnParticles(e.x, e.y, 'ink-red', 18);
                    enemies.splice(i, 1);
                    rebalanceRoles();
                }
                if (enemies.length === 0) setTimeout(triggerWeaponDrop, 1000);
                break;
            }
        }
    }
    draw(c) {
        if (this.life <= 0) return;
        const [ri, gi, bi] = WEAPONS.Yumi.slashRGB;

        if (this.hit) {
            // Impact bloom
            const alpha = Math.max(0, this.hitLife / 14);
            if (alpha <= 0) return;
            c.save();
            c.translate(this.hitX, this.hitY);
            c.lineCap = 'round';
            for (let i = 0; i < 5; i++) {
                const a   = (i / 5) * Math.PI * 2 + this.angle;
                const len = 8 + i * 3;
                c.beginPath();
                c.moveTo(0, 0);
                c.lineTo(Math.cos(a) * len * alpha, Math.sin(a) * len * alpha);
                c.lineWidth   = (2.0 - i * 0.28) * alpha;
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.75})`;
                c.stroke();
            }
            c.beginPath();
            c.arc(0, 0, Math.max(0.01, 4 * alpha), 0, Math.PI * 2);
            c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.60})`;
            c.fill();
            c.restore();
            return;
        }

        const alpha = Math.min(1, this.life / 12); // fade in, then hold
        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.angle);
        c.lineCap = 'round';

        // Shaft
        c.beginPath();
        c.moveTo(-28, 0);
        c.lineTo(12, 0);
        c.lineWidth   = 1.6 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.88})`;
        c.stroke();

        // Arrowhead (small triangle)
        c.beginPath();
        c.moveTo(12, 0);
        c.lineTo(4, -3.5);
        c.lineTo(4, 3.5);
        c.closePath();
        c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.92})`;
        c.fill();

        // Fletching lines at tail
        c.beginPath();
        c.moveTo(-22, 0); c.lineTo(-28, -5);
        c.lineWidth   = 0.9 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.60})`;
        c.stroke();
        c.beginPath();
        c.moveTo(-22, 0); c.lineTo(-28, 5);
        c.stroke();

        // Speed streaks
        for (let i = 0; i < 3; i++) {
            const yOff = (i - 1) * 4;
            c.beginPath();
            c.moveTo(-28 - i * 8, yOff);
            c.lineTo(-38 - i * 8, yOff);
            c.lineWidth   = 0.7 * alpha;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.25})`;
            c.stroke();
        }

        c.restore();
    }
}

// SASUMATA FORK THRUST, Tsuki-oshi: straight spear pin thrust
class SasumataForkThrust {
    constructor(x, y, angle, heavy) {
        this.x = x; this.y = y;
        this.angle   = angle;
        this.heavy   = heavy;
        this.life    = heavy ? 22 : 16;
        this.maxLife = this.life;
    }
    update() { this.life--; }
    draw(c) {
        if (this.life <= 0) return;
        const alpha    = this.life / this.maxLife;
        const progress = 1 - alpha;
        const [ri, gi, bi] = WEAPONS.Sasumata.slashRGB;
        const len   = this.heavy ? 120 : 96;
        const forkW = this.heavy ? 20 : 15;
        const forkD = this.heavy ? 24 : 18;

        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.angle);
        c.lineCap = 'round';

        // Shaft
        c.beginPath();
        c.moveTo(-len * 0.45, 0);
        c.lineTo(len * 0.56, 0);
        c.lineWidth   = 3.2 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.78})`;
        c.stroke();

        // Shaft glint
        c.beginPath();
        c.moveTo(-len * 0.38, -1.0);
        c.lineTo(len * 0.50, -1.0);
        c.strokeStyle = `rgba(218, 208, 190, ${alpha * 0.22})`;
        c.lineWidth   = 0.65;
        c.stroke();

        // Fork head, inward-curving prongs
        const fx = len * 0.56;
        c.beginPath();
        c.moveTo(fx - forkW * 0.14, -forkW);
        c.quadraticCurveTo(fx + forkD * 0.50, -forkW, fx + forkD, -forkW * 0.28);
        c.lineWidth   = 2.2 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.92})`;
        c.stroke();
        c.beginPath();
        c.moveTo(fx - forkW * 0.14,  forkW);
        c.quadraticCurveTo(fx + forkD * 0.50,  forkW, fx + forkD,  forkW * 0.28);
        c.stroke();
        // Cross-bar
        c.beginPath();
        c.moveTo(fx - forkW * 0.14, -forkW);
        c.lineTo(fx - forkW * 0.14,  forkW);
        c.lineWidth   = 2.4 * alpha;
        c.stroke();

        // Inner catching zone shadow
        c.beginPath();
        c.moveTo(fx, -forkW * 0.50);
        c.quadraticCurveTo(fx + forkD * 0.80, 0, fx, forkW * 0.50);
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.08)`;
        c.lineWidth   = forkW * alpha;
        c.lineJoin    = 'round';
        c.stroke();

        // Forward momentum cone
        const coneR = len * (0.28 + progress * 0.32);
        c.beginPath();
        c.arc(0, 0, coneR, -0.48, 0.48);
        c.lineWidth   = 4.0 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.20})`;
        c.stroke();

        // Tip beads
        [[fx + forkD, -forkW * 0.28], [fx + forkD, forkW * 0.28]].forEach(([tx, ty]) => {
            c.beginPath();
            c.arc(tx, ty, 2.4 * alpha, 0, Math.PI * 2);
            c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.75})`;
            c.fill();
        });

        // Heavy: burst ring at impact moment
        if (this.heavy && alpha > 0.72) {
            const fa = (alpha - 0.72) / 0.28;
            c.beginPath();
            c.arc(0, 0, coneR * 0.50, 0, Math.PI * 2);
            c.lineWidth   = 1.8 * fa * alpha;
            c.strokeStyle = `rgba(${ri + 28}, ${gi + 20}, ${bi + 12}, ${fa * alpha * 0.30})`;
            c.stroke();
        }

        c.restore();
    }
}

// SASUMATA HOOK YANK, Hiki-taoshi: sweeps forward-side then drags backward
// The only weapon that attacks BEHIND the player
class SasumataHookYank {
    constructor(x, y, angle, fromSide) {
        this.x        = x; this.y = y;
        this.angle    = angle;
        this.fromSide = fromSide;
        this.life     = 22;
        this.maxLife  = 22;
    }
    update() { this.life--; }
    draw(c) {
        if (this.life <= 0) return;
        const alpha    = this.life / this.maxLife;
        const progress = 1 - alpha;
        const [ri, gi, bi] = WEAPONS.Sasumata.slashRGB;
        const range = WEAPONS.Sasumata.range * 0.72;
        const side  = this.fromSide;

        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.angle);
        c.lineCap = 'round';

        // The yank sweeps from forward-side (+60°) all the way PAST perpendicular to rear (-100°)
        // We visualize the entire swept path as a long arc
        const startA = -side * (Math.PI / 3.0);   // reach-forward angle (relative to facing)
        const endA   =  side * (Math.PI / 1.5);   // yanked-behind angle

        // Soft bloom for the full sweep arc
        const bloomG = c.createRadialGradient(0, 0, range * 0.12, 0, 0, range * 1.15);
        bloomG.addColorStop(0, `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.09})`);
        bloomG.addColorStop(1, `rgba(${ri}, ${gi}, ${bi}, 0)`);
        c.beginPath();
        c.moveTo(0, 0);
        // Arc from reach to behind (the hook path)
        if (side > 0) {
            c.arc(0, 0, range * 1.15, startA, endA);
        } else {
            c.arc(0, 0, range * 1.15, endA, startA, true);
        }
        c.closePath();
        c.fillStyle = bloomG;
        c.fill();

        // Main hook-arc brushstroke, heavy at the fork end, tapers toward the butt
        const segs = 18;
        for (let i = 0; i < segs; i++) {
            const t0 = i / segs;
            const t1 = (i + 1) / segs;
            let a0, a1;
            if (side > 0) {
                a0 = startA + t0 * (endA - startA);
                a1 = startA + t1 * (endA - startA);
            } else {
                a0 = startA + t0 * (endA - startA);
                a1 = startA + t1 * (endA - startA);
            }
            // Width peaks toward the "yank" end (where the fork is catching)
            const wPeak = Math.pow(t0, 0.5);
            const sw    = Math.max(range * 0.095 * wPeak * alpha, 0.4);
            c.beginPath();
            c.arc(0, 0, range, a0, a1, side < 0);
            c.lineWidth   = sw;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.90})`;
            c.stroke();
        }

        // Sharp drag edge, inner arc showing the pull line
        c.beginPath();
        if (side > 0) {
            c.arc(0, 0, range * 0.82, startA + 0.06, endA - 0.06);
        } else {
            c.arc(0, 0, range * 0.82, endA + 0.06, startA - 0.06, true);
        }
        c.lineWidth   = 1.5 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.92})`;
        c.stroke();

        // Fork-head flash at the reach point (where the catch begins)
        if (alpha > 0.75) {
            const fA = (alpha - 0.75) / 0.25;
            const catchA = startA;
            const cx2 = Math.cos(catchA) * range * 0.68;
            const cy2 = Math.sin(catchA) * range * 0.68;
            c.beginPath();
            c.arc(cx2, cy2, range * 0.09, 0, Math.PI * 2);
            c.fillStyle = `rgba(${Math.min(ri + 55, 210)}, ${Math.min(gi + 45, 182)}, ${Math.min(bi + 32, 155)}, ${fA * 0.50})`;
            c.fill();
        }

        // Ink bead at yank terminus (behind the player)
        const yakA = side > 0 ? endA : endA;
        c.beginPath();
        c.arc(Math.cos(yakA) * range * 0.90, Math.sin(yakA) * range * 0.90, 2.8 * alpha, 0, Math.PI * 2);
        c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.65})`;
        c.fill();

        c.restore();
    }
}

// SASUMATA SHAFT BLOW, Kachi-age: butt end of the pole swings upward
// Close-range shockwave, the fork is the TAIL here, shaft butt does the hitting
class SasumataShaftBlow {
    constructor(x, y, angle, fromSide) {
        this.x        = x; this.y = y;
        this.angle    = angle;
        this.fromSide = fromSide;
        this.life     = 26;
        this.maxLife  = 26;
        this.rot      = 0;
    }
    update() {
        this.life--;
        this.rot += 0.06;
    }
    draw(c) {
        if (this.life <= 0) return;
        const alpha    = this.life / this.maxLife;
        const progress = 1 - alpha;
        const [ri, gi, bi] = WEAPONS.Sasumata.slashRGB;
        const range = WEAPONS.Sasumata.range * 0.58;
        const side  = this.fromSide;

        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.angle);
        c.lineCap = 'round';

        // Wide shockwave ring expands outward from the blow
        const shockR = range * (0.28 + progress * 0.85);
        c.beginPath();
        c.arc(0, 0, shockR, 0, Math.PI * 2);
        c.lineWidth   = 7 * alpha * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.22})`;
        c.stroke();

        // Second faster ring (double-ring = heavy impact feel)
        const shockR2 = range * (0.42 + progress * 0.62);
        c.beginPath();
        c.arc(0, 0, shockR2, 0, Math.PI * 2);
        c.lineWidth   = 3.5 * alpha * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.12})`;
        c.stroke();

        // Heavy bloom wide half-plane bloom (shaft butt = blunt, not pointed)
        const bloomG = c.createRadialGradient(0, 0, range * 0.08, 0, 0, range * 1.18);
        bloomG.addColorStop(0, `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.16})`);
        bloomG.addColorStop(1, `rgba(${ri}, ${gi}, ${bi}, 0)`);
        c.beginPath();
        c.arc(0, 0, range * 1.18, 0, Math.PI * 2);
        c.fillStyle = bloomG;
        c.fill();

        // The "swing arc" heavy brushstroke showing the pole trajectory from rear to front
        const swingStart = side * Math.PI * 0.92; // from behind
        const swingEnd   = -side * (Math.PI / 6);  // to front-opposite
        const segs = 16;
        for (let i = 0; i < segs; i++) {
            const t0 = i / segs;
            const t1 = (i + 1) / segs;
            const a0 = swingStart + t0 * (swingEnd - swingStart);
            const a1 = swingStart + t1 * (swingEnd - swingStart);
            const mid    = Math.sin(((t0 + t1) / 2) * Math.PI);
            const sw     = Math.max(range * 0.130 * mid * alpha, 0.5);
            c.beginPath();
            c.arc(0, 0, range * 0.88, a0, a1, side < 0);
            c.lineWidth   = sw;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.85})`;
            c.stroke();
        }

        // Sharp edge line
        c.beginPath();
        c.arc(0, 0, range * 0.78, swingStart, swingEnd, side < 0);
        c.lineWidth   = 1.8 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.95})`;
        c.stroke();

        // Impact spike lines radiating outward at the strike endpoint
        const strikeA = swingEnd;
        for (let s = 0; s < 5; s++) {
            const sa  = strikeA + (s / 4 - 0.5) * (Math.PI / 2.2);
            const sr0 = range * 0.75;
            const sLen = range * (0.14 + (s % 2) * 0.10) * alpha;
            c.beginPath();
            c.moveTo(Math.cos(sa) * sr0, Math.sin(sa) * sr0);
            c.lineTo(Math.cos(sa) * (sr0 + sLen), Math.sin(sa) * (sr0 + sLen));
            c.lineWidth   = (2.5 - s * 0.15) * alpha;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.60})`;
            c.stroke();
        }

        // Early-frame butt-end flash at origin (shaft end starts the swing here)
        if (alpha > 0.82) {
            const fA = (alpha - 0.82) / 0.18;
            c.beginPath();
            c.arc(0, 0, range * 0.25, 0, Math.PI * 2);
            c.fillStyle = `rgba(${Math.min(ri + 40, 205)}, ${Math.min(gi + 35, 178)}, ${Math.min(bi + 25, 150)}, ${fA * 0.40})`;
            c.fill();
        }

        c.restore();
    }
}

// SASUMATA OSHI TRAIL, sweep ghost during Oshi-taoshi dash
// Each frame of the fan sweep leaves a fork silhouette behind
class SasumataOshiTrail {
    constructor(x, y, angle, sweepProgress) {
        this.x             = x; this.y = y;
        this.angle         = angle;
        this.sweepProgress = sweepProgress;
        this.life          = 18;
        this.maxLife       = 18;
    }
    update() { this.life--; }
    draw(c) {
        if (this.life <= 0) return;
        const alpha = (this.life / this.maxLife) * 0.65;
        const [ri, gi, bi] = WEAPONS.Sasumata.slashRGB;
        const len   = 95;
        const forkW = 15;

        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.angle);
        c.lineCap = 'round';
        c.globalAlpha = alpha;

        // Shaft ghost
        c.beginPath();
        c.moveTo(-len * 0.30, 0);
        c.lineTo(len * 0.60, 0);
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.80)`;
        c.lineWidth   = 2.5;
        c.stroke();

        // Fork head ghost
        const fx = len * 0.60;
        c.beginPath();
        c.moveTo(fx - forkW * 0.15, -forkW);
        c.quadraticCurveTo(fx + 10, -forkW, fx + 14, -forkW * 0.30);
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, 0.88)`;
        c.lineWidth   = 2.0;
        c.stroke();
        c.beginPath();
        c.moveTo(fx - forkW * 0.15,  forkW);
        c.quadraticCurveTo(fx + 10,  forkW, fx + 14,  forkW * 0.30);

        c.beginPath();
        c.moveTo(fx - forkW * 0.15, -forkW);

// SASUMATA OSHI FINISH, the final slam at end of the fan sweep
class SasumataOshiFinish {
    constructor(x, y, angle) {
        this.x       = x; this.y = y;
        this.angle   = angle;
        this.life    = 30;
        this.maxLife = 30;
    }
    update() { this.life--; }
    draw(c) {
        if (this.life <= 0) return;
        const alpha    = this.life / this.maxLife;
        const progress = 1 - alpha;
        const [ri, gi, bi] = WEAPONS.Sasumata.slashRGB;
        const range = WEAPONS.Sasumata.range * 0.85;
        const halfArc = Math.PI / 1.78;

        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.angle);
        c.lineCap = 'round';

        // Full fan shockwave ring
        const shockR = range * (0.40 + progress * 0.65);
        c.beginPath();
        c.arc(0, 0, shockR, -halfArc, halfArc);
        c.lineWidth   = 8 * alpha * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.26})`;
        c.stroke();

        // Fan bloom
        const bloomG = c.createRadialGradient(0, 0, range * 0.15, 0, 0, range * 1.22);
        bloomG.addColorStop(0, `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.14})`);
        bloomG.addColorStop(1, `rgba(${ri}, ${gi}, ${bi}, 0)`);
        c.beginPath();
        c.moveTo(0, 0);
        c.arc(0, 0, range * 1.22, -halfArc, halfArc);
        c.closePath();
        c.fillStyle = bloomG;
        c.fill();

        // Heavy fan arc, the full 200° sweep in one final stroke
        const segs = 20;
        for (let i = 0; i < segs; i++) {
            const t0  = i / segs;
            const t1  = (i + 1) / segs;
            const a0  = -halfArc + t0 * halfArc * 2;
            const a1  = -halfArc + t1 * halfArc * 2;
            const mid = Math.sin(((t0 + t1) / 2) * Math.PI);
            c.beginPath();
            c.arc(0, 0, range, a0, a1);
            c.lineWidth   = Math.max(range * 0.122 * mid * alpha, 0.5);
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.88})`;
            c.stroke();
        }

        // Sharp fan edge
        c.beginPath();
        c.arc(0, 0, range * 0.93, -halfArc + 0.05, halfArc - 0.05);
        c.lineWidth   = 2.0 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha})`;
        c.stroke();

        // Fork-tip beads at both ends of the fan
        [-halfArc, halfArc].forEach(ta => {
            const tx = Math.cos(ta) * range;
            const ty = Math.sin(ta) * range;
            c.beginPath();
            c.arc(tx, ty, 3.2 * alpha, 0, Math.PI * 2);
            c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.72})`;
            c.fill();
            // Impact spikes at each tip
            for (let s = 0; s < 3; s++) {
                const sa  = ta + (s - 1) * 0.38;
                const sLen = range * 0.12 * alpha;
                c.beginPath();
                c.moveTo(Math.cos(sa) * range * 0.94, Math.sin(sa) * range * 0.94);
                c.lineTo(Math.cos(sa) * (range * 0.94 + sLen), Math.sin(sa) * (range * 0.94 + sLen));
                c.lineWidth   = (2.2 - s * 0.4) * alpha;
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.55})`;
                c.stroke();
            }
        });

        c.restore();
    }
}

// FUKIYA DART, tiny blowgun dart that travels fast
class FukiyaDart {
    constructor(x, y, angle, damage, knockback) {
        this.x         = x; this.y = y;
        this.angle     = angle;
        this.damage    = damage;
        this.knockback = knockback;
        this.speed     = 22;
        this.life      = 40;
        this.maxLife   = 40;
        this.hit       = false;
        this.hitX      = 0; this.hitY = 0;
        this.hitLife   = 10;
    }
    update() {
        this.life--;
        if (this.hit) { this.hitLife--; return; }
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        for (let i = enemies.length - 1; i >= 0; i--) {
            const e    = enemies[i];
            const dist = Math.hypot(e.x - this.x, e.y - this.y);
            if (dist <= e.radius + 7) {
                this.hit   = true;
                this.hitX  = this.x; this.hitY = this.y;
                this.hitLife = 10;
                e.hit(this.damage, this.angle, this.knockback);
                spawnParticles(e.x, e.y, 'ink-red', 5);
                if (e.hp <= 0) {
                    spawnParticles(e.x, e.y, 'ink-red', 14);
                    enemies.splice(i, 1);
                    rebalanceRoles();
                }
                if (enemies.length === 0) setTimeout(triggerWeaponDrop, 1000);
                break;
            }
        }
    }
    draw(c) {
        if (this.life <= 0) return;
        const [ri, gi, bi] = WEAPONS.Fukiya.slashRGB;

        if (this.hit) {
            const alpha = Math.max(0, this.hitLife / 10);
            if (alpha <= 0) return;
            c.save();
            c.translate(this.hitX, this.hitY);
            c.lineCap = 'round';
            // Tiny pinpoint impact burst
            for (let i = 0; i < 4; i++) {
                const a   = this.angle + (i / 4) * Math.PI * 2 + Math.PI / 8;
                const len = 5 + i * 2;
                c.beginPath();
                c.moveTo(0, 0);
                c.lineTo(Math.cos(a) * len * alpha, Math.sin(a) * len * alpha);
                c.lineWidth   = 1.2 * alpha;
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.65})`;
                c.stroke();
            }
            c.beginPath();
            c.arc(0, 0, Math.max(0.01, 2.5 * alpha), 0, Math.PI * 2);
            c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.55})`;
            c.fill();
            c.restore();
            return;
        }

        const alpha = Math.min(1, this.life / 8);
        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.angle);
        c.lineCap = 'round';

        // Dart shaft, very thin, short
        c.beginPath();
        c.moveTo(-12, 0);
        c.lineTo(8, 0);
        c.lineWidth   = 1.1 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.90})`;
        c.stroke();

        // Needle tip
        c.beginPath();
        c.moveTo(8, 0);
        c.lineTo(14, 0);
        c.lineWidth   = 0.7 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.95})`;
        c.stroke();

        // Cone tuft at tail (fluffy end of dart)
        c.beginPath();
        c.moveTo(-12, -3); c.lineTo(-16, 0); c.lineTo(-12, 3);
        c.lineWidth   = 0.8 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.50})`;
        c.stroke();

        // Vapour trail streaks, very faint
        for (let i = 0; i < 2; i++) {
            const yOff = (i - 0.5) * 3;
            c.beginPath();
            c.moveTo(-14 - i * 6, yOff);
            c.lineTo(-22 - i * 6, yOff);
            c.lineWidth   = 0.5 * alpha;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.18})`;
            c.stroke();
        }

        c.restore();
    }
}

// YUMI ARROW SLASH, c=1 melee: close-range arc sweep with arrow held as blade
class YumiArrowSlash {
    constructor(x, y, angle, fromSide) {
        this.x        = x; this.y = y;
        this.angle    = angle;
        this.fromSide = fromSide;
        this.life     = 18;
        this.maxLife  = 18;
    }
    update() { this.life--; }
    draw(c) {
        if (this.life <= 0) return;
        const alpha = this.life / this.maxLife;
        const [ri, gi, bi] = WEAPONS.Yumi.slashRGB;
        const range   = WEAPONS.Yumi.range * 0.42;
        const halfArc = Math.PI / 2.0;
        const startA  = -halfArc;
        const endA    =  halfArc;

        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.angle);
        c.lineCap = 'round';

        // Soft bloom wedge
        const bloomG = c.createRadialGradient(0, 0, range * 0.08, 0, 0, range * 1.05);
        bloomG.addColorStop(0, `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.12})`);
        bloomG.addColorStop(1, `rgba(${ri}, ${gi}, ${bi}, 0)`);
        c.beginPath();
        c.moveTo(0, 0);
        c.arc(0, 0, range * 1.05, startA, endA);
        c.closePath();
        c.fillStyle = bloomG;
        c.fill();

        // Main slash arc (calligraphic, like LightSlash but shorter — arrow-range)
        const segs = 12;
        for (let i = 0; i < segs; i++) {
            const t0  = i / segs;
            const t1  = (i + 1) / segs;
            const a0  = startA + t0 * (endA - startA);
            const a1  = startA + t1 * (endA - startA);
            const mid = Math.sin(((t0 + t1) / 2) * Math.PI);
            const jitter = 1 + Math.sin(i * 6.8 + this.maxLife * 0.4) * 0.10;
            const sw  = Math.max(range * 0.10 * mid * alpha * jitter, 0.4);
            c.beginPath();
            c.arc(0, 0, range, a0, a1);
            c.lineWidth   = sw;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.88})`;
            c.stroke();
        }

        // Arrow shaft trace along the sweep path (distinctive arrow-slash feel)
        c.beginPath();
        c.arc(0, 0, range * 0.92, startA + 0.06, endA - 0.06);
        c.lineWidth   = 1.6 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha})`;
        c.stroke();

        // Arrowhead flash at the tip of the sweep
        const tipA = -this.fromSide * halfArc;
        const tx2  = Math.cos(tipA) * range;
        const ty2  = Math.sin(tipA) * range;
        // Arrow tip triangle
        const headDir = tipA + this.fromSide * Math.PI / 2; // perp to arc at tip
        c.beginPath();
        c.moveTo(tx2, ty2);
        c.lineTo(tx2 + Math.cos(headDir - 0.5) * 7 * alpha, ty2 + Math.sin(headDir - 0.5) * 7 * alpha);
        c.lineTo(tx2 + Math.cos(headDir + 0.5) * 7 * alpha, ty2 + Math.sin(headDir + 0.5) * 7 * alpha);
        c.closePath();
        c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.78})`;
        c.fill();

        // Ink bead at each end
        [startA, endA].forEach(ta => {
            const ex = Math.cos(ta) * range;
            const ey = Math.sin(ta) * range;
            c.beginPath();
            c.arc(ex, ey, 2.0 * alpha, 0, Math.PI * 2);
            c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.60})`;
            c.fill();
        });

        // Flash burst at start of sweep
        if (alpha > 0.78) {
            const flash = (alpha - 0.78) / 0.22;
            const fx2 = Math.cos(-this.fromSide * halfArc) * range * 0.45;
            const fy2 = Math.sin(-this.fromSide * halfArc) * range * 0.45;
            c.beginPath();
            c.arc(fx2, fy2, range * 0.12, 0, Math.PI * 2);
            c.fillStyle = `rgba(${Math.min(ri+55,215)}, ${Math.min(gi+48,185)}, ${Math.min(bi+38,160)}, ${flash * 0.50})`;
            c.fill();
        }

        c.restore();
    }
}

// FUKIYA BONK, tube smack: short-range overhead melee arc with the blowgun
class FukiyaBonk {
    constructor(x, y, angle, fromSide) {
        this.x        = x; this.y = y;
        this.angle    = angle;
        this.fromSide = fromSide;
        this.life     = 16;
        this.maxLife  = 16;
    }
    update() { this.life--; }
    draw(c) {
        if (this.life <= 0) return;
        const alpha = this.life / this.maxLife;
        const [ri, gi, bi] = WEAPONS.Fukiya.slashRGB;
        const range  = WEAPONS.Fukiya.range * 0.34;  // short range — it's a bonk!
        const halfArc = Math.PI / 2.4;

        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.angle);
        c.lineCap = 'round';

        // Small but punchy bloom
        const bloomG = c.createRadialGradient(0, 0, range * 0.05, 0, 0, range * 1.2);
        bloomG.addColorStop(0, `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.16})`);
        bloomG.addColorStop(1, `rgba(${ri}, ${gi}, ${bi}, 0)`);
        c.beginPath();
        c.moveTo(0, 0);
        c.arc(0, 0, range * 1.2, -halfArc, halfArc);
        c.closePath();
        c.fillStyle = bloomG;
        c.fill();

        // Heavy impact arc (tube is blunt, so a chunkier stroke)
        const segs = 10;
        for (let i = 0; i < segs; i++) {
            const t0  = i / segs;
            const t1  = (i + 1) / segs;
            const a0  = -halfArc + t0 * halfArc * 2;
            const a1  = -halfArc + t1 * halfArc * 2;
            const mid = Math.sin(((t0 + t1) / 2) * Math.PI);
            c.beginPath();
            c.arc(0, 0, range, a0, a1);
            c.lineWidth   = Math.max(range * 0.18 * mid * alpha, 0.4);
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.85})`;
            c.stroke();
        }

        // Blunt impact edge
        c.beginPath();
        c.arc(0, 0, range * 0.90, -halfArc + 0.06, halfArc - 0.06);
        c.lineWidth   = 2.0 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha})`;
        c.stroke();

        // Expanding impact ring (blunt-force feel)
        const ringSz = range * (0.55 + (1 - alpha) * 0.55);
        c.beginPath();
        c.arc(0, 0, ringSz, -halfArc, halfArc);
        c.lineWidth   = 4 * alpha * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.22})`;
        c.stroke();

        // Impact spikes (bonk radiates short bursts)
        for (let s = 0; s < 4; s++) {
            const sa   = -halfArc + (s / 3) * halfArc * 2;
            const sLen = range * (0.12 + (s % 2) * 0.08) * alpha;
            c.beginPath();
            c.moveTo(Math.cos(sa) * range * 0.88, Math.sin(sa) * range * 0.88);
            c.lineTo(Math.cos(sa) * (range * 0.88 + sLen), Math.sin(sa) * (range * 0.88 + sLen));
            c.lineWidth   = (2.2 - s * 0.18) * alpha;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.60})`;
            c.stroke();
        }

        // Flash at moment of bonk
        if (alpha > 0.82) {
            const f = (alpha - 0.82) / 0.18;
            c.beginPath();
            c.arc(0, 0, range * 0.28, 0, Math.PI * 2);
            c.fillStyle = `rgba(${Math.min(ri+45,205)}, ${Math.min(gi+38,178)}, ${Math.min(bi+28,150)}, ${f * 0.45})`;
            c.fill();
        }

        c.restore();
    }
}

// FUKIYA CHARGED DART, deep-breath supercharged shot: bigger, faster, deadlier
class FukiyaChargedDart {
    constructor(x, y, angle, damage, knockback) {
        this.x         = x; this.y = y;
        this.angle     = angle;
        this.damage    = damage;
        this.knockback = knockback;
        this.speed     = 30;     // much faster than normal dart (22)
        this.life      = 55;
        this.maxLife   = 55;
        this.hit       = false;
        this.hitX      = 0; this.hitY = 0;
        this.hitLife   = 18;
        // Breath charge ring, expands briefly at spawn
        this.chargeRing = 1.0;
    }
    update() {
        this.life--;
        this.chargeRing = Math.max(0, this.chargeRing - 0.10);
        if (this.hit) { this.hitLife--; return; }
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        for (let i = enemies.length - 1; i >= 0; i--) {
            const e    = enemies[i];
            const dist = Math.hypot(e.x - this.x, e.y - this.y);
            if (dist <= e.radius + 10) {
                this.hit   = true;
                this.hitX  = this.x; this.hitY = this.y;
                this.hitLife = 18;
                e.hit(this.damage, this.angle, this.knockback);
                spawnParticles(e.x, e.y, 'ink-red', 12);
                if (e.hp <= 0) {
                    spawnParticles(e.x, e.y, 'ink-red', 22);
                    enemies.splice(i, 1);
                    rebalanceRoles();
                }
                if (enemies.length === 0) setTimeout(triggerWeaponDrop, 1000);
                break;
            }
        }
    }
    draw(c) {
        if (this.life <= 0) return;
        const [ri, gi, bi] = WEAPONS.Fukiya.slashRGB;

        if (this.hit) {
            // Big impact burst (much more dramatic than normal dart)
            const alpha = Math.max(0, this.hitLife / 18);
            if (alpha <= 0) return;
            c.save();
            c.translate(this.hitX, this.hitY);
            c.lineCap = 'round';
            // Expanding shockwave ring
            const shockR = 12 + (1 - alpha) * 28;
            c.beginPath();
            c.arc(0, 0, shockR, 0, Math.PI * 2);
            c.lineWidth   = 3.5 * alpha;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.55})`;
            c.stroke();
            // Burst spokes
            for (let i = 0; i < 7; i++) {
                const a   = (i / 7) * Math.PI * 2 + this.angle;
                const len = 10 + i * 3.5;
                c.beginPath();
                c.moveTo(0, 0);
                c.lineTo(Math.cos(a) * len * alpha, Math.sin(a) * len * alpha);
                c.lineWidth   = (2.5 - i * 0.18) * alpha;
                c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.80})`;
                c.stroke();
            }
            c.beginPath();
            c.arc(0, 0, Math.max(0.01, 5.5 * alpha), 0, Math.PI * 2);
            c.fillStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.70})`;
            c.fill();
            c.restore();
            return;
        }

        const alpha = Math.min(1, this.life / 10);
        c.save();
        c.translate(this.x, this.y);
        c.rotate(this.angle);
        c.lineCap = 'round';

        // Breath charge ring (dissipates quickly after launch)
        if (this.chargeRing > 0) {
            const cr = this.chargeRing;
            c.beginPath();
            c.arc(0, 0, 14 + (1 - cr) * 12, 0, Math.PI * 2);
            c.lineWidth   = 2.5 * cr;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${cr * 0.35})`;
            c.stroke();
        }

        // Longer, thicker dart shaft (more visual weight than normal dart)
        c.beginPath();
        c.moveTo(-18, 0);
        c.lineTo(10, 0);
        c.lineWidth   = 2.0 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.92})`;
        c.stroke();

        // Larger needle tip
        c.beginPath();
        c.moveTo(10, 0);
        c.lineTo(18, 0);
        c.lineWidth   = 1.2 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.98})`;
        c.stroke();

        // Bigger cone tuft (shows the deep breath)
        c.beginPath();
        c.moveTo(-18, -4.5); c.lineTo(-24, 0); c.lineTo(-18, 4.5);
        c.lineWidth   = 1.4 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.60})`;
        c.stroke();
        // Second tuft layer
        c.beginPath();
        c.moveTo(-16, -3); c.lineTo(-20, 0); c.lineTo(-16, 3);
        c.lineWidth   = 1.0 * alpha;
        c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * 0.38})`;
        c.stroke();

        // Longer speed streaks (showing extreme velocity)
        for (let i = 0; i < 4; i++) {
            const yOff = (i - 1.5) * 3.5;
            const xLen = 12 + i * 6;
            c.beginPath();
            c.moveTo(-20 - i * 6, yOff);
            c.lineTo(-20 - i * 6 - xLen, yOff);
            c.lineWidth   = 0.8 * alpha;
            c.strokeStyle = `rgba(${ri}, ${gi}, ${bi}, ${alpha * (0.30 - i * 0.05)})`;
            c.stroke();
        }

        c.restore();
    }
}

// PARTICLE Elongated ink drops/death splatter
class Particle {
    constructor(x, y, type, size = null) {
        this.x = x; this.y = y;
        const a    = Math.random() * Math.PI * 2;
        const spd  = Math.random() * 4.5 + 1;
        this.vx    = Math.cos(a) * spd;
        this.vy    = Math.sin(a) * spd;
        this.life  = 1.0;
        this.decay = Math.random() * 0.05 + 0.022;
        this.type  = type;
        this.size  = size || (Math.random() * 3.5 + 1.5);
        this.rot   = Math.random() * Math.PI * 2;
    }

    update() {
        this.x    += this.vx;
        this.y    += this.vy;
        this.vx   *= 0.9;
        this.vy   *= 0.9;
        this.life -= this.decay;
    }

    draw(c) {
        if (this.life <= 0) return;
        const alpha = Math.max(0, this.life);
        const angle = Math.atan2(this.vy, this.vx);

        c.save();
        c.globalAlpha = alpha;
        c.translate(this.x, this.y);
        c.rotate(angle);

        c.beginPath();
        c.ellipse(0, 0, this.size * 1.8, this.size * 0.55, 0, 0, Math.PI * 2);

        switch (this.type) {
            case 'ink-red':
                c.fillStyle = 'rgba(70, 10, 10, 0.90)';
                break;
            case 'scatter':
                c.fillStyle = 'rgba(240, 232, 216, 0.88)';
                break;
            case 'ink-bloom':
                c.fillStyle = 'rgba(22, 14, 6, 0.78)';
                break;
            default:
                c.fillStyle = 'rgba(22, 14, 6, 0.88)';
        }
        c.fill();

        if (this.type === 'ink-red' || this.type === 'ink-bloom') {
            c.beginPath();
            c.arc(this.size * 1.5, 0, this.size * 0.4, 0, Math.PI * 2);
            c.fillStyle = (this.type === 'ink-red')
                ? `rgba(55, 8, 8, ${alpha * 0.7})`
                : `rgba(18, 10, 4, ${alpha * 0.6})`;
            c.fill();
        }

        c.restore();
    }
}

// 
// GLOBAL GAME OBJECTS
// 
let player;
let enemies   = [];
let particles = [];
let slashes   = [];
let trails    = [];
let currentWave = 1;

function createTrail(x, y, radius, isDash, angle) {
    trails.push({ x, y, r: radius, life: 1.0, isDash, angle });
}

function spawnParticles(x, y, type, count) {
    for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, type));
    }
}

// 
// DAMAGE SYSTEM
// 
function applyDamageCustom(px, py, attackAngle, range, arc, damage, kb) {
    for (let i = enemies.length - 1; i >= 0; i--) {
        const e   = enemies[i];
        const dx  = e.x - px;
        const dy  = e.y - py;
        const dist = Math.hypot(dx, dy);

        if (dist <= range) {
            const angleToEnemy = Math.atan2(dy, dx);
            let angleDiff = angleToEnemy - attackAngle;
            while (angleDiff >  Math.PI) angleDiff -= Math.PI * 2;
            while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

            if (Math.abs(angleDiff) <= arc / 2) {
                e.hit(damage, attackAngle, kb);
                if (e.hp <= 0) {
                    spawnParticles(e.x, e.y, 'ink-red', 15);
                    enemies.splice(i, 1);
                    rebalanceRoles();
                }
            }
        }
    }
    if (enemies.length === 0) setTimeout(triggerWeaponDrop, 1000);
}

// Kept for compatibility (original dash Slash class still uses weapon.arc directly)
function applyDamage(px, py, attackAngle, weapon) {
    applyDamageCustom(px, py, attackAngle, weapon.range, weapon.arc, weapon.damage, weapon.knockback);
}

// 
// CORE GAME LOGIC
// 
function initGame() {
    player    = new Player(width / 2, height / 2);
    enemies   = [];
    particles = [];
    slashes   = [];
    trails    = [];
    currentWave = 1;
    updateHUD();
    startWave();
}

function startWave() {
    gameState = 'PLAYING';
    const enemyCount = 3 + (currentWave * 2);
    for (let i = 0; i < enemyCount; i++) spawnEnemy();
    // Assign initial attacker/standoff roles now that all enemies exist
    rebalanceRoles();

    waveDisplay.innerText = `WAVE  ${currentWave}`;

    waveBanner.textContent = `WAVE  ${currentWave}`;
    waveBanner.classList.remove('show');
    void waveBanner.offsetWidth;
    waveBanner.classList.add('show');
}

function spawnEnemy() {
    let x, y;
    if (Math.random() < 0.5) {
        x = Math.random() < 0.5 ? -30 : width + 30;
        y = Math.random() * height;
    } else {
        x = Math.random() * width;
        y = Math.random() < 0.5 ? -30 : height + 30;
    }
    enemies.push(new Enemy(x, y, currentWave));
}

function triggerWeaponDrop() {
    if (gameState !== 'PLAYING') return;
    gameState = 'SAKURA_ROLL';

    // Pre-determine weapon per probability table 
    const r = Math.random();
    let newWeapon;
    if      (r < 0.16) newWeapon = WEAPONS.Katana;   // 16%
    else if (r < 0.30) newWeapon = WEAPONS.Naginata; // 14%
    else if (r < 0.43) newWeapon = WEAPONS.Kanabo;   // 13%
    else if (r < 0.56) newWeapon = WEAPONS.Odachi;   // 13%
    else if (r < 0.68) newWeapon = WEAPONS.Kama;     // 12%
    else if (r < 0.80) newWeapon = WEAPONS.Yumi;     // 12%
    else if (r < 0.90) newWeapon = WEAPONS.Sasumata; // 10%
    else                newWeapon = WEAPONS.Fukiya;  // 10%

    // Clear residual combat effects for a clean canvas
    slashes   = [];
    trails    = [];
    particles = particles.filter(p => p.life > 0.1);

    initSakuraRoll(newWeapon);
}

function nextWave() {
    currentWave++;
    sakuraRoll = null;
    updateHUD();
    startWave();
}

function gameOver() {
    gameState = 'GAMEOVER';
    mainMenu.classList.remove('hidden');

    menuTitle.innerText = 'SLAIN';
    menuTitle.classList.add('slain');
    menuTitle.style.animation = 'none';
    void menuTitle.offsetWidth;
    menuTitle.style.animation = '';

    menuSubtitle.innerText = `You endured until Wave ${currentWave}.`;
    startBtn.querySelector('.btn-inner').innerText = 'RISE';
}

// 
// HUD
// 
function updateHUD() {
    healthDisplay.innerHTML = '';
    for (let i = 0; i < player.maxHp; i++) {
        const h = document.createElement('div');
        h.className = i < player.hp ? 'heart' : 'heart empty';
        healthDisplay.appendChild(h);
    }
    weaponDisplay.innerText   = player.weapon.name.toUpperCase();
    weaponDisplay.style.color = player.weapon.color;
}

// 
// UPDATE
// 
function update() {
    if (gameState === 'SCROLL') {
        updateScrollScene();
        petals.forEach(p => p.update());
        return; // no game logic while scroll is showing
    }

    if (gameState === 'PLAYING') {
        player.update();
        enemies.forEach(e => e.update());

        // Periodic role rebalance every 1 s (60 frames)
        roleRebalanceTick++;
        if (roleRebalanceTick >= 60) {
            roleRebalanceTick = 0;
            rebalanceRoles();
        }
    }

    if (gameState === 'SAKURA_ROLL') {
        updateSakuraRoll();
    } else {
        globalWindForce *= 0.96; // gentle calm-down after roll
    }

    slashes.forEach(s => s.update());
    slashes   = slashes.filter(s => s.life > 0);

    particles.forEach(p => p.update());
    particles = particles.filter(p => p.life > 0);

    trails.forEach(t => t.life -= 0.082);
    trails    = trails.filter(t => t.life > 0);

    petals.forEach(p => p.update());

    if (cameraShake > 0) cameraShake *= 0.8;
    if (cameraShake < 0.5) cameraShake = 0;
}

// 
// DRAW
// 
function draw() {
    if (bgCanvas) {
        ctx.drawImage(bgCanvas, 0, 0);
    } else {
        ctx.fillStyle = '#f0e8d8';
        ctx.fillRect(0, 0, width, height);
    }

    ctx.save();
    if (cameraShake > 0) {
        ctx.translate(
            (Math.random() - 0.5) * cameraShake,
            (Math.random() - 0.5) * cameraShake
        );
    }

    petals.forEach(p => p.draw(ctx));

    // Ink trails
    trails.forEach(t => {
        ctx.save();
        ctx.translate(t.x, t.y);

        if (t.isDash) {
            ctx.rotate(t.angle);

            ctx.beginPath();
            ctx.ellipse(0, 0, t.r * 3.2 * t.life, t.r * 0.68, 0, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(22, 14, 6, ${t.life * 0.18})`;
            ctx.fill();

            ctx.beginPath();
            ctx.ellipse(0, 0, t.r * 2.7 * t.life, t.r * 0.44, 0, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(20, 12, 5, ${t.life * 0.50})`;
            ctx.fill();

            ctx.beginPath();
            ctx.ellipse(0, 0, t.r * 1.7 * t.life, t.r * 0.22, 0, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(14, 8, 3, ${t.life * 0.35})`;
            ctx.fill();

            for (let fd = 0; fd < 4; fd++) {
                const fo = (fd - 1.5) * t.r * 0.52;
                ctx.beginPath();
                ctx.ellipse(fo * 0.3, fo, t.r * 0.55 * t.life, t.r * 0.16, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(22, 14, 6, ${t.life * 0.12})`;
                ctx.fill();
            }
        } else {
            ctx.beginPath();
            ctx.arc(0, 0, t.r * t.life * 0.65, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(22, 14, 6, ${t.life * 0.045})`;
            ctx.fill();
        }

        ctx.restore();
    });

    slashes.forEach(s => s.draw(ctx));
    enemies.forEach(e => e.draw(ctx));
    if (player) player.draw(ctx);
    particles.forEach(p => p.draw(ctx));

    ctx.restore();

    // Sakura Roll drawn outside the shake transform, as a full-screen overlay
    if (gameState === 'SAKURA_ROLL' && sakuraRoll) {
        drawSakuraRoll();
    }

    // Blood Oath Scroll drawn over everything
    if (gameState === 'SCROLL' && scrollScene) {
        // Draw petals behind the scroll
        ctx.save();
        petals.forEach(p => p.draw(ctx));
        ctx.restore();
        drawScrollScene();
    }
}

// 
// GAME LOOP
// 
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// 
// INPUT J / K keys, WASD movement
// 
window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    buildBackground();
    if (sakuraRoll)  { sakuraRoll.cx  = width / 2; sakuraRoll.cy  = height / 2; }
    if (scrollScene) { scrollScene.cx = width / 2; scrollScene.cy = height / 2; }
});

window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (k === 'w' || e.key === 'ArrowUp')    { keys.w = true; keys.ArrowUp    = true; }
    if (k === 'a' || e.key === 'ArrowLeft')  { keys.a = true; keys.ArrowLeft  = true; }
    if (k === 's' || e.key === 'ArrowDown')  { keys.s = true; keys.ArrowDown  = true; }
    if (k === 'd' || e.key === 'ArrowRight') { keys.d = true; keys.ArrowRight = true; }
    if (k === 'j') keys.j = true;
    if (k === 'k') keys.k = true;
    // Prevent page scroll from arrow keys, and spacebar from re-clicking focused buttons
    if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
    // Sakura Roll skip
    if (e.key === ' ' && gameState === 'SAKURA_ROLL') skipSakuraRoll();
    // Blood Oath seal
    if (e.key === ' ' && gameState === 'SCROLL') triggerBloodOath();
});

window.addEventListener('keyup', e => {
    const k = e.key.toLowerCase();
    if (k === 'w' || e.key === 'ArrowUp')    { keys.w = false; keys.ArrowUp    = false; }
    if (k === 'a' || e.key === 'ArrowLeft')  { keys.a = false; keys.ArrowLeft  = false; }
    if (k === 's' || e.key === 'ArrowDown')  { keys.s = false; keys.ArrowDown  = false; }
    if (k === 'd' || e.key === 'ArrowRight') { keys.d = false; keys.ArrowRight = false; }
    if (k === 'j') keys.j = false;
    if (k === 'k') keys.k = false;
});

startBtn.addEventListener('click', () => {
    startBtn.blur();
    menuTitle.innerText = 'IAIDO';
    menuTitle.classList.remove('slain');
    menuTitle.style.animation = 'none';
    void menuTitle.offsetWidth;
    menuTitle.style.animation = '';
    menuSubtitle.innerText = "A blade drawn in silence.\nEvery strike, a brushstroke on the parchment.";
    startBtn.querySelector('.btn-inner').innerText = 'BEGIN';

    mainMenu.classList.add('hidden');

    if (!hasSeenIntro) {
        // First run only show the Blood Oath scroll
        hasSeenIntro = true;
        gameState = 'SCROLL';
        initScrollScene();
    } else {
        // Subsequent runs jump straight into the game
        scrollScene = null;
        gameState   = 'PLAYING';
        initGame();
    }
});

canvas.addEventListener('click', e => {
    if (gameState === 'SCROLL') {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width  / rect.width;
        const scaleY = canvas.height / rect.height;
        triggerBloodOath(
            (e.clientX - rect.left)  * scaleX,
            (e.clientY - rect.top)   * scaleY
        );
    }
});

continueBtn.addEventListener('click', () => { continueBtn.blur(); nextWave(); });

// INIT
width  = canvas.width  = window.innerWidth;
height = canvas.height = window.innerHeight;
buildBackground();
initPetals();
gameLoop();

</script>
</body>
</html>
